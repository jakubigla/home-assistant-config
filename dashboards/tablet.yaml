---
title: Tablet Dashboard
views:
  - title: Home
    path: home
    type: sections
    max_columns: 4
    sections:
      # ===== ROW 1 =====

      # Section 1: Status (Top-Left)
      - cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-person-card
                entity: person.jakub
                icon_type: entity-picture
                layout: vertical
                card_mod:
                  style: |
                    ha-card {
                      --primary-text-color: var(--primary-text-color);
                      font-size: 18px;
                    }
              - type: custom:mushroom-person-card
                entity: person.sona
                icon_type: entity-picture
                layout: vertical
                card_mod:
                  style: |
                    ha-card {
                      font-size: 18px;
                    }
              - type: custom:mushroom-template-card
                entity: alarm_control_panel.main
                icon: >-
                  {% set doors = [
                    states('binary_sensor.terrace_left_door'),
                    states('binary_sensor.terrace_main_door'),
                    states('binary_sensor.balcony_door'),
                    states('binary_sensor.garage_door')
                  ] %}
                  {% set presence = [
                    states('binary_sensor.bedroom_presence'),
                    states('binary_sensor.bathroom_presence'),
                    states('binary_sensor.first_floor_corridor_presence'),
                    states('binary_sensor.laundry_room_sensor_occupancy'),
                    states('binary_sensor.bedroom_wardrobe_occupancy')
                  ] %}
                  {% set open_doors = doors | select('eq', 'on') | list | count %}
                  {% set occupied = presence | select('eq', 'on') | list | count %}
                  {% set any_unavailable = (doors + presence) | select('eq', 'unavailable') | list | count > 0 %}
                  {{ 'mdi:shield-check' if open_doors == 0 and occupied == 0 and not any_unavailable else 'mdi:shield-alert' }}
                icon_color: >-
                  {% set doors = [
                    states('binary_sensor.terrace_left_door'),
                    states('binary_sensor.terrace_main_door'),
                    states('binary_sensor.balcony_door'),
                    states('binary_sensor.garage_door')
                  ] %}
                  {% set presence = [
                    states('binary_sensor.bedroom_presence'),
                    states('binary_sensor.bathroom_presence'),
                    states('binary_sensor.first_floor_corridor_presence'),
                    states('binary_sensor.laundry_room_sensor_occupancy'),
                    states('binary_sensor.bedroom_wardrobe_occupancy')
                  ] %}
                  {% set open_doors = doors | select('eq', 'on') | list | count %}
                  {% set occupied = presence | select('eq', 'on') | list | count %}
                  {% set any_unavailable = (doors + presence) | select('eq', 'unavailable') | list | count > 0 %}
                  {{ 'green' if open_doors == 0 and occupied == 0 and not any_unavailable else 'red' }}
                primary: >-
                  {% set doors = [
                    states('binary_sensor.terrace_left_door'),
                    states('binary_sensor.terrace_main_door'),
                    states('binary_sensor.balcony_door'),
                    states('binary_sensor.garage_door')
                  ] %}
                  {% set presence = [
                    states('binary_sensor.bedroom_presence'),
                    states('binary_sensor.bathroom_presence'),
                    states('binary_sensor.first_floor_corridor_presence'),
                    states('binary_sensor.laundry_room_sensor_occupancy'),
                    states('binary_sensor.bedroom_wardrobe_occupancy')
                  ] %}
                  {% set open_doors = doors | select('eq', 'on') | list | count %}
                  {% set occupied = presence | select('eq', 'on') | list | count %}
                  {% set any_unavailable = (doors + presence) | select('eq', 'unavailable') | list | count > 0 %}
                  {{ 'Ready to Arm' if open_doors == 0 and occupied == 0 and not any_unavailable else 'Not Ready' }}
                layout: vertical
                tap_action:
                  action: more-info
                card_mod:
                  style: |
                    ha-card {
                      font-size: 18px;
                    }
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                entity: binary_sensor.terrace_left_door
                icon: mdi:door
                icon_color: >-
                  {% set s = states('binary_sensor.terrace_left_door') %}
                  {{ 'red' if s == 'on' else 'green' if s == 'off' else 'disabled' }}
                content: Terrace L
                tap_action:
                  action: more-info
              - type: template
                entity: binary_sensor.terrace_main_door
                icon: mdi:door
                icon_color: >-
                  {% set s = states('binary_sensor.terrace_main_door') %}
                  {{ 'red' if s == 'on' else 'green' if s == 'off' else 'disabled' }}
                content: Terrace R
                tap_action:
                  action: more-info
              - type: template
                entity: binary_sensor.balcony_door
                icon: mdi:door
                icon_color: >-
                  {% set s = states('binary_sensor.balcony_door') %}
                  {{ 'red' if s == 'on' else 'green' if s == 'off' else 'disabled' }}
                content: Balcony
                tap_action:
                  action: more-info
              - type: template
                entity: binary_sensor.garage_door
                icon: mdi:garage
                icon_color: >-
                  {% set s = states('binary_sensor.garage_door') %}
                  {{ 'red' if s == 'on' else 'green' if s == 'off' else 'disabled' }}
                content: Garage
                tap_action:
                  action: more-info
              - type: template
                icon: mdi:home-floor-1
                icon_color: >-
                  {% set presence = [
                    states('binary_sensor.bedroom_presence'),
                    states('binary_sensor.bathroom_presence'),
                    states('binary_sensor.first_floor_corridor_presence'),
                    states('binary_sensor.laundry_room_sensor_occupancy'),
                    states('binary_sensor.bedroom_wardrobe_occupancy')
                  ] %}
                  {% set occupied = presence | select('eq', 'on') | list | count %}
                  {{ 'red' if occupied > 0 else 'green' }}
                content: >-
                  {% set presence = [
                    states('binary_sensor.bedroom_presence'),
                    states('binary_sensor.bathroom_presence'),
                    states('binary_sensor.first_floor_corridor_presence'),
                    states('binary_sensor.laundry_room_sensor_occupancy'),
                    states('binary_sensor.bedroom_wardrobe_occupancy')
                  ] %}
                  {% set occupied = presence | select('eq', 'on') | list | count %}
                  {{ '1F: ' ~ occupied ~ ' zone' ~ ('s' if occupied != 1) if occupied > 0 else '1F: Clear' }}
          - type: picture-entity
            entity: camera.doorbell_rtsp
            camera_view: live
            show_state: false
            show_name: false

          - type: heading
            heading: Lights
            heading_style: subtitle

          - type: grid
            columns: 5
            square: false
            cards:
              - type: custom:mushroom-light-card
                entity: light.toilet
                icon: mdi:toilet
                use_light_color: true
                layout: vertical
                fill_container: true
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }
              - type: custom:mushroom-light-card
                entity: light.living_room_light_standing_lamp
                icon: mdi:floor-lamp
                use_light_color: true
                layout: vertical
                fill_container: true
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }
              - type: custom:mushroom-light-card
                entity: light.kitchen
                icon: mdi:countertop
                use_light_color: true
                layout: vertical
                fill_container: true
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }
              - type: custom:mushroom-light-card
                entity: light.bedroom
                icon: mdi:bed
                use_light_color: true
                layout: vertical
                fill_container: true
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }
              - type: custom:mushroom-light-card
                entity: light.bathroom_main
                icon: mdi:bathtub
                use_light_color: true
                layout: vertical
                fill_container: true
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }
              - type: custom:mushroom-light-card
                entity: light.ensuite_bathroom
                icon: mdi:shower
                use_light_color: true
                layout: vertical
                fill_container: true
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }
              - type: custom:mushroom-light-card
                entity: light.hall_bulbs
                icon: mdi:coat-rack
                use_light_color: true
                layout: vertical
                fill_container: true
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }
              - type: custom:mushroom-light-card
                entity: light.stairway
                icon: mdi:stairs
                use_light_color: true
                layout: vertical
                fill_container: true
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }
              - type: custom:mushroom-template-card
                icon: mdi:lightbulb-group-off
                icon_color: red
                layout: vertical
                fill_container: true
                tap_action:
                  action: perform-action
                  perform_action: light.turn_off
                  target:
                    entity_id: all
                card_mod:
                  style:
                    mushroom-state-item$: |
                      .info {
                        display: none !important;
                      }
                      .container {
                        gap: 0 !important;
                      }
                    .: |
                      mushroom-shape-icon {
                        --icon-size: 32px;
                        --shape-size: 48px;
                      }

          - type: markdown
            content: "---"
            card_mod:
              style: |
                ha-card {
                  background: none;
                  border: none;
                  box-shadow: none;
                  padding: 0;
                  margin: 0;
                  min-height: 0 !important;
                }
                ha-card ha-markdown {
                  padding: 0 !important;
                }

          # - type: horizontal-stack
          #   cards:
          #     - type: custom:mushroom-climate-card
          #       entity: climate.living_room
          #       name: Living Room
          #       show_temperature_control: true
          #       hvac_modes:
          #         - heat
          #         - "off"
          #       layout: horizontal
          #     - type: custom:mushroom-climate-card
          #       entity: climate.bedroom
