---
title: Climate
path: climate
icon: mdi:thermostat
type: sections
max_columns: 3
sections:
  - title: Thermostats
    cards:
      - type: thermostat
        entity: climate.living_room
        name: Living Room
      - type: thermostat
        entity: climate.bedroom
        name: Bedroom
      - type: humidifier
        entity: humidifier.living_room
        name: Living Room Humidifier
      - type: humidifier
        entity: humidifier.bedroom
        name: Bedroom Humidifier

  - title: Per-Area Environment
    cards:
      - type: entities
        title: Temperature
        entities:
          - sensor.living_room_hygro_temperature
          - sensor.bedroom_hygro_temperature
      - type: entities
        title: Humidity
        entities:
          - sensor.living_room_hygro_humidity
          - sensor.bedroom_hygro_humidity
      - type: history-graph
        title: Living Room (24h)
        hours_to_show: 24
        entities:
          - sensor.living_room_hygro_temperature
          - sensor.living_room_hygro_humidity
      - type: history-graph
        title: Bedroom (24h)
        hours_to_show: 24
        entities:
          - sensor.bedroom_hygro_temperature
          - sensor.bedroom_hygro_humidity

  - title: Curtains
    cards:
      - type: custom:mushroom-cover-card
        entity: cover.ground_floor
        name: All Ground Floor
        show_buttons_control: true
        show_position_control: true
        layout: horizontal
      - type: custom:mushroom-cover-card
        entity: cover.living_room_main
        name: Living Room Main
        show_buttons_control: true
        show_position_control: true
        layout: horizontal
      - type: custom:mushroom-cover-card
        entity: cover.living_room_left
        name: Living Room Left
        show_buttons_control: true
        show_position_control: true
        layout: horizontal
      - type: custom:mushroom-cover-card
        entity: cover.bedroom
        name: Bedroom
        show_buttons_control: true
        show_position_control: true
        layout: horizontal
