            layout: vertical
            fill_container: true
            tap_action:
              action: perform-action
              perform_action: script.music_play_by_uri
              data:
                uri: >
                  {% set items = state_attr('sensor.mass_top_playlists', 'items') or [] %}
                  {% if items | length > 2 %}{{ items[2].uri }}{% else %}{% endif %}
