                media_type: playlist

      - type: horizontal-stack
        grid_options:
          columns: full
        cards:
          - type: custom:mushroom-template-card
            primary: >
              {% set items = state_attr('sensor.mass_top_tracks', 'items') or [] %}
              {% if items | length > 0 %}{{ items[0].name }}{% else %}—{% endif %}
            secondary: >
              {% set items = state_attr('sensor.mass_top_tracks', 'items') or [] %}
              {% if items | length > 0 %}{{ items[0].artist }}{% else %}—{% endif %}
