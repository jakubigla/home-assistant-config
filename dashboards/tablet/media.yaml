---
title: Media
path: media
icon: mdi:music
type: sections
max_columns: 3
sections:
  - title: Playback
    cards:
      - type: custom:mass-player-card
        entity: media_player.living_room_tv

  - title: Now Playing & Quick-Play
    cards:
      - type: custom:mushroom-media-player-card
        entity: media_player.living_room_tv
        layout: horizontal
        show_volume_level: true
        use_media_info: true
        volume_controls:
          - volume_set
        media_controls:
          - previous
          - play_pause_stop
          - next
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Discover Weekly
            icon: mdi:playlist-star
            icon_color: green
            layout: vertical
            fill_container: true
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.music_play_discover_weekly
          - type: custom:mushroom-template-card
            primary: Random Playlist
            icon: mdi:shuffle-variant
            icon_color: purple
            layout: vertical
            fill_container: true
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.music_play_random_playlist
          - type: custom:mushroom-template-card
            primary: Last Played
            icon: mdi:history
            icon_color: blue
            layout: vertical
            fill_container: true
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.music_play_last_played
      - type: custom:voice-music-search-card

  - title: Scene System
    cards:
      - type: markdown
        content: |
          **Living Room Scenes**

          Use the Aqara Cube to cycle scenes:
          - **Shake** — next scene
          - **Flip 90°** — previous scene
          - **Tap** — confirm / apply

          Current scene shown below.
      - type: custom:mushroom-entity-card
        entity: input_select.living_room_scene
        name: Active Scene
        layout: horizontal
        tap_action:
          action: more-info
