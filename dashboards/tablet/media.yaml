      - type: custom:voice-music-search-card
        grid_options:
          columns: full

  - title: Scene System
    cards:
      - type: markdown
        content: |
          **Living Room Scenes**

          Use the Aqara Cube to cycle scenes:
          - **Shake** — next scene
          - **Flip 90°** — previous scene
          - **Tap** — confirm / apply

          Current scene shown below.
      - type: custom:mushroom-entity-card
        entity: input_select.living_room_scene
        name: Active Scene
        layout: horizontal
        tap_action:
          action: more-info
