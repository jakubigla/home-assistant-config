---
title: Appliances
path: appliances
icon: mdi:washing-machine
type: sections
max_columns: 3
sections:
  - title: Vacuums
    cards:
      - type: heading
        heading: Ground Floor — Dreame L10 Ultra
        heading_style: subtitle
      - type: custom:mushroom-vacuum-card
        entity: vacuum.dreamebot_l10_ultra
        name: Ground Floor
        icon_animation: true
        commands:
          - start_pause
          - stop
          - locate
          - return_home
        layout: horizontal
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: sensor.dreamebot_l10_ultra_battery_level
            icon: mdi:battery
            icon_color: green
            content: "{{ states('sensor.dreamebot_l10_ultra_battery_level') }}%"
            tap_action:
              action: more-info
          - type: template
            entity: sensor.dreamebot_l10_ultra_filter_left
            icon: mdi:air-filter
            icon_color: blue
            content: "{{ states('sensor.dreamebot_l10_ultra_filter_left') }}%"
            tap_action:
              action: more-info
          - type: template
            entity: sensor.dreamebot_l10_ultra_cleaning_history
            icon: mdi:history
            icon_color: purple
            content: >-
              {%- set ns = namespace(d='', t='', a='') -%}
              {%- for k, v in states.sensor.dreamebot_l10_ultra_cleaning_history.attributes.items() -%}
                {%- if not ns.t and v is mapping and v.completed is defined and v.completed -%}
                  {%- set ns.d = v.timestamp | timestamp_custom('%d %b %H:%M') -%}
                  {%- set ns.t = v.cleaning_time -%}
                  {%- set ns.a = v.cleaned_area -%}
                {%- endif -%}
              {%- endfor -%}
              {{ ns.d }} · {{ ns.t }} · {{ ns.a }}
            tap_action:
              action: more-info
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: script.vacuum_clean_mudroom
            primary: Clean Mudroom
            icon: mdi:door
            icon_color: teal
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.vacuum_clean_mudroom
          - type: custom:mushroom-template-card
            entity: script.vacuum_clean_kitchen
            primary: Clean Kitchen
            icon: mdi:silverware-fork-knife
            icon_color: orange
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.vacuum_clean_kitchen
      - type: heading
        heading: First Floor — X40 Master
        heading_style: subtitle
      - type: custom:mushroom-vacuum-card
        entity: vacuum.x40_master
        name: First Floor
        icon_animation: true
        commands:
          - start_pause
          - stop
          - locate
          - return_home
        layout: horizontal
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: sensor.x40_master_battery_level
            icon: mdi:battery
            icon_color: green
            content: "{{ states('sensor.x40_master_battery_level') }}%"
            tap_action:
              action: more-info
          - type: template
            entity: sensor.x40_master_filter_left
            icon: mdi:air-filter
            icon_color: blue
            content: "{{ states('sensor.x40_master_filter_left') }}%"
            tap_action:
              action: more-info
          - type: template
            entity: sensor.x40_master_cleaning_history
            icon: mdi:history
            icon_color: purple
            content: >-
              {%- set ns = namespace(d='', t='', a='') -%}
              {%- for k, v in states.sensor.x40_master_cleaning_history.attributes.items() -%}
                {%- if not ns.t and v is mapping and v.completed is defined and v.completed -%}
                  {%- set ns.d = v.timestamp | timestamp_custom('%d %b %H:%M') -%}
                  {%- set ns.t = v.cleaning_time -%}
                  {%- set ns.a = v.cleaned_area -%}
                {%- endif -%}
              {%- endfor -%}
              {{ ns.d }} · {{ ns.t }} · {{ ns.a }}
            tap_action:
              action: more-info
      # Attic vacuum placeholder — uncomment & update entity IDs when added (expected in a few weeks).
      # - type: heading
      #   heading: Attic
      #   heading_style: subtitle
      # - type: custom:mushroom-vacuum-card
      #   entity: vacuum.attic_placeholder

  - title: Laundry
    cards:
      - type: heading
        heading: Washer
        heading_style: subtitle
      - type: custom:mushroom-template-card
        entity: binary_sensor.washer_power
        icon: mdi:washing-machine
        icon_color: "{{ 'blue' if is_state('binary_sensor.washer_power', 'on') else 'disabled' }}"
        primary: Washer
        secondary: "{{ 'Running' if is_state('binary_sensor.washer_power', 'on') else 'Idle' }}"
        layout: horizontal
        tap_action:
          action: more-info
      - type: heading
        heading: Dryer
        heading_style: subtitle
      - type: custom:mushroom-template-card
        entity: binary_sensor.tumble_dryer_power
        icon: mdi:tumble-dryer
        icon_color: "{{ 'blue' if is_state('binary_sensor.tumble_dryer_power', 'on') else 'disabled' }}"
        primary: Dryer
        secondary: "{{ 'Running' if is_state('binary_sensor.tumble_dryer_power', 'on') else 'Idle' }}"
        layout: horizontal
        tap_action:
          action: more-info

  - title: Humidifiers
    cards:
      - type: custom:mushroom-entity-card
        entity: humidifier.living_room
        name: Living Room
        layout: horizontal
        tap_action:
          action: more-info
      - type: custom:mushroom-entity-card
        entity: humidifier.bedroom
        name: Bedroom
        layout: horizontal
        tap_action:
          action: more-info
