---
title: Outdoor
path: outdoor
icon: mdi:tree
type: sections
max_columns: 3
sections:
  - column_span: 3
    cards:
      - type: weather-forecast
        grid_options:
          columns: full
        entity: weather.forecast_home
        show_current: true
        show_forecast: true
        forecast_type: hourly
        forecast_slots: 10

      # ── Top band: Garden controls (left) | Schedule One-off (right) ──
      - type: horizontal-stack
        grid_options:
          columns: full
        cards:
          - type: vertical-stack
            cards:
              - type: heading
                heading: Garden — Irrigation
                heading_style: title
              - type: custom:mushroom-select-card
                entity: input_select.garden_irrigation_mode
                name: Irrigation Mode
                icon: mdi:sprinkler
                layout: horizontal
              - type: custom:mushroom-chips-card
                alignment: justified
                chips:
                  - type: template
                    icon: mdi:sprinkler-variant
                    icon_color: green
                    content: >-
                      {% set v = states('sensor.garden_lawn_last_run') %}
                      Lawn: {% if v in ['unknown', 'unavailable', 'None', ''] %}
                      never{% else %}{{ v | as_timestamp
                         | timestamp_custom('%a %H:%M') }}{% endif %}
                  - type: template
                    icon: mdi:clock-outline
                    icon_color: green
                    content: >-
                      {% set v = states('sensor.garden_lawn_next_run') %}
                      Next: {% if v in ['unknown', 'unavailable', 'None', ''] %}
                      —{% else %}{{ v | as_timestamp
                         | timestamp_custom('%a %H:%M') }}{% endif %}
                  - type: template
                    icon: mdi:timer-sand
                    icon_color: green
                    content: >-
                      {% set d = state_attr('sensor.garden_irrigation_profile',
                         'lawn_durations') %}
                      {% set base = (d.values() | sum) if d else 0 %}
                      {% set oneoff = is_state('input_boolean.garden_oneoff_armed', 'on')
                         and states('input_select.garden_oneoff_type') in ['Lawn', 'Full'] %}
                      {% set s = 4500 if (base == 0 and oneoff) else base %}
                      {% if s == 0 %}—
                      {% elif s >= 3600 %}{{ (s / 3600) | round(1) }}h
                      {% else %}{{ (s // 60) | int }}m{% endif %}
              - type: custom:mushroom-chips-card
                alignment: justified
                chips:
                  - type: template
                    icon: mdi:water
                    icon_color: cyan
                    content: >-
                      {% set v = states('sensor.garden_drip_last_run') %}
                      Drip: {% if v in ['unknown', 'unavailable', 'None', ''] %}
                      never{% else %}{{ v | as_timestamp
                         | timestamp_custom('%a %H:%M') }}{% endif %}
                  - type: template
                    icon: mdi:clock-outline
                    icon_color: cyan
                    content: >-
                      {% set v = states('sensor.garden_drip_next_run') %}
                      Next: {% if v in ['unknown', 'unavailable', 'None', ''] %}
                      —{% else %}{{ v | as_timestamp
                         | timestamp_custom('%a %H:%M') }}{% endif %}
                  - type: template
                    icon: mdi:timer-sand
                    icon_color: cyan
                    content: >-
                      {% set base = state_attr('sensor.garden_irrigation_profile',
                         'drip_duration') | int(0) %}
                      {% set oneoff = is_state('input_boolean.garden_oneoff_armed', 'on')
                         and states('input_select.garden_oneoff_type') in ['Drip', 'Full'] %}
                      {% set s = 2700 if (base == 0 and oneoff) else base %}
                      {% if s == 0 %}—
                      {% elif s >= 3600 %}{{ (s / 3600) | round(1) }}h
                      {% else %}{{ (s // 60) | int }}m{% endif %}
              - type: heading
                heading: Schedule One-off
                heading_style: subtitle
              - type: custom:mushroom-select-card
                entity: input_select.garden_oneoff_type
                name: What
                icon: mdi:sprinkler-variant
                layout: horizontal
              - type: entities
                entities:
                  - entity: input_datetime.garden_oneoff_at
                    name: When
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: >-
                      {{ 'Armed' if is_state('input_boolean.garden_oneoff_armed', 'on')
                         else 'Schedule' }}
                    secondary: >-
                      {% if is_state('input_boolean.garden_oneoff_armed', 'on') %}
                      {{ states('input_select.garden_oneoff_type') }} @
                      {{ states('input_datetime.garden_oneoff_at')
                         | as_timestamp | timestamp_custom('%a %H:%M') }}
                      {% else %}Tap to arm{% endif %}
                    icon: mdi:timer-play
                    icon_color: >-
                      {{ 'orange' if is_state('input_boolean.garden_oneoff_armed', 'on')
                         else 'grey' }}
                    layout: horizontal
                    tap_action:
                      action: perform-action
                      perform_action: input_boolean.turn_on
                      target:
                        entity_id: input_boolean.garden_oneoff_armed
                  - type: custom:mushroom-template-card
                    primary: Cancel
                    icon: mdi:timer-off
                    icon_color: red
                    layout: horizontal
                    tap_action:
                      action: perform-action
                      perform_action: input_boolean.turn_off
                      target:
                        entity_id: input_boolean.garden_oneoff_armed
          - type: vertical-stack
            cards:
              - type: heading
                heading: 7-Day Schedule
                heading_style: heading
              - type: markdown
                entities:
                  - input_select.garden_irrigation_mode
                  - sensor.garden_irrigation_profile
                card_mod:
                  style:
                    ha-markdown$: |
                      ha-markdown-element table {
                        width: 100%;
                        border-collapse: collapse;
                      }
                      ha-markdown-element th,
                      ha-markdown-element td {
                        padding: 4px 6px;
                        text-align: left;
                      }
                      ha-markdown-element tr.today td {
                        font-weight: 600;
                      }
                      ha-markdown-element td.note {
                        color: var(--secondary-text-color);
                      }
                content: |
                  {% set mode = states('input_select.garden_irrigation_mode') %}
                  {% macro dur(s) -%}
                  {%- if s >= 3600 -%}{{ (s / 3600) | round(1) }}h
                  {%- elif s >= 60 -%}{{ (s // 60) | int }}m
                  {%- else -%}{{ s | int }}s{%- endif -%}
                  {%- endmacro %}
                  {# Lawn total seconds per (mode, month). z1+z2+z3:
                     Eco/Standard 1800+1080+1080=3960, Intensive 2100+1200+1200=4500 #}
                  {% macro lawn_total(m, mo) -%}
                  {%- if m == 'Smart' -%}
                    {%- if mo in [5, 6] -%}3960
                    {%- elif mo in [7, 8] -%}4500
                    {%- elif mo == 9 -%}3960
                    {%- else -%}0{%- endif -%}
                  {%- elif m == 'Eco' -%}3960
                  {%- elif m == 'Standard' -%}3960
                  {%- elif m == 'Intensive' -%}4500
                  {%- elif m == 'Testing' -%}90
                  {%- else -%}0{%- endif -%}
                  {%- endmacro %}
                  {# Per-zone minutes "z1·z2·z3" for (mode, month).
                     Eco/Standard 30·18·18, Intensive 35·20·20, Testing 0.5·0.5·0.5 #}
                  {% macro lawn_zones(m, mo) -%}
                  {%- set eff = m -%}
                  {%- if m == 'Smart' -%}
                    {%- if mo in [5, 6] -%}{%- set eff = 'Standard' -%}
                    {%- elif mo in [7, 8] -%}{%- set eff = 'Intensive' -%}
                    {%- elif mo == 9 -%}{%- set eff = 'Eco' -%}
                    {%- else -%}{%- set eff = 'Off' -%}{%- endif -%}
                  {%- endif -%}
                  {%- if eff in ['Eco', 'Standard'] -%}30·18·18
                  {%- elif eff == 'Intensive' -%}35·20·20
                  {%- elif eff == 'Testing' -%}30s·30s·30s
                  {%- else -%}—{%- endif -%}
                  {%- endmacro %}
                  {# Cycle count (profile: 2 for all watering modes, 1 for Testing) #}
                  {% macro lawn_cycles(m) -%}
                  {%- if m == 'Testing' -%}1{%- else -%}2{%- endif -%}
                  {%- endmacro %}
                  {# Drip seconds per run #}
                  {% macro drip_dur(m, mo) -%}
                  {%- if m == 'Smart' -%}
                    {%- if mo in [5, 6, 7, 8, 9, 10] -%}2700
                    {%- else -%}0{%- endif -%}
                  {%- elif m in ['Eco', 'Standard', 'Intensive'] -%}2700
                  {%- elif m == 'Testing' -%}30
                  {%- else -%}0{%- endif -%}
                  {%- endmacro %}
                  {# Drip runs per day #}
                  {% macro drip_runs(m, mo) -%}
                  {%- if m == 'Smart' -%}
                    {%- if mo in [5, 6, 7, 8, 9, 10] -%}1
                    {%- else -%}0{%- endif -%}
                  {%- elif m in ['Eco', 'Standard', 'Intensive', 'Testing'] -%}1
                  {%- else -%}0{%- endif -%}
                  {%- endmacro %}
                  {# Lawn run today? (m=mode, mo=month, dow=ISO weekday).
                     Eco 2×/wk [2,6], Standard 3×/wk [2,4,6], Intensive 4×/wk [1,2,4,5].
                     Smart: May–Jun→Standard, Jul–Aug→Intensive, Sep→Eco. #}
                  {% macro lawn_run(m, mo, dow) -%}
                  {%- if m == 'Smart' -%}
                    {%- if mo in [5, 6] -%}{{ dow in [2, 4, 6] }}
                    {%- elif mo in [7, 8] -%}{{ dow in [1, 2, 4, 5] }}
                    {%- elif mo == 9 -%}{{ dow in [2, 6] }}
                    {%- else -%}False{%- endif -%}
                  {%- elif m == 'Eco' -%}{{ dow in [2, 6] }}
                  {%- elif m == 'Standard' -%}{{ dow in [2, 4, 6] }}
                  {%- elif m == 'Intensive' -%}{{ dow in [1, 2, 4, 5] }}
                  {%- elif m == 'Testing' -%}True
                  {%- else -%}False{%- endif -%}
                  {%- endmacro %}
                  {# Drip run today? (m=mode, mo=month, dow=ISO weekday, yday=day-of-year) #}
                  {% macro drip_run(m, mo, dow, yday) -%}
                  {%- if m == 'Smart' -%}
                    {%- if mo in [5, 6] -%}{{ dow in [2, 4, 6] }}
                    {%- elif mo in [7, 8] -%}{{ dow in [1, 2, 4, 5] }}
                    {%- elif mo == 9 -%}{{ dow in [2, 6] }}
                    {%- elif mo == 10 -%}{{ yday % 3 == 0 }}
                    {%- else -%}False{%- endif -%}
                  {%- elif m == 'Eco' -%}{{ dow in [2, 6] }}
                  {%- elif m == 'Standard' -%}{{ dow in [2, 4, 6] }}
                  {%- elif m == 'Intensive' -%}{{ dow in [1, 2, 4, 5] }}
                  {%- elif m == 'Testing' -%}True
                  {%- else -%}False{%- endif -%}
                  {%- endmacro %}
                  {% if mode == 'Manual' %}
                  _Manual mode — no scheduled runs._
                  {% else %}
                  | Day | Lawn | Zones (z1·z2·z3) | Drip |
                  |---|---|---|---|
                  {% for i in range(0, 7) -%}
                  {%- set d = now() + timedelta(days=i) -%}
                  {%- set dow = d.isoweekday() -%}
                  {%- set month = d.month -%}
                  {%- set yday = d.timetuple().tm_yday -%}
                  {%- set lawn_s = lawn_total(mode, month) | int -%}
                  {%- set drip_s = drip_dur(mode, month) | int -%}
                  {%- set runs = drip_runs(mode, month) | int -%}
                  {%- set lr = lawn_run(mode, month, dow) | trim == 'True' -%}
                  {%- set dr = drip_run(mode, month, dow, yday) | trim == 'True' -%}
                  {%- set lawn_cell = ('✓ ' ~ dur(lawn_s)) if (lr and lawn_s > 0) else '—' -%}
                  {%- set zones_cell = (lawn_zones(mode, month) ~ ' ×' ~ lawn_cycles(mode) | trim) if (lr and lawn_s > 0) else '—' -%}
                  {%- set drip_cell = ('✓ ' ~ dur(drip_s) ~ (' ×' ~ runs if runs > 1 else '')) if (dr and drip_s > 0) else '—' -%}
                  | {% if i == 0 %}**{{ d.strftime('%a %d') }}**{% else %}{{ d.strftime('%a %d') }}{% endif %} | {{ lawn_cell }} | {{ zones_cell }} | {{ drip_cell }} |
                  {% endfor %}

                  _Lawn runs cycle &amp; soak: {{ lawn_cycles(mode) | trim }} cycles · 15m soak between. Zone mins = total per run._
                  {% endif %}
              - type: heading
                heading: Run Now
                heading_style: subtitle
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    entity: script.garden_lawn_irrigation
                    primary: Lawn
                    icon: mdi:sprinkler-variant
                    icon_color: green
                    layout: vertical
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.garden_lawn_irrigation
                  - type: custom:mushroom-template-card
                    entity: script.garden_drip_irrigation
                    primary: Drip
                    icon: mdi:water
                    icon_color: cyan
                    layout: vertical
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.garden_drip_irrigation
                  - type: custom:mushroom-template-card
                    entity: script.garden_full_irrigation
                    primary: Full
                    icon: mdi:sprinkler
                    icon_color: teal
                    layout: vertical
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.garden_full_irrigation

      # ── Bottom band: Pergola | Gates | Terrace ──────────────────
      - type: horizontal-stack
        grid_options:
          columns: full
        cards:
          - type: vertical-stack
            cards:
              - type: heading
                heading: Pergola
                heading_style: subtitle
              - type: custom:mushroom-cover-card
                entity: cover.pergola_roof_proxy
                name: Pergola Roof
                icon: mdi:pergola
                show_buttons_control: true
                show_position_control: false
                layout: horizontal
              - type: custom:mushroom-select-card
                entity: input_select.pergola_weather_mode
                name: Weather Mode
                icon: mdi:weather-pouring
                layout: horizontal
          - type: vertical-stack
            cards:
              - type: heading
                heading: Gates
                heading_style: subtitle
              - type: custom:mushroom-cover-card
                entity: cover.garden_park_gate
                name: Garden Park Gate
                icon: mdi:gate-arrow-right
                show_buttons_control: true
                show_position_control: false
                layout: horizontal
              - type: custom:mushroom-cover-card
                entity: cover.garage_door
                name: Garage Gate
                icon: mdi:garage
                show_buttons_control: true
                show_position_control: false
                layout: horizontal
          - type: vertical-stack
            cards:
              - type: heading
                heading: Terrace
                heading_style: subtitle
              - type: custom:mushroom-chips-card
                chips:
                  - type: template
                    entity: binary_sensor.terrace_main_door
                    icon: >-
                      {{ 'mdi:door-open' if
                      is_state('binary_sensor.terrace_main_door', 'on')
                      else 'mdi:door-closed' }}
                    icon_color: >-
                      {{ 'red' if is_state('binary_sensor.terrace_main_door', 'on')
                      else 'green' }}
                    content: >-
                      Main: {{ 'Open' if
                      is_state('binary_sensor.terrace_main_door', 'on')
                      else 'Closed' }}
                    tap_action:
                      action: more-info
                  - type: template
                    entity: binary_sensor.terrace_left_door
                    icon: >-
                      {{ 'mdi:door-open' if
                      is_state('binary_sensor.terrace_left_door', 'on')
                      else 'mdi:door-closed' }}
                    icon_color: >-
                      {{ 'red' if is_state('binary_sensor.terrace_left_door', 'on')
                      else 'green' }}
                    content: >-
                      Left: {{ 'Open' if
                      is_state('binary_sensor.terrace_left_door', 'on')
                      else 'Closed' }}
                    tap_action:
                      action: more-info
                  - type: template
                    entity: binary_sensor.porch_is_dark
                    icon: >-
                      {{ 'mdi:weather-night' if
                      is_state('binary_sensor.porch_is_dark', 'on')
                      else 'mdi:white-balance-sunny' }}
                    icon_color: >-
                      {{ 'indigo' if is_state('binary_sensor.porch_is_dark', 'on')
                      else 'amber' }}
                    content: >-
                      Porch: {{ 'Dark' if is_state('binary_sensor.porch_is_dark', 'on')
                      else 'Light' }}
                    tap_action:
                      action: more-info
