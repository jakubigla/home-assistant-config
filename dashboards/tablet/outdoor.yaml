---
title: Outdoor
path: outdoor
icon: mdi:tree
type: sections
max_columns: 3
sections:
  - column_span: 3
    cards:
      - type: weather-forecast
        grid_options:
          columns: full
        entity: weather.forecast_home
        show_current: true
        show_forecast: true
        forecast_type: hourly
        forecast_slots: 10

      # ── Top band: Garden controls (left) | Schedule One-off (right) ──
      - type: horizontal-stack
        grid_options:
          columns: full
        cards:
          - type: vertical-stack
            cards:
              - type: heading
                heading: Garden — Irrigation
                heading_style: title
              - type: custom:mushroom-select-card
                entity: input_select.garden_irrigation_mode
                name: Irrigation Mode
                icon: mdi:sprinkler
                layout: horizontal
              - type: custom:mushroom-chips-card
                alignment: justified
                chips:
                  - type: template
                    icon: mdi:sprinkler-variant
                    icon_color: green
                    content: >-
                      {% set v = states('sensor.garden_lawn_last_run') %}
                      Lawn: {% if v in ['unknown', 'unavailable', 'None', ''] %}
                      never{% else %}{{ v | as_timestamp
                         | timestamp_custom('%a %H:%M') }}{% endif %}
                  - type: template
                    icon: mdi:clock-outline
                    icon_color: green
                    content: >-
                      {% set v = states('sensor.garden_lawn_next_run') %}
                      Next: {% if v in ['unknown', 'unavailable', 'None', ''] %}
                      —{% else %}{{ v | as_timestamp
                         | timestamp_custom('%a %H:%M') }}{% endif %}
                  - type: template
                    icon: mdi:timer-sand
                    icon_color: green
                    content: >-
                      {% set d = state_attr('sensor.garden_irrigation_profile',
                         'lawn_durations') %}
                      {% set base = (d.values() | sum) if d else 0 %}
                      {% set oneoff = is_state('input_boolean.garden_oneoff_armed', 'on')
                         and states('input_select.garden_oneoff_type') in ['Lawn', 'Full'] %}
                      {% set s = 4500 if (base == 0 and oneoff) else base %}
                      {% if s == 0 %}—
                      {% elif s >= 3600 %}{{ (s / 3600) | round(1) }}h
                      {% else %}{{ (s // 60) | int }}m{% endif %}
              - type: custom:mushroom-chips-card
                alignment: justified
                chips:
                  - type: template
                    icon: mdi:water
                    icon_color: cyan
                    content: >-
                      {% set v = states('sensor.garden_drip_last_run') %}
                      Drip: {% if v in ['unknown', 'unavailable', 'None', ''] %}
                      never{% else %}{{ v | as_timestamp
                         | timestamp_custom('%a %H:%M') }}{% endif %}
                  - type: template
                    icon: mdi:clock-outline
                    icon_color: cyan
                    content: >-
                      {% set v = states('sensor.garden_drip_next_run') %}
                      Next: {% if v in ['unknown', 'unavailable', 'None', ''] %}
                      —{% else %}{{ v | as_timestamp
                         | timestamp_custom('%a %H:%M') }}{% endif %}
                  - type: template
                    icon: >-
                      {% if is_state('input_select.garden_irrigation_mode', 'Smart') %}
                      mdi:water-percent{% else %}mdi:timer-sand{% endif %}
                    icon_color: cyan
                    content: >-
                      {% if is_state('input_select.garden_irrigation_mode', 'Smart') %}
                      {% set st = states('sensor.garden_drip_soil_status') %}
                      {% set dry = state_attr('sensor.garden_drip_soil_status', 'driest') %}
                      {% if st == 'armed' %}Armed @ {{ dry | int }}%
                      {% elif dry is not none %}On soil {{ dry | int }}%
                      {% else %}Soil-driven{% endif %}
                      {% else %}
                      {% set base = state_attr('sensor.garden_irrigation_profile',
                         'drip_duration') | int(0) %}
                      {% set oneoff = is_state('input_boolean.garden_oneoff_armed', 'on')
                         and states('input_select.garden_oneoff_type') in ['Drip', 'Full'] %}
                      {% set s = 2700 if (base == 0 and oneoff) else base %}
                      {% if s == 0 %}—
                      {% elif s >= 3600 %}{{ (s / 3600) | round(1) }}h
                      {% else %}{{ (s // 60) | int }}m{% endif %}
                      {% endif %}
              - type: heading
                heading: Schedule One-off
                heading_style: subtitle
              - type: custom:mushroom-select-card
                entity: input_select.garden_oneoff_type
                name: What
                icon: mdi:sprinkler-variant
                layout: horizontal
              - type: entities
                entities:
                  - entity: input_datetime.garden_oneoff_at
                    name: When
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: >-
                      {{ 'Armed' if is_state('input_boolean.garden_oneoff_armed', 'on')
                         else 'Schedule' }}
                    secondary: >-
                      {% if is_state('input_boolean.garden_oneoff_armed', 'on') %}
                      {{ states('input_select.garden_oneoff_type') }} @
                      {{ states('input_datetime.garden_oneoff_at')
                         | as_timestamp | timestamp_custom('%a %H:%M') }}
                      {% else %}Tap to arm{% endif %}
                    icon: mdi:timer-play
                    icon_color: >-
                      {{ 'orange' if is_state('input_boolean.garden_oneoff_armed', 'on')
                         else 'grey' }}
                    layout: horizontal
                    tap_action:
                      action: perform-action
                      perform_action: input_boolean.turn_on
                      target:
                        entity_id: input_boolean.garden_oneoff_armed
                  - type: custom:mushroom-template-card
                    primary: Cancel
                    icon: mdi:timer-off
                    icon_color: red
                    layout: horizontal
                    tap_action:
                      action: perform-action
                      perform_action: input_boolean.turn_off
                      target:
                        entity_id: input_boolean.garden_oneoff_armed
              - type: heading
                heading: Run Lawn Now
                heading_style: subtitle
              - type: custom:mushroom-number-card
                entity: input_number.garden_ondemand_minutes
                name: Minutes per zone
                display_mode: slider
                icon: mdi:timer-outline
              - type: custom:mushroom-template-card
                primary: >-
                  {% if is_state('script.garden_ondemand_lawn', 'on') %}
                  Running lawn…
                  {% else %}Run Lawn{% endif %}
                secondary: >-
                  {% if is_state('valve.lawn_sprinkler_zone_1', 'open') %}
                  Zone 1 watering
                  {% elif is_state('valve.lawn_sprinkler_zone_2', 'open') %}
                  Zone 2 watering
                  {% elif is_state('valve.lawn_sprinkler_zone_3', 'open') %}
                  Zone 3 watering
                  {% else %}
                  Zones 1→2→3 · {{ states('input_number.garden_ondemand_minutes') | int }} min each
                  {% endif %}
                icon: mdi:sprinkler
                icon_color: >-
                  {{ 'blue' if is_state('script.garden_ondemand_lawn', 'on') else 'grey' }}
                layout: horizontal
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.garden_ondemand_lawn
          - type: vertical-stack
            cards:
              - type: heading
                heading: 7-Day Schedule
                heading_style: heading
              - type: markdown
                entities:
                  - input_select.garden_irrigation_mode
                  - sensor.garden_irrigation_profile
                card_mod:
                  style:
                    ha-markdown$: |
                      ha-markdown-element table {
                        width: 100%;
                        border-collapse: collapse;
                      }
                      ha-markdown-element th,
                      ha-markdown-element td {
                        padding: 4px 6px;
                        text-align: left;
                      }
                      ha-markdown-element tr.today td {
                        font-weight: 600;
                      }
                      ha-markdown-element td.note {
                        color: var(--secondary-text-color);
                      }
                content: |
                  {% set mode = states('input_select.garden_irrigation_mode') %}
                  {% set sched = state_attr('sensor.garden_schedule_brain', 'schedule_7day') or [] %}
                  {% set tz = now().tzinfo %}
                  {% macro dur(s) -%}
                  {%- if s >= 3600 -%}{{ (s / 3600) | round(1) }}h
                  {%- elif s >= 60 -%}{{ (s // 60) | int }}m
                  {%- else -%}{{ s | int }}s{%- endif -%}
                  {%- endmacro %}
                  {% if mode == 'Manual' %}
                  _Manual mode — no scheduled runs._
                  {% else %}
                  | Day | Lawn | Zones (z1·z2·z3) | Drip |
                  |---|---|---|---|
                  {% for row in sched -%}
                  {%- set d = strptime(row.date, '%Y-%m-%d').replace(tzinfo=tz) -%}
                  {%- set side = (row.lawn_am_min * 0.6) | round(0) | int -%}
                  {%- if row.sessions == 2 -%}
                    {%- set lawn_cell = '✓ AM ' ~ row.lawn_am_min ~ 'm + PM ' ~ row.lawn_pm_min ~ 'm' -%}
                    {%- set zones_cell = (row.lawn_am_min ~ '·' ~ side ~ '·' ~ side ~ ' +PM') -%}
                  {%- elif row.sessions == 1 -%}
                    {%- set lawn_cell = '✓ ' ~ row.lawn_am_min ~ 'm' -%}
                    {%- set zones_cell = (row.lawn_am_min ~ '·' ~ side ~ '·' ~ side) -%}
                  {%- else -%}
                    {%- set lawn_cell = '—' -%}
                    {%- set zones_cell = '—' -%}
                  {%- endif -%}
                  {%- if mode == 'Smart' -%}
                    {%- set drip_cell = '💧 soil' -%}
                  {%- else -%}
                    {%- set drip_cell = ('✓ ' ~ dur(row.drip_min * 60)) if row.drip_min > 0 else '—' -%}
                  {%- endif -%}
                  | {% if loop.first %}**{{ d.strftime('%a %d') }}**{% else %}{{ d.strftime('%a %d') }}{% endif %} | {{ lawn_cell }} | {{ zones_cell }} | {{ drip_cell }} |
                  {% endfor %}

                  {% if mode == 'Seasonal' %}
                  _Seasonal: deep AM soak + ~60% PM top-up on 2-session days. AM {{ state_attr('sensor.garden_irrigation_profile', 'am_time') | trim }}{% if state_attr('sensor.garden_irrigation_profile', 'pm_time') | trim %} + PM {{ state_attr('sensor.garden_irrigation_profile', 'pm_time') | trim }}{% endif %}. Drip Mon/Thu._
                  {% elif mode == 'Smart' %}
                  _Smart: drip is demand-based, not scheduled — fires when driest flowerbed &lt; 40%. Status: {{ states('sensor.garden_drip_soil_status') }}{% set dry = state_attr('sensor.garden_drip_soil_status', 'driest') %}{% if dry is not none %} (driest {{ dry | int }}%){% endif %}. Lawn follows the schedule above._
                  {% else %}
                  _Lawn cycle &amp; soak; zone mins = total per run._
                  {% endif %}
                  {% endif %}
              - type: heading
                heading: Run Now
                heading_style: subtitle
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    entity: script.garden_lawn_irrigation
                    primary: Lawn
                    icon: mdi:sprinkler-variant
                    icon_color: green
                    layout: vertical
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.garden_lawn_irrigation
                  - type: custom:mushroom-template-card
                    entity: script.garden_drip_irrigation
                    primary: Drip
                    icon: mdi:water
                    icon_color: cyan
                    layout: vertical
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.garden_drip_irrigation
                  - type: custom:mushroom-template-card
                    entity: script.garden_full_irrigation
                    primary: Full
                    icon: mdi:sprinkler
                    icon_color: teal
                    layout: vertical
                    tap_action:
                      action: perform-action
                      perform_action: script.turn_on
                      target:
                        entity_id: script.garden_full_irrigation

      # ── Bottom band: Pergola | Gates | Terrace ──────────────────
      - type: horizontal-stack
        grid_options:
          columns: full
        cards:
          - type: vertical-stack
            cards:
              - type: heading
                heading: Pergola
                heading_style: subtitle
              - type: custom:mushroom-cover-card
                entity: cover.pergola_roof_proxy
                name: Pergola Roof
                icon: mdi:pergola
                show_buttons_control: true
                show_position_control: false
                layout: horizontal
              - type: custom:mushroom-select-card
                entity: input_select.pergola_weather_mode
                name: Weather Mode
                icon: mdi:weather-pouring
                layout: horizontal
          - type: vertical-stack
            cards:
              - type: heading
                heading: Gates
                heading_style: subtitle
              - type: custom:mushroom-cover-card
                entity: cover.garden_park_gate
                name: Garden Park Gate
                icon: mdi:gate-arrow-right
                show_buttons_control: true
                show_position_control: false
                layout: horizontal
              - type: custom:mushroom-cover-card
                entity: cover.garage_door
                name: Garage Gate
                icon: mdi:garage
                show_buttons_control: true
                show_position_control: false
                layout: horizontal
          - type: vertical-stack
            cards:
              - type: heading
                heading: Terrace
                heading_style: subtitle
              - type: custom:mushroom-chips-card
                chips:
                  - type: template
                    entity: binary_sensor.terrace_main_door
                    icon: >-
                      {{ 'mdi:door-open' if
                      is_state('binary_sensor.terrace_main_door', 'on')
                      else 'mdi:door-closed' }}
                    icon_color: >-
                      {{ 'red' if is_state('binary_sensor.terrace_main_door', 'on')
                      else 'green' }}
                    content: >-
                      Main: {{ 'Open' if
                      is_state('binary_sensor.terrace_main_door', 'on')
                      else 'Closed' }}
                    tap_action:
                      action: more-info
                  - type: template
                    entity: binary_sensor.terrace_left_door
                    icon: >-
                      {{ 'mdi:door-open' if
                      is_state('binary_sensor.terrace_left_door', 'on')
                      else 'mdi:door-closed' }}
                    icon_color: >-
                      {{ 'red' if is_state('binary_sensor.terrace_left_door', 'on')
                      else 'green' }}
                    content: >-
                      Left: {{ 'Open' if
                      is_state('binary_sensor.terrace_left_door', 'on')
                      else 'Closed' }}
                    tap_action:
                      action: more-info
                  - type: template
                    entity: binary_sensor.porch_is_dark
                    icon: >-
                      {{ 'mdi:weather-night' if
                      is_state('binary_sensor.porch_is_dark', 'on')
                      else 'mdi:white-balance-sunny' }}
                    icon_color: >-
                      {{ 'indigo' if is_state('binary_sensor.porch_is_dark', 'on')
                      else 'amber' }}
                    content: >-
                      Porch: {{ 'Dark' if is_state('binary_sensor.porch_is_dark', 'on')
                      else 'Light' }}
                    tap_action:
                      action: more-info
