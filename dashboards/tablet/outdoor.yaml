---
title: Outdoor
path: outdoor
icon: mdi:tree
type: sections
max_columns: 2
sections:
  - column_span: 2
    cards:
      - type: weather-forecast
        grid_options:
          columns: full
        entity: weather.forecast_home
        show_current: true
        show_forecast: true
        forecast_type: hourly
        forecast_slots: 10

  - title: Garden
    cards:
      - type: heading
        heading: Irrigation Mode
        heading_style: subtitle
      - type: custom:mushroom-select-card
        entity: input_select.garden_irrigation_mode
        name: Irrigation Mode
        icon: mdi:sprinkler
        layout: horizontal
      - type: markdown
        title: 7-Day Schedule
        entities:
          - input_select.garden_irrigation_mode
          - sensor.garden_irrigation_profile
          - weather.forecast_home
        content: >
          {%- set mode = states('input_select.garden_irrigation_mode') -%}
          {%- set profiles = state_attr('sensor.garden_irrigation_profile',
              'profiles') -%}
          {%- set temp = state_attr('weather.forecast_home',
              'temperature') | float(20) -%}
          {%- set fmt_dur = namespace(s='') -%}
          {%- macro dur(seconds) -%}
            {%- if seconds >= 3600 -%}{{ (seconds / 3600) | round(1) }}h
            {%- elif seconds >= 60 -%}{{ (seconds // 60) | int }}m
            {%- else -%}{{ seconds | int }}s{%- endif -%}
          {%- endmacro -%}
          {%- macro smart_lawn(month, t) -%}
            {%- if t >= 30 -%}1200
            {%- elif month in [5, 9] -%}600
            {%- elif month in [6, 8] -%}900
            {%- elif month == 7 -%}1200
            {%- else -%}900{%- endif -%}
          {%- endmacro -%}
          {%- macro smart_drip(month, t) -%}
            {%- if t >= 30 -%}3600
            {%- elif month in [5, 9] -%}1800
            {%- elif month in [6, 8] -%}2700
            {%- elif month == 7 -%}3600
            {%- else -%}2700{%- endif -%}
          {%- endmacro -%}
          {%- macro smart_lawn_today(month, dow, t) -%}
            {%- if t >= 30 -%}true
            {%- elif month in [5, 9] -%}{{ dow in [1, 4] }}
            {%- elif month in [6, 8] -%}{{ dow in [1, 3, 5] }}
            {%- elif month == 7 -%}{{ dow in [1, 2, 3, 4, 5] }}
            {%- else -%}{{ dow in [1, 3, 5] }}{%- endif -%}
          {%- endmacro -%}
          {%- macro smart_drip_today(month, dow, t) -%}
            {%- if t >= 30 -%}true
            {%- elif month in [5, 9] -%}{{ dow in [1, 3, 5] }}
            {%- elif month in [6, 8] -%}{{ dow in [1, 2, 3, 4, 5] }}
            {%- elif month == 7 -%}true
            {%- else -%}{{ dow in [1, 3, 5] }}{%- endif -%}
          {%- endmacro -%}
          **Mode:** {{ mode }}
          {% if mode == 'Manual' -%}
          _Manual mode — no scheduled runs._
          {%- else %}
          | Day | Date | Lawn | Drip | Note |
          |---|---|---|---|---|
          {% for i in range(0, 7) -%}
          {%- set d = (now() + timedelta(days=i)) -%}
          {%- set dow = d.isoweekday() -%}
          {%- set month = d.month -%}
          {%- set in_season = month in [5, 6, 7, 8, 9] -%}
          {%- if mode == 'Smart' -%}
            {%- set lawn_run = smart_lawn_today(month, dow, temp)
                | trim == 'True' -%}
            {%- set drip_run = smart_drip_today(month, dow, temp)
                | trim == 'True' -%}
            {%- set lawn_s = smart_lawn(month, temp) | int -%}
            {%- set drip_s = smart_drip(month, temp) | int -%}
          {%- else -%}
            {%- set p = profiles.get(mode, profiles['Standard']) -%}
            {%- set lawn_run = dow in p['lawn_days'] -%}
            {%- set drip_run = dow in p['drip_days'] -%}
            {%- set lu = p['lawn_duration'] -%}
            {%- set du = p['drip_duration'] -%}
            {%- set unit_map = {'s': 1, 'm': 60, 'h': 3600} -%}
            {%- set lawn_s = (lu[:-1] | int) * unit_map[lu[-1]] -%}
            {%- set drip_s = (du[:-1] | int) * unit_map[du[-1]] -%}
          {%- endif -%}
          | {{ d.strftime('%a') }} | {{ d.strftime('%d %b') }} |
          {%- if not in_season %} — {% elif lawn_run %} ✓ {{ dur(lawn_s) }}
          {%- else %} — {% endif %} |
          {%- if not in_season %} — {% elif drip_run %} ✓ {{ dur(drip_s) }}
          {%- else %} — {% endif %} |
          {%- if not in_season %} off-season{% elif i == 0
          and is_state('binary_sensor.garden_should_skip_irrigation', 'on')
          %} skip today{% else %} {% endif %} |
          {% endfor %}
          {%- endif %}
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: sensor.garden_irrigation_profile
            icon: mdi:information-outline
            icon_color: blue
            content: "Profile: {{ states('sensor.garden_irrigation_profile') }}"
            tap_action:
              action: more-info
          - type: template
            entity: binary_sensor.garden_should_skip_irrigation
            icon: >-
              {{ 'mdi:weather-pouring' if
              is_state('binary_sensor.garden_should_skip_irrigation', 'on')
              else 'mdi:weather-sunny' }}
            icon_color: >-
              {{ 'amber' if
              is_state('binary_sensor.garden_should_skip_irrigation', 'on')
              else 'green' }}
            content: >-
              {{ 'Skipping' if
              is_state('binary_sensor.garden_should_skip_irrigation', 'on')
              else 'Run ready' }}
            tap_action:
              action: more-info
          - type: template
            icon: mdi:history
            icon_color: grey
            content: >-
              Last:
              {% set lawn = states.script.garden_lawn_irrigation
              .attributes.last_triggered %}
              {% set drip = states.script.garden_drip_irrigation
              .attributes.last_triggered %}
              {% set full = states.script.garden_full_irrigation
              .attributes.last_triggered %}
              {% set times = [lawn, drip, full]
              | reject('none') | list %}
              {% if times %}
              {% set last = times | map('as_timestamp') | max %}
              {{ last | timestamp_custom('%a %H:%M') }}
              {% else %}never{% endif %}
            tap_action:
              action: perform-action
              perform_action: browser_mod.popup
              data:
                title: Irrigation history
                content:
                  type: logbook
                  entities:
                    - script.garden_lawn_irrigation
                    - script.garden_drip_irrigation
                    - script.garden_full_irrigation
                  hours_to_show: 336
          - type: template
            icon: mdi:clock-outline
            icon_color: teal
            content: >-
              Next:
              {% if is_state('binary_sensor.garden_should_skip_irrigation',
              'on') %}
              skipped
              {% elif now().hour < 6 %}today 06:00
              {% else %}tomorrow 06:00{% endif %}
      - type: heading
        heading: Run Scripts
        heading_style: subtitle
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: script.garden_lawn_irrigation
            primary: Lawn Only
            icon: mdi:sprinkler-variant
            icon_color: green
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_lawn_irrigation
          - type: custom:mushroom-template-card
            entity: script.garden_drip_irrigation
            primary: Drip Only
            icon: mdi:water
            icon_color: cyan
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_drip_irrigation
          - type: custom:mushroom-template-card
            entity: script.garden_full_irrigation
            primary: Full Run
            icon: mdi:sprinkler
            icon_color: teal
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_full_irrigation
      - type: heading
        heading: Valves
        heading_style: subtitle
      - type: custom:mushroom-entity-card
        entity: valve.garden_all
        name: All Garden
        icon: mdi:valve
        layout: horizontal
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_1
            name: Lawn Zone 1
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_2
            name: Lawn Zone 2
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_3
            name: Lawn Zone 3
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.drip_irrigation
            name: Drip
            icon: mdi:water
            layout: horizontal

  - title: Pergola & Gate
    cards:
      - type: heading
        heading: Pergola Roof
        heading_style: subtitle
      - type: custom:mushroom-cover-card
        entity: cover.pergola_roof
        name: Pergola Roof
        icon: mdi:pergola
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: custom:mushroom-select-card
        entity: input_select.pergola_weather_mode
        name: Weather Mode
        icon: mdi:weather-pouring
        layout: horizontal
      - type: heading
        heading: Gates
        heading_style: subtitle
      - type: custom:mushroom-cover-card
        entity: cover.garden_park_gate
        name: Garden Park Gate
        icon: mdi:gate-arrow-right
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: custom:mushroom-cover-card
        entity: cover.garage_door
        name: Garage Gate
        icon: mdi:garage
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: heading
        heading: Terrace
        heading_style: subtitle
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: binary_sensor.terrace_main_door
            icon: >-
              {{ 'mdi:door-open' if
              is_state('binary_sensor.terrace_main_door', 'on')
              else 'mdi:door-closed' }}
            icon_color: >-
              {{ 'red' if is_state('binary_sensor.terrace_main_door', 'on')
              else 'green' }}
            content: >-
              Main: {{ 'Open' if
              is_state('binary_sensor.terrace_main_door', 'on')
              else 'Closed' }}
            tap_action:
              action: more-info
          - type: template
            entity: binary_sensor.terrace_left_door
            icon: >-
              {{ 'mdi:door-open' if
              is_state('binary_sensor.terrace_left_door', 'on')
              else 'mdi:door-closed' }}
            icon_color: >-
              {{ 'red' if is_state('binary_sensor.terrace_left_door', 'on')
              else 'green' }}
            content: >-
              Left: {{ 'Open' if
              is_state('binary_sensor.terrace_left_door', 'on')
              else 'Closed' }}
            tap_action:
              action: more-info
          - type: template
            entity: binary_sensor.porch_is_dark
            icon: >-
              {{ 'mdi:weather-night' if
              is_state('binary_sensor.porch_is_dark', 'on')
              else 'mdi:white-balance-sunny' }}
            icon_color: >-
              {{ 'indigo' if is_state('binary_sensor.porch_is_dark', 'on')
              else 'amber' }}
            content: >-
              Porch: {{ 'Dark' if is_state('binary_sensor.porch_is_dark', 'on')
              else 'Light' }}
            tap_action:
              action: more-info
