---
title: Outdoor
path: outdoor
icon: mdi:tree
type: sections
max_columns: 2
sections:
  - column_span: 2
    cards:
      - type: weather-forecast
        grid_options:
          columns: full
        entity: weather.forecast_home
        show_current: true
        show_forecast: true
        forecast_type: hourly
        forecast_slots: 10

  - title: Garden
    cards:
      - type: heading
        heading: Irrigation Mode
        heading_style: subtitle
      - type: custom:mushroom-select-card
        entity: input_select.garden_irrigation_mode
        name: Irrigation Mode
        icon: mdi:sprinkler
        layout: horizontal
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            icon: mdi:sprinkler-variant
            content: "{{ states('input_select.garden_irrigation_mode') }}"
          - type: template
            icon: mdi:sprinkler
            content: >-
              {% set z1 = states.valve.lawn_sprinkler_zone_1.last_changed %}
              {% set z2 = states.valve.lawn_sprinkler_zone_2.last_changed %}
              {% set z3 = states.valve.lawn_sprinkler_zone_3.last_changed %}
              {% set ts = [z1, z2, z3] | reject('none')
                 | map('as_timestamp') | list %}
              {% if ts %}{{ (ts | max)
                 | timestamp_custom('%a %H:%M') }}{% else %}never{% endif %}
          - type: template
            icon: mdi:water-outline
            content: >-
              {% set v = states.valve.drip_irrigation.last_changed %}
              {% if v %}{{ v | as_timestamp
                 | timestamp_custom('%a %H:%M') }}{% else %}never{% endif %}
      - type: markdown
        title: 7-Day Schedule
        entities:
          - input_select.garden_irrigation_mode
          - sensor.garden_irrigation_profile
        card_mod:
          style:
            ha-markdown$: |
              ha-markdown-element table {
                width: 100%;
                border-collapse: collapse;
              }
              ha-markdown-element th,
              ha-markdown-element td {
                padding: 4px 6px;
                text-align: left;
              }
              ha-markdown-element tr.today td {
                font-weight: 600;
              }
              ha-markdown-element td.note {
                color: var(--secondary-text-color);
              }
        content: |
          {% set mode = states('input_select.garden_irrigation_mode') %}
          {% macro dur(s) -%}
          {%- if s >= 3600 -%}{{ (s / 3600) | round(1) }}h
          {%- elif s >= 60 -%}{{ (s // 60) | int }}m
          {%- else -%}{{ s | int }}s{%- endif -%}
          {%- endmacro %}
          {# Lawn total seconds per (mode, month) #}
          {% macro lawn_total(m, mo) -%}
          {%- if m == 'Smart' -%}
            {%- if mo == 6 -%}7200
            {%- elif mo in [5, 7, 8] -%}6300
            {%- elif mo == 9 -%}5400
            {%- else -%}0{%- endif -%}
          {%- elif m == 'Eco' -%}5400
          {%- elif m == 'Standard' -%}6300
          {%- elif m == 'Intensive' -%}6300
          {%- elif m == 'Testing' -%}90
          {%- else -%}0{%- endif -%}
          {%- endmacro %}
          {# Drip seconds per run #}
          {% macro drip_dur(m, mo) -%}
          {%- if m == 'Smart' -%}
            {%- if mo in [7, 8] -%}1800
            {%- elif mo == 10 -%}900
            {%- elif mo in [5, 6, 9] -%}1200
            {%- else -%}0{%- endif -%}
          {%- elif m == 'Eco' -%}1200
          {%- elif m == 'Standard' -%}1200
          {%- elif m == 'Intensive' -%}1800
          {%- elif m == 'Testing' -%}30
          {%- else -%}0{%- endif -%}
          {%- endmacro %}
          {# Drip runs per day #}
          {% macro drip_runs(m, mo) -%}
          {%- if m == 'Smart' -%}
            {%- if mo in [5, 6, 7, 8, 9] -%}2
            {%- elif mo == 10 -%}1
            {%- else -%}0{%- endif -%}
          {%- elif m in ['Eco', 'Standard', 'Intensive', 'Testing'] -%}2
          {%- else -%}0{%- endif -%}
          {%- endmacro %}
          {# Lawn run today? (m=mode, mo=month, dow=ISO weekday) #}
          {% macro lawn_run(m, mo, dow) -%}
          {%- if m == 'Smart' -%}
            {%- if mo in [5, 6] -%}{{ dow in [2, 6] }}
            {%- elif mo in [7, 8] -%}{{ dow in [1, 3, 6] }}
            {%- elif mo == 9 -%}{{ dow == 6 }}
            {%- else -%}False{%- endif -%}
          {%- elif m == 'Eco' -%}{{ dow == 6 }}
          {%- elif m == 'Standard' -%}{{ dow in [2, 6] }}
          {%- elif m == 'Intensive' -%}{{ dow in [1, 3, 6] }}
          {%- elif m == 'Testing' -%}True
          {%- else -%}False{%- endif -%}
          {%- endmacro %}
          {# Drip run today? (m=mode, mo=month, yday=day-of-year) #}
          {% macro drip_run(m, mo, yday) -%}
          {%- if m == 'Smart' -%}
            {%- if mo in [6, 7, 8] -%}True
            {%- elif mo in [5, 9] -%}{{ yday % 2 == 0 }}
            {%- elif mo == 10 -%}{{ yday % 3 == 0 }}
            {%- else -%}False{%- endif -%}
          {%- elif m == 'Eco' -%}{{ yday % 2 == 0 }}
          {%- elif m == 'Standard' -%}{{ yday % 2 == 0 }}
          {%- elif m == 'Intensive' -%}True
          {%- elif m == 'Testing' -%}True
          {%- else -%}False{%- endif -%}
          {%- endmacro %}
          {% if mode == 'Manual' %}
          _Manual mode — no scheduled runs._
          {% else %}
          | Day | Lawn | Drip |
          |---|---|---|
          {% for i in range(0, 7) -%}
          {%- set d = now() + timedelta(days=i) -%}
          {%- set dow = d.isoweekday() -%}
          {%- set month = d.month -%}
          {%- set yday = d.timetuple().tm_yday -%}
          {%- set lawn_s = lawn_total(mode, month) | int -%}
          {%- set drip_s = drip_dur(mode, month) | int -%}
          {%- set runs = drip_runs(mode, month) | int -%}
          {%- set lr = lawn_run(mode, month, dow) | trim == 'True' -%}
          {%- set dr = drip_run(mode, month, yday) | trim == 'True' -%}
          {%- set lawn_cell = ('✓ ' ~ dur(lawn_s)) if (lr and lawn_s > 0) else '—' -%}
          {%- set drip_cell = ('✓ ' ~ dur(drip_s) ~ (' ×' ~ runs if runs > 1 else '')) if (dr and drip_s > 0) else '—' -%}
          | {% if i == 0 %}**{{ d.strftime('%a %d') }}**{% else %}{{ d.strftime('%a %d') }}{% endif %} | {{ lawn_cell }} | {{ drip_cell }} |
          {% endfor %}
          {% endif %}
      - type: heading
        heading: Run Scripts
        heading_style: subtitle
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            entity: script.garden_lawn_irrigation
            primary: Lawn Only
            icon: mdi:sprinkler-variant
            icon_color: green
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_lawn_irrigation
          - type: custom:mushroom-template-card
            entity: script.garden_drip_irrigation
            primary: Drip Only
            icon: mdi:water
            icon_color: cyan
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_drip_irrigation
      - type: custom:mushroom-template-card
        entity: script.garden_full_irrigation
        primary: Full Run
        icon: mdi:sprinkler
        icon_color: teal
        layout: horizontal
        tap_action:
          action: perform-action
          perform_action: script.turn_on
          target:
            entity_id: script.garden_full_irrigation

  - title: Pergola & Gate
    cards:
      - type: heading
        heading: Pergola Roof
        heading_style: subtitle
      - type: custom:mushroom-cover-card
        entity: cover.pergola_roof
        name: Pergola Roof
        icon: mdi:pergola
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: custom:mushroom-select-card
        entity: input_select.pergola_weather_mode
        name: Weather Mode
        icon: mdi:weather-pouring
        layout: horizontal
      - type: heading
        heading: Gates
        heading_style: subtitle
      - type: custom:mushroom-cover-card
        entity: cover.garden_park_gate
        name: Garden Park Gate
        icon: mdi:gate-arrow-right
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: custom:mushroom-cover-card
        entity: cover.garage_door
        name: Garage Gate
        icon: mdi:garage
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: heading
        heading: Terrace
        heading_style: subtitle
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: binary_sensor.terrace_main_door
            icon: >-
              {{ 'mdi:door-open' if
              is_state('binary_sensor.terrace_main_door', 'on')
              else 'mdi:door-closed' }}
            icon_color: >-
              {{ 'red' if is_state('binary_sensor.terrace_main_door', 'on')
              else 'green' }}
            content: >-
              Main: {{ 'Open' if
              is_state('binary_sensor.terrace_main_door', 'on')
              else 'Closed' }}
            tap_action:
              action: more-info
          - type: template
            entity: binary_sensor.terrace_left_door
            icon: >-
              {{ 'mdi:door-open' if
              is_state('binary_sensor.terrace_left_door', 'on')
              else 'mdi:door-closed' }}
            icon_color: >-
              {{ 'red' if is_state('binary_sensor.terrace_left_door', 'on')
              else 'green' }}
            content: >-
              Left: {{ 'Open' if
              is_state('binary_sensor.terrace_left_door', 'on')
              else 'Closed' }}
            tap_action:
              action: more-info
          - type: template
            entity: binary_sensor.porch_is_dark
            icon: >-
              {{ 'mdi:weather-night' if
              is_state('binary_sensor.porch_is_dark', 'on')
              else 'mdi:white-balance-sunny' }}
            icon_color: >-
              {{ 'indigo' if is_state('binary_sensor.porch_is_dark', 'on')
              else 'amber' }}
            content: >-
              Porch: {{ 'Dark' if is_state('binary_sensor.porch_is_dark', 'on')
              else 'Light' }}
            tap_action:
              action: more-info
      - type: heading
        heading: Valves
        heading_style: subtitle
      - type: custom:mushroom-entity-card
        entity: valve.garden_all
        name: All Garden
        icon: mdi:valve
        layout: horizontal
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_1
            name: Lawn Zone 1
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_2
            name: Lawn Zone 2
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_3
            name: Lawn Zone 3
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.drip_irrigation
            name: Drip
            icon: mdi:water
            layout: horizontal
