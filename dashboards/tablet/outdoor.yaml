---
title: Outdoor
path: outdoor
icon: mdi:tree
type: sections
max_columns: 2
sections:
  - column_span: 2
    cards:
      - type: weather-forecast
        grid_options:
          columns: full
        entity: weather.forecast_home
        show_current: true
        show_forecast: true
        forecast_type: hourly
        forecast_slots: 10

  - title: Garden
    cards:
      - type: heading
        heading: Irrigation Mode
        heading_style: subtitle
      - type: custom:mushroom-select-card
        entity: input_select.garden_irrigation_mode
        name: Irrigation Mode
        icon: mdi:sprinkler
        layout: horizontal
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: sensor.garden_irrigation_profile
            icon: mdi:information-outline
            icon_color: blue
            content: "Profile: {{ states('sensor.garden_irrigation_profile') }}"
            tap_action:
              action: more-info
          - type: template
            entity: binary_sensor.garden_should_skip_irrigation
            icon: >-
              {{ 'mdi:weather-pouring' if
              is_state('binary_sensor.garden_should_skip_irrigation', 'on')
              else 'mdi:weather-sunny' }}
            icon_color: >-
              {{ 'amber' if
              is_state('binary_sensor.garden_should_skip_irrigation', 'on')
              else 'green' }}
            content: >-
              {{ 'Skipping' if
              is_state('binary_sensor.garden_should_skip_irrigation', 'on')
              else 'Run ready' }}
            tap_action:
              action: more-info
          - type: template
            icon: mdi:history
            icon_color: grey
            content: >-
              Last:
              {% set lawn = states.script.garden_lawn_irrigation
              .attributes.last_triggered %}
              {% set drip = states.script.garden_drip_irrigation
              .attributes.last_triggered %}
              {% set full = states.script.garden_full_irrigation
              .attributes.last_triggered %}
              {% set times = [lawn, drip, full]
              | reject('none') | list %}
              {% if times %}
              {% set last = times | map('as_timestamp') | max %}
              {{ last | timestamp_custom('%a %H:%M') }}
              {% else %}never{% endif %}
          - type: template
            icon: mdi:clock-outline
            icon_color: teal
            content: >-
              Next:
              {% if is_state('binary_sensor.garden_should_skip_irrigation',
              'on') %}
              skipped
              {% elif now().hour < 6 %}today 06:00
              {% else %}tomorrow 06:00{% endif %}
      - type: heading
        heading: Run Scripts
        heading_style: subtitle
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: script.garden_lawn_irrigation
            primary: Lawn Only
            icon: mdi:sprinkler-variant
            icon_color: green
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_lawn_irrigation
          - type: custom:mushroom-template-card
            entity: script.garden_drip_irrigation
            primary: Drip Only
            icon: mdi:water
            icon_color: cyan
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_drip_irrigation
          - type: custom:mushroom-template-card
            entity: script.garden_full_irrigation
            primary: Full Run
            icon: mdi:sprinkler
            icon_color: teal
            layout: horizontal
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_full_irrigation
      - type: heading
        heading: Valves
        heading_style: subtitle
      - type: custom:mushroom-entity-card
        entity: valve.garden_all
        name: All Garden
        icon: mdi:valve
        layout: horizontal
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_1
            name: Lawn Zone 1
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_2
            name: Lawn Zone 2
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.lawn_sprinkler_zone_3
            name: Lawn Zone 3
            icon: mdi:sprinkler
            layout: horizontal
          - type: custom:mushroom-entity-card
            entity: valve.drip_irrigation
            name: Drip
            icon: mdi:water
            layout: horizontal

  - title: Pergola & Gate
    cards:
      - type: heading
        heading: Pergola Roof
        heading_style: subtitle
      - type: custom:mushroom-cover-card
        entity: cover.pergola_roof
        name: Pergola Roof
        icon: mdi:pergola
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: custom:mushroom-select-card
        entity: input_select.pergola_weather_mode
        name: Weather Mode
        icon: mdi:weather-pouring
        layout: horizontal
      - type: heading
        heading: Gates
        heading_style: subtitle
      - type: custom:mushroom-cover-card
        entity: cover.garden_park_gate
        name: Garden Park Gate
        icon: mdi:gate-arrow-right
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: custom:mushroom-cover-card
        entity: cover.garage_door
        name: Garage Gate
        icon: mdi:garage
        show_buttons_control: true
        show_position_control: false
        layout: horizontal
      - type: heading
        heading: Terrace
        heading_style: subtitle
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: binary_sensor.terrace_main_door
            icon: >-
              {{ 'mdi:door-open' if
              is_state('binary_sensor.terrace_main_door', 'on')
              else 'mdi:door-closed' }}
            icon_color: >-
              {{ 'red' if is_state('binary_sensor.terrace_main_door', 'on')
              else 'green' }}
            content: >-
              Main: {{ 'Open' if
              is_state('binary_sensor.terrace_main_door', 'on')
              else 'Closed' }}
            tap_action:
              action: more-info
          - type: template
            entity: binary_sensor.terrace_left_door
            icon: >-
              {{ 'mdi:door-open' if
              is_state('binary_sensor.terrace_left_door', 'on')
              else 'mdi:door-closed' }}
            icon_color: >-
              {{ 'red' if is_state('binary_sensor.terrace_left_door', 'on')
              else 'green' }}
            content: >-
              Left: {{ 'Open' if
              is_state('binary_sensor.terrace_left_door', 'on')
              else 'Closed' }}
            tap_action:
              action: more-info
          - type: template
            entity: binary_sensor.porch_is_dark
            icon: >-
              {{ 'mdi:weather-night' if
              is_state('binary_sensor.porch_is_dark', 'on')
              else 'mdi:white-balance-sunny' }}
            icon_color: >-
              {{ 'indigo' if is_state('binary_sensor.porch_is_dark', 'on')
              else 'amber' }}
            content: >-
              Porch: {{ 'Dark' if is_state('binary_sensor.porch_is_dark', 'on')
              else 'Light' }}
            tap_action:
              action: more-info
