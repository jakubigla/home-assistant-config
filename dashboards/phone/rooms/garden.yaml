---
title: Garden
path: room-garden
icon: mdi:tree
subview: true
type: sections
max_columns: 1
sections:
  - cards:
      - type: custom:mushroom-template-card
        icon: mdi:sprinkler
        primary: >-
          Irrigation: {{ states('sensor.garden_irrigation_profile') }}
        secondary: >-
          {% if is_state('binary_sensor.garden_should_skip_irrigation','on') %}
          Skipping today
          {% else %}
          Scheduled
          {% endif %}
        layout: horizontal

  - cards:
      - type: entities
        title: Weather
        entities:
          - entity: binary_sensor.raining
            name: Raining
          - entity: binary_sensor.garden_should_skip_irrigation
            name: Skip Irrigation
          - entity: sensor.garden_irrigation_profile
            name: Profile
