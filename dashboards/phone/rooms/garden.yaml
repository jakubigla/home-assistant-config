---
title: Garden
path: room-garden
icon: mdi:tree
subview: true
type: sections
max_columns: 1
sections:
  - cards:
      - type: custom:mushroom-template-card
        icon: mdi:sprinkler
        primary: >-
          Irrigation: {{ states('sensor.garden_irrigation_profile') }}
        secondary: >-
          {% if is_state('binary_sensor.garden_should_skip_irrigation','on') %}
          Skipping today
          {% elif is_state('binary_sensor.raining','on') %}
          Raining
          {% else %}
          Scheduled
          {% endif %}
        layout: horizontal
      - type: heading
        heading: Run a Zone Now
        heading_style: subtitle
      - type: custom:mushroom-number-card
        entity: input_number.garden_ondemand_minutes
        name: Minutes
        display_mode: slider
        icon: mdi:timer-outline
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: Zone 1
            secondary: >-
              {{ 'Running' if is_state('valve.lawn_sprinkler_zone_1', 'open')
                 else states('input_number.garden_ondemand_minutes') | int ~ ' min' }}
            icon: mdi:sprinkler
            icon_color: >-
              {{ 'blue' if is_state('valve.lawn_sprinkler_zone_1', 'open') else 'grey' }}
            layout: vertical
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_ondemand_zone
              data:
                variables:
                  zone: "1"
          - type: custom:mushroom-template-card
            primary: Zone 2
            secondary: >-
              {{ 'Running' if is_state('valve.lawn_sprinkler_zone_2', 'open')
                 else states('input_number.garden_ondemand_minutes') | int ~ ' min' }}
            icon: mdi:sprinkler
            icon_color: >-
              {{ 'blue' if is_state('valve.lawn_sprinkler_zone_2', 'open') else 'grey' }}
            layout: vertical
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_ondemand_zone
              data:
                variables:
                  zone: "2"
          - type: custom:mushroom-template-card
            primary: Zone 3
            secondary: >-
              {{ 'Running' if is_state('valve.lawn_sprinkler_zone_3', 'open')
                 else states('input_number.garden_ondemand_minutes') | int ~ ' min' }}
            icon: mdi:sprinkler
            icon_color: >-
              {{ 'blue' if is_state('valve.lawn_sprinkler_zone_3', 'open') else 'grey' }}
            layout: vertical
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.garden_ondemand_zone
              data:
                variables:
                  zone: "3"
