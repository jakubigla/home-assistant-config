---
title: Garden
path: room-garden
icon: mdi:tree
subview: true
type: sections
max_columns: 1
sections:
  - cards:
      - type: custom:mushroom-template-card
        icon: mdi:sprinkler
        primary: >-
          Irrigation: {{ states('sensor.garden_irrigation_profile') }}
        secondary: >-
          {% if is_state('binary_sensor.garden_should_skip_irrigation','on') %}
          Skipping today
          {% elif is_state('binary_sensor.raining','on') %}
          Raining
          {% else %}
          Scheduled
          {% endif %}
        layout: horizontal
      - type: heading
        heading: Run Lawn Now
        heading_style: subtitle
      - type: custom:mushroom-number-card
        entity: input_number.garden_ondemand_minutes
        name: Minutes per zone
        display_mode: slider
        icon: mdi:timer-outline
      - type: custom:mushroom-template-card
        primary: >-
          {% if is_state('script.garden_ondemand_lawn', 'on') %}
          Running lawn…
          {% else %}Run Lawn{% endif %}
        secondary: >-
          {% if is_state('valve.lawn_sprinkler_zone_1', 'open') %}
          Zone 1 watering
          {% elif is_state('valve.lawn_sprinkler_zone_2', 'open') %}
          Zone 2 watering
          {% elif is_state('valve.lawn_sprinkler_zone_3', 'open') %}
          Zone 3 watering
          {% else %}
          Zones 1→2→3 · {{ states('input_number.garden_ondemand_minutes') | int }} min each
          {% endif %}
        icon: mdi:sprinkler
        icon_color: >-
          {{ 'blue' if is_state('script.garden_ondemand_lawn', 'on') else 'grey' }}
        layout: horizontal
        tap_action:
          action: perform-action
          perform_action: script.turn_on
          target:
            entity_id: script.garden_ondemand_lawn
