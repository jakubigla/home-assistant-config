---
title: Gate
path: room-gate
icon: mdi:gate
subview: true
type: sections
max_columns: 1
sections:
  - cards:
      - type: custom:mushroom-template-card
        entity: cover.all_gates
        icon: mdi:gate
        icon_color: "{{ 'green' if is_state('cover.all_gates','closed') else 'red' }}"
        primary: All Gates
        secondary: "{{ states('cover.all_gates') | capitalize }}"
        layout: horizontal
        tap_action:
          action: more-info

  - cards:
      - type: custom:mushroom-cover-card
        entity: cover.garden_park_gate
        name: Park Gate
        show_buttons_control: true
        layout: horizontal
      - type: custom:mushroom-cover-card
        entity: cover.garage_door
        name: Garage Door
        show_buttons_control: true
        layout: horizontal
