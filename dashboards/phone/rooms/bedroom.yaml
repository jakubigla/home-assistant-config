---
title: Bedroom
path: room-bedroom
icon: mdi:bed
subview: true
type: sections
max_columns: 1
sections:
  - cards:
      - type: custom:mushroom-template-card
        icon: mdi:thermometer
        primary: >-
          {{ states('sensor.bedroom_hygro_temperature') | float(0) | round(1) }}°C
        secondary: >-
          Humidity {{ states('sensor.bedroom_hygro_humidity') | float(0) | round(0) | int }}%
        layout: horizontal

  - cards:
      - type: custom:mushroom-light-card
        entity: light.bedroom_bed
        name: Bed
        show_brightness_control: true
        use_light_color: true
        layout: horizontal
      - type: custom:mushroom-light-card
        entity: light.bedroom_jakub
        name: Jakub
        show_brightness_control: true
        use_light_color: true
        layout: horizontal
      - type: custom:mushroom-light-card
        entity: light.bedroom_sona
        name: Sona
        show_brightness_control: true
        use_light_color: true
        layout: horizontal
      - type: custom:mushroom-light-card
        entity: light.bedroom_wardrobe
        name: Wardrobe
        show_brightness_control: true
        layout: horizontal
      - type: custom:mushroom-light-card
        entity: light.bedroom_leds
        name: LEDs
        show_brightness_control: true
        use_light_color: true
        layout: horizontal
      - type: custom:mushroom-light-card
        entity: light.bedroom_reflectors
        name: Reflectors
        show_brightness_control: true
        layout: horizontal

  - cards:
      - type: custom:mushroom-cover-card
        entity: cover.bedroom
        name: Curtains
        show_position_control: true
        show_buttons_control: true
        layout: horizontal

  - cards:
      - type: custom:mushroom-entity-card
        entity: climate.bedroom
        name: Climate
        layout: horizontal
