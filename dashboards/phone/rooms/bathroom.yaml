---
title: Bathroom
path: room-bathroom
icon: mdi:bathtub
subview: true
type: sections
max_columns: 1
sections:
  - cards:
      - type: custom:mushroom-template-card
        icon: mdi:shower
        primary: Bathroom
        secondary: >-
          Presence: {{ 'occupied' if is_state('binary_sensor.bathroom_presence','on') else 'clear' }} ·
          Door: {{ 'open' if is_state('binary_sensor.bathroom_door','on') else 'closed' }}
        layout: horizontal

  - cards:
      - type: custom:mushroom-light-card
        entity: light.bathroom_main
        name: Main
        show_brightness_control: true
        layout: horizontal
      - type: custom:mushroom-light-card
        entity: light.bathroom_ambient
        name: Ambient
        show_brightness_control: true
        use_light_color: true
        layout: horizontal
      - type: custom:mushroom-light-card
        entity: light.bathroom_mirror
        name: Mirror
        show_brightness_control: true
        layout: horizontal
