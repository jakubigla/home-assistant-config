<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Bedroom presence lighting</title>
  <desc>Top-down floor plan from the architect drawing: wardrobe top-left, ensuite bottom-left, bed against the right wall. A person enters the bottom-centre door, the PIR cone pulses, the bed stripe glows on while dark, then after a 10-minute vacancy the lights fade off.</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="foot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7fd1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampcast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd17a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd17a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- scale: 1m = 100u, origin offset (40, 80). area 6.32m x 4.8m -->
  <rect width="720" height="600" rx="14" fill="#0f1420"/>
  <text x="22" y="36" fill="#cdd9e8" font-size="16" font-weight="700">Bedroom — presence lighting</text>
  <text x="22" y="56" fill="#5a6b80" font-size="12.5">enter + dark → bed stripe on  ·  vacant 10 min → off</text>

  <!-- status word (one visible per phase), top-right -->
  <g text-anchor="end" font-size="15" font-weight="700">
    <text x="698" y="40" fill="#7fd1ff" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.06;0.10;0.28;0.31;0.9;1" dur="10s" repeatCount="indefinite"/>● motion</text>
    <text x="698" y="40" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.34;0.37;0.74;0.77;1" dur="10s" repeatCount="indefinite"/>☀ stripe ON</text>
    <text x="698" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.80;0.83;0.93;0.96;1" dur="10s" repeatCount="indefinite"/>vacant → off</text>
  </g>

  <!-- ===== room shells (origin 40,80; 1m=100u) ===== -->
  <!-- bedroom: x1.98..6.32 m, y0..4.8 m  -> (238,80) w434 h480 -->
  <rect x="238" y="80" width="434" height="480" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>
  <!-- wardrobe: x0..1.98, y0..1.70 -> (40,80) w198 h170 -->
  <rect x="40" y="80" width="198" height="170" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <text x="139" y="170" fill="#46566e" font-size="12" text-anchor="middle">wardrobe</text>
  <!-- ensuite: x0..1.98, y2.01..4.8 -> (40,281) w198 h279 -->
  <rect x="40" y="281" width="198" height="279" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <text x="139" y="415" fill="#46566e" font-size="12" text-anchor="middle">ensuite</text>
  <text x="139" y="433" fill="#3c4a60" font-size="10" text-anchor="middle">mmWave</text>

  <!-- door: bottom wall of bedroom, x2.1..3.0 -> 250..340 at y=560 -->
  <rect x="250" y="552" width="90" height="9" rx="2" fill="#3a4a66"/>
  <text x="295" y="578" fill="#5a6b80" font-size="11" text-anchor="middle">door</text>

  <!-- bed: against right wall, x3.34..4.34(+) lower half. plan bed ~1.0w x1.95h at (334,240) -->
  <rect x="534" y="320" width="120" height="200" rx="7" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <!-- headboard at top of bed (toward room interior / right wall side) -->
  <rect x="534" y="320" width="120" height="22" rx="7" fill="#26334d"/>
  <text x="594" y="430" fill="#54668a" font-size="12" text-anchor="middle">bed</text>
  <!-- pillows -->
  <circle cx="560" cy="356" r="7" fill="#2a3346"/>
  <circle cx="628" cy="356" r="7" fill="#2a3346"/>

  <!-- warm light cast from stripe -->
  <ellipse cx="600" cy="420" rx="150" ry="150" fill="url(#lampcast)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9;0;0"
      keyTimes="0;0.30;0.34;0.78;0.86;0.95;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- bed stripe: along headboard / right wall behind bed -->
  <g filter="url(#glow)">
    <rect x="540" y="314" width="108" height="7" rx="3.5" fill="#3a2f15">
      <animate attributeName="fill"
        values="#3a2f15;#3a2f15;#ffd17a;#ffd17a;#ffd17a;#3a2f15;#3a2f15"
        keyTimes="0;0.30;0.34;0.78;0.86;0.95;1" dur="10s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </rect>
  </g>
  <text x="594" y="306" fill="#7a6a3a" font-size="10" text-anchor="middle">bed stripe</text>

  <!-- ===== PIR cone (entrance), breathing pulse on entry ===== -->
  <text x="360" y="510" fill="#46566e" font-size="11" text-anchor="middle">PIR (entrance)</text>
  <!-- cone fans up/in from the door area -->
  <polygon points="295,552 215,430 375,430" fill="#2e7d32" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.40;0.12;0.40;0;0"
      keyTimes="0;0.14;0.20;0.25;0.30;0.36;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </polygon>

  <!-- ===== person: glow foot + dot, walks door(bottom-centre) -> bedside(right) ===== -->
  <g>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.86;0.9;1" dur="10s" repeatCount="indefinite"/>
    <circle r="22" fill="url(#foot)">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.05;0.30;0.80;0.90;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M295,540 L295,540 L560,420 L560,420 L295,540 L295,540"/>
    </circle>
    <circle r="9" fill="#7fd1ff" stroke="#cdeeff" stroke-width="2">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.05;0.30;0.80;0.90;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M295,540 L295,540 L560,420 L560,420 L295,540 L295,540"/>
    </circle>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
