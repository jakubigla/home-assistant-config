---
alias: Presence - ground floor absent for 5 min
description: Presence in the ground floors with 5 min threshold on no presence
id: 173458d4-d369-40ba-b239-7299293d1e31

mode: restart
max_exceeded: silent

trigger:
  - event: start
    trigger: homeassistant
  - event_type: automation_reloaded
    trigger: event
  - platform: state
    entity_id:
      - binary_sensor.ground_floor_presence
    from: "off"
    to: "on"
  - platform: state
    entity_id:
      - binary_sensor.ground_floor_presence
    from: "on"
    to: "off"
    for:
      hours: 0
      minutes: 5
      seconds: 0

action:
  - choose:
      # If someone is in ground floor
      - conditions:
          - condition: state
            entity_id: binary_sensor.ground_floor_presence
            state: "on"
        sequence:
          # Ambient lights: ON when dark
          - if:
              - condition: state
                entity_id: binary_sensor.living_room_is_dark
                state: "on"
            then:
              - alias: "Turn on corner lamp"
                service: light.turn_on
                target:
                  entity_id: light.living_room_corner_lamp
              - alias: "Turn on kitchen LEDs"
                service: light.turn_on
                target:
                  entity_id: light.kitchen_led
              - alias: "Turn on living room LEDs"
                service: light.turn_on
                data:
                  rgb_color:
                    - 255
                    - 169
                    - 144
                  brightness: 128
                target:
                  entity_id: light.living_room_leds

      # If there's no one in ground floor
      - conditions:
          - condition: state
            entity_id: binary_sensor.ground_floor_presence
            state: "off"
        sequence:
          - alias: "Turn off all ground floor lights"
            service: light.turn_off
            target:
              floor_id: ground_floor
