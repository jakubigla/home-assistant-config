---
alias: Garage door open notify
description: >-
  Notify when garage door stays open for 3 minutes with actionable
  close button
id: garage-door-open-notify

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: binary_sensor.garage_door
    to: "on"
    for:
      minutes: 3

action:
  - variables:
      action_close: "{{ 'GARAGE_CLOSE_' ~ context.id }}"
      action_dismiss: "{{ 'GARAGE_DISMISS_' ~ context.id }}"

  - action: notify.mobile_app_iglofon_new
    data:
      title: "Garage Door Open"
      message: "The garage door has been open for 3 minutes."
      data:
        actions:
          - action: "{{ action_close }}"
            title: "Close"
          - action: "{{ action_dismiss }}"
            title: "Dismiss"
        push:
          interruption-level: time-sensitive

  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_close }}"
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_dismiss }}"
    timeout:
      hours: 1
    continue_on_timeout: false

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ wait.trigger.event.data.action == action_close }}
          - condition: state
            entity_id: binary_sensor.garage_door
            state: "on"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.garage_door
