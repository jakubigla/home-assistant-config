---
alias: Garage door open notify
description: >-
  Notify when garage door stays open for 3 minutes. Tapping the
  notification opens an iOS Shortcut to close the door via HomeKit.
id: garage-door-open-notify

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: binary_sensor.garage_door
    to: "on"
    for:
      minutes: 3

action:
  - action: notify.mobile_app_iglofon_new
    data:
      title: "Garage Door Open"
      message: "The garage door has been open for 3 minutes. Tap to close."
      data:
        url: "shortcuts://run-shortcut?name=NotifyGarageFromHA"
        actions:
          - action: "DISMISS"
            title: "Dismiss"
            destructive: true
        push:
          interruption-level: time-sensitive
