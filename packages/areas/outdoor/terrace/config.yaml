---
automation: !include_dir_list automations
template: !include_dir_list templates
light: !include_dir_list lights

input_select:
  pergola_weather_mode:
    name: Pergola Weather Mode
    options:
      - Rainfall Sensor
      - Forecast
      - Both
      - Manual
    initial: Rainfall Sensor
    icon: mdi:weather-pouring

input_number:
  # Bridge fix for the Somfy open-limit drift. The motor's usable tilt
  # range is compressed: commanding tilt 100 overshoots and bounces, so
  # the true full-CLOSE target is current_tilt_position = 70, and full
  # OPEN is tilt 0. cover.pergola_roof_proxy presents a clean 0-100 %
  # position over this 0..max-tilt band:
  #   proxy 100 % open  -> underlying tilt 0
  #   proxy 0 % open     -> underlying tilt 70 (full close)
  # Tune live from the dashboard if the drift shifts. Permanent fix is a
  # Somfy installer re-commissioning the Louver Control box (see
  # docs/pergola/). Remove this helper + revert the proxy once that's done.
  pergola_roof_offset:
    name: Pergola Roof Max Tilt
    min: 40
    max: 100
    step: 1
    initial: 70
    unit_of_measurement: "%"
    mode: slider
    icon: mdi:arrow-expand-vertical
