---
cover:
  - name: Pergola Roof Proxy
    unique_id: pergola_roof_position_proxy
    device_class: awning
    position_template: >
      {{ state_attr('cover.pergola_roof', 'current_tilt_position')
         | int(0) }}
    open_cover:
      - action: cover.open_cover_tilt
        target:
          entity_id: cover.pergola_roof
    close_cover:
      - action: cover.close_cover_tilt
        target:
          entity_id: cover.pergola_roof
    stop_cover:
      - action: cover.stop_cover_tilt
        target:
          entity_id: cover.pergola_roof
    set_cover_position:
      - action: cover.set_cover_tilt_position
        target:
          entity_id: cover.pergola_roof
        data:
          tilt_position: "{{ position }}"
