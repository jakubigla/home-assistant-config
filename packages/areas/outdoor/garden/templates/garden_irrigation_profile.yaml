---
# Garden Irrigation Profile
#
# Resolves selected mode → durations + schedule.
#
# Named modes (Eco/Standard/Intensive/Testing) ignore the calendar
# month — user picks them and they run as configured.
# Smart mode auto-routes per month.
#
# Drip always 45 min, runs once per day on the same days as lawn.
#
# Lawn runs cycle & soak: zones 1→2→3 repeated `cycle_count` times with
# a `soak_minutes` pause between cycles. lawn_durations is the TOTAL
# per-run water; auto-off divides each valve open by cycle_count so the
# total across all cycles equals lawn_durations. Drip stays single-pass.
#
# Zone 1 runs longest (largest / sunniest area); zones 2 & 3 equal.
#
# ┌──────────────────────────────────────────────────────────────────┐
# │ MODE → SCHEDULE   (lawn z1/z2/z3 minutes)                        │
# │   Eco       — 30/18/18  2×/wk Tue/Sat,         drip 45m         │
# │   Standard  — 30/18/18  3×/wk Tue/Thu/Sat,     drip 45m         │
# │   Intensive — 35/20/20  4×/wk Mon/Tue/Thu/Fri, drip 45m         │
# │   Testing   — all valves 30s daily (validation)                  │
# │   Smart     — auto by month (each uses its tier's days):         │
# │     May–Jun   Standard params (3×/wk Tue/Thu/Sat)                │
# │     Jul–Aug   Intensive params (4×/wk Mon/Tue/Thu/Fri)           │
# │     Sep       Eco params (2×/wk Tue/Sat)                         │
# │     Oct       drip-only 45m every 3d ×1/day                      │
# │     Nov–Apr   OFF                                                │
# │                                                                  │
# │ Tier days (isoweekday): Eco [2,6] Standard [2,4,6]              │
# │                         Intensive [1,2,4,5]                      │
# │                                                                  │
# │ Resolved attributes (seconds):                                   │
# │   lawn_durations    -> {valve.lawn_sprinkler_zone_N: seconds}    │
# │   drip_duration     -> seconds                                   │
# │   drip_runs_per_day -> 1                                         │
# │   lawn_today / drip_today -> bool                                │
# └──────────────────────────────────────────────────────────────────┘
sensor:
  - name: Garden Irrigation Profile
    unique_id: garden_irrigation_profile
    icon: mdi:sprinkler-variant
    state: "{{ states('input_select.garden_irrigation_mode') }}"
    attributes:
      # Effective tier: named modes pass through; Smart maps month → tier.
      # Computed inline in each attribute (no cross-attribute `this` reads —
      # template-sensor attribute eval order / `this` staleness is unreliable).
      # SMART LADDER (debug/full view): includes Oct→Drip. This is the only
      # lawn-side ladder that resolves Drip; lawn_durations/lawn_today
      # deliberately collapse Oct to Off (no lawn in Oct). Keep in sync with the
      # drip-side ladder (drip_today) when editing month boundaries.
      effective_mode: >
        {% set mode = states('input_select.garden_irrigation_mode') %}
        {% set month = now().month %}
        {% set effective = mode %}
        {% if mode == 'Smart' %}
          {% if month in [5, 6] %} {% set effective = 'Standard' %}
          {% elif month in [7, 8] %} {% set effective = 'Intensive' %}
          {% elif month == 9 %} {% set effective = 'Eco' %}
          {% elif month == 10 %} {% set effective = 'Drip' %}
          {% else %} {% set effective = 'Off' %} {% endif %}
        {% endif %}
        {{ effective }}
      # SMART LADDER (lawn): NO Oct case on purpose — Oct is drip-only, so Oct
      # collapses to Off here (zero lawn durations). Mirror of effective_mode
      # minus the Drip branch. Do NOT add month 10 → Drip.
      lawn_durations: >
        {% set mode = states('input_select.garden_irrigation_mode') %}
        {% set month = now().month %}
        {% set effective = mode %}
        {% if mode == 'Smart' %}
          {% if month in [5, 6] %} {% set effective = 'Standard' %}
          {% elif month in [7, 8] %} {% set effective = 'Intensive' %}
          {% elif month == 9 %} {% set effective = 'Eco' %}
          {% else %} {% set effective = 'Off' %} {% endif %}
        {% endif %}
        {% if effective == 'Eco' %}
          {% set z = [1800, 1080, 1080] %}
        {% elif effective == 'Standard' %}
          {% set z = [1800, 1080, 1080] %}
        {% elif effective == 'Intensive' %}
          {% set z = [2100, 1200, 1200] %}
        {% elif effective == 'Seasonal' %}
          {% if month >= 5 and month <= 9 %}
            {% set base = states('input_number.garden_lawn_minutes_july') | int(18)
               if month == 7
               else states('input_number.garden_lawn_minutes_standard') | int(15) %}
            {% set z1 = base * 60 %}
            {% set side = ((base * 0.6) | round(0) | int) * 60 %}
            {% set z = [z1, side, side] %}
          {% else %}
            {% set z = [0, 0, 0] %}
          {% endif %}
        {% elif effective == 'Testing' %}
          {% set z = [30, 30, 30] %}
        {% else %}
          {% set z = [0, 0, 0] %}
        {% endif %}
        {{ {
          'valve.lawn_sprinkler_zone_1': z[0],
          'valve.lawn_sprinkler_zone_2': z[1],
          'valve.lawn_sprinkler_zone_3': z[2],
        } }}
      cycle_count: >
        {{ 1 if is_state('input_select.garden_irrigation_mode', 'Seasonal') else 2 }}
      soak_minutes: "15"
      # Seasonal twice-daily schedule (empty string for all other modes):
      #   May–Aug AM 05:00 (Sep AM 06:00); Jun–Aug also PM 17:00.
      am_time: >
        {% set month = now().month %}
        {% if not is_state('input_select.garden_irrigation_mode', 'Seasonal') %} ''
        {% elif month == 9 %} 06:00
        {% elif month >= 5 and month <= 8 %} 05:00
        {% else %} '' {% endif %}
      pm_time: >
        {% set month = now().month %}
        {% if is_state('input_select.garden_irrigation_mode', 'Seasonal')
              and month in [6, 7, 8] %} 17:00
        {% else %} '' {% endif %}
      drip_duration: >
        {% set mode = states('input_select.garden_irrigation_mode') %}
        {% set month = now().month %}
        {% if mode == 'Smart' %}
          {% if month in [5, 6, 7, 8, 9, 10] %} 2700
          {% else %} 0 {% endif %}
        {% elif mode in ['Eco', 'Standard', 'Intensive'] %} 2700
        {% elif mode == 'Seasonal' %}
          {% if month >= 5 and month <= 9 %} 2700 {% else %} 0 {% endif %}
        {% elif mode == 'Testing' %} 30
        {% else %} 0 {% endif %}
      drip_runs_per_day: >
        {% set mode = states('input_select.garden_irrigation_mode') %}
        {% set month = now().month %}
        {% if mode == 'Smart' %}
          {% if month in [5, 6, 7, 8, 9, 10] %} 1
          {% else %} 0 {% endif %}
        {% elif mode in ['Eco', 'Standard', 'Intensive', 'Testing'] %} 1
        {% elif mode == 'Seasonal' %}
          {% if month >= 5 and month <= 9 %} 1 {% else %} 0 {% endif %}
        {% else %} 0 {% endif %}
      # Days per tier (isoweekday): Eco 2×/wk, Standard 3×/wk, Intensive 4×/wk.
      # SMART LADDER (lawn): NO Oct case on purpose — Oct is drip-only.
      # Oct collapses to Off → lawn_today false. Mirror of lawn_durations.
      lawn_today: >
        {% set mode = states('input_select.garden_irrigation_mode') %}
        {% set month = now().month %}
        {% set effective = mode %}
        {% if mode == 'Smart' %}
          {% if month in [5, 6] %} {% set effective = 'Standard' %}
          {% elif month in [7, 8] %} {% set effective = 'Intensive' %}
          {% elif month == 9 %} {% set effective = 'Eco' %}
          {% else %} {% set effective = 'Off' %} {% endif %}
        {% endif %}
        {% set dow = now().isoweekday() %}
        {% if effective == 'Eco' %} {{ dow in [2, 6] }}
        {% elif effective == 'Standard' %} {{ dow in [2, 4, 6] }}
        {% elif effective == 'Intensive' %} {{ dow in [1, 2, 4, 5] }}
        {% elif effective == 'Seasonal' %}
          {% if month in [5, 9] %} {{ dow in [1, 4] }}
          {% elif month in [6, 7, 8] %} {{ dow in [1, 3, 5] }}
          {% else %} false {% endif %}
        {% elif effective == 'Testing' %} true
        {% else %} false {% endif %}
      # SMART LADDER (drip): INCLUDES Oct→Drip — drip runs every 3rd day in Oct.
      # Matches effective_mode; intentionally one branch wider than the lawn
      # ladders above. Keep month boundaries in sync with effective_mode.
      drip_today: >
        {% set mode = states('input_select.garden_irrigation_mode') %}
        {% set month = now().month %}
        {% set effective = mode %}
        {% if mode == 'Smart' %}
          {% if month in [5, 6] %} {% set effective = 'Standard' %}
          {% elif month in [7, 8] %} {% set effective = 'Intensive' %}
          {% elif month == 9 %} {% set effective = 'Eco' %}
          {% elif month == 10 %} {% set effective = 'Drip' %}
          {% else %} {% set effective = 'Off' %} {% endif %}
        {% endif %}
        {% set dow = now().isoweekday() %}
        {% set yday = now().timetuple().tm_yday %}
        {% if effective == 'Eco' %} {{ dow in [2, 6] }}
        {% elif effective == 'Standard' %} {{ dow in [2, 4, 6] }}
        {% elif effective == 'Intensive' %} {{ dow in [1, 2, 4, 5] }}
        {% elif effective == 'Seasonal' %}
          {{ dow in [1, 4] if (month >= 5 and month <= 9) else false }}
        {% elif effective == 'Testing' %} true
        {% elif effective == 'Drip' %} {{ yday % 3 == 0 }}
        {% else %} false {% endif %}
