---
# Garden Next Run Sensors
#
# Compute next scheduled lawn / drip run by scanning next 7 days.
# Recomputes every 5 minutes (and on mode/skip changes) so chips
# stay accurate as time moves past trigger slots.
#
# Lawn fires 04:00 if profile says lawn_today and not lawn_skip.
# Drip fires 04:00 if profile says drip_today and not drip_skip
# (1×/day on the same days as lawn).
#
# An armed one-off (input_boolean.garden_oneoff_armed) takes priority:
# it shows on the chip for the matching type (Lawn/Drip → that chip,
# Full → both) regardless of mode, including Manual. Falls back to the
# recurring schedule scan once disarmed.
trigger:
  - platform: time_pattern
    minutes: "/5"
  - platform: homeassistant
    event: start
  - platform: state
    entity_id:
      - input_select.garden_irrigation_mode
      - binary_sensor.garden_lawn_should_skip
      - binary_sensor.garden_drip_should_skip
      - input_boolean.garden_oneoff_armed
      - input_datetime.garden_oneoff_at
      - input_select.garden_oneoff_type
sensor:
  - name: Garden Lawn Next Run
    unique_id: garden_lawn_next_run
    device_class: timestamp
    icon: mdi:sprinkler
    state: >
      {% set mode = states('input_select.garden_irrigation_mode') %}
      {% set skip = is_state('binary_sensor.garden_lawn_should_skip', 'on') %}
      {% set oneoff = is_state('input_boolean.garden_oneoff_armed', 'on') %}
      {% set ootype = states('input_select.garden_oneoff_type') %}
      {% set ooat = state_attr('input_datetime.garden_oneoff_at', 'timestamp') %}
      {% if oneoff and ootype in ['Lawn', 'Full']
            and ooat is number and ooat > now().timestamp() %}
        {{ as_datetime(ooat) | as_local }}
      {% elif mode == 'Manual' %} none
      {% else %}
        {% set ns = namespace(found=none) %}
        {% for i in range(0, 8) %}
          {% if ns.found is none %}
            {% set d = (now() + timedelta(days=i)) %}
            {% set dow = d.isoweekday() %}
            {% set month = d.month %}
            {% set eff = mode %}
            {% if mode == 'Smart' %}
              {% if month in [5, 6] %} {% set eff = 'Standard' %}
              {% elif month in [7, 8] %} {% set eff = 'Intensive' %}
              {% elif month == 9 %} {% set eff = 'Eco' %}
              {% else %} {% set eff = 'Off' %} {% endif %}
            {% endif %}
            {% set runs = false %}
            {% if eff == 'Eco' %} {% set runs = dow in [2, 6] %}
            {% elif eff == 'Standard' %} {% set runs = dow in [2, 4, 6] %}
            {% elif eff == 'Intensive' %} {% set runs = dow in [1, 2, 4, 5] %}
            {% elif eff == 'Testing' %} {% set runs = true %}
            {% elif eff == 'Seasonal' %}
              {% if month in [5, 9] %} {% set runs = dow in [1, 4] %}
              {% elif month in [6, 7, 8] %} {% set runs = dow in [1, 3, 5] %}
              {% endif %}
            {% endif %}
            {% if runs %}
              {# Seasonal has AM + optional PM slots; other modes a single 04:00 slot. #}
              {% if eff == 'Seasonal' %}
                {% set am_h = 6 if month == 9 else 5 %}
                {% set slots = [d.replace(hour=am_h, minute=0, second=0, microsecond=0)] %}
                {% if month in [6, 7, 8] %}
                  {% set slots = slots + [d.replace(hour=17, minute=0, second=0,
                     microsecond=0)] %}
                {% endif %}
              {% else %}
                {% set slots = [d.replace(hour=4, minute=0, second=0, microsecond=0)] %}
              {% endif %}
              {% for slot in slots %}
                {% if ns.found is none and now() < slot and not skip %}
                  {% set ns.found = slot.isoformat() %}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.found if ns.found else 'none' }}
      {% endif %}
  - name: Garden Drip Next Run
    unique_id: garden_drip_next_run
    device_class: timestamp
    icon: mdi:water-outline
    state: >
      {% set mode = states('input_select.garden_irrigation_mode') %}
      {% set skip = is_state('binary_sensor.garden_drip_should_skip', 'on') %}
      {% set oneoff = is_state('input_boolean.garden_oneoff_armed', 'on') %}
      {% set ootype = states('input_select.garden_oneoff_type') %}
      {% set ooat = state_attr('input_datetime.garden_oneoff_at', 'timestamp') %}
      {% if oneoff and ootype in ['Drip', 'Full']
            and ooat is number and ooat > now().timestamp() %}
        {{ as_datetime(ooat) | as_local }}
      {% elif mode == 'Manual' %} none
      {% else %}
        {% set ns = namespace(found=none) %}
        {% for i in range(0, 8) %}
          {% if ns.found is none %}
            {% set d = (now() + timedelta(days=i)) %}
            {% set dow = d.isoweekday() %}
            {% set yday = d.timetuple().tm_yday %}
            {% set month = d.month %}
            {% set eff = mode %}
            {% if mode == 'Smart' %}
              {% if month in [5, 6] %} {% set eff = 'Standard' %}
              {% elif month in [7, 8] %} {% set eff = 'Intensive' %}
              {% elif month == 9 %} {% set eff = 'Eco' %}
              {% elif month == 10 %} {% set eff = 'Drip' %}
              {% else %} {% set eff = 'Off' %} {% endif %}
            {% endif %}
            {% set runs = false %}
            {% if eff == 'Eco' %} {% set runs = dow in [2, 6] %}
            {% elif eff == 'Standard' %} {% set runs = dow in [2, 4, 6] %}
            {% elif eff == 'Intensive' %} {% set runs = dow in [1, 2, 4, 5] %}
            {% elif eff == 'Testing' %} {% set runs = true %}
            {% elif eff == 'Drip' %} {% set runs = yday % 3 == 0 %}
            {% elif eff == 'Seasonal' %}
              {% set runs = (month >= 5 and month <= 9) and dow in [1, 4] %}
            {% endif %}
            {% if runs %}
              {# Seasonal drip fires at the AM session; other modes at 04:00. #}
              {% if eff == 'Seasonal' %}
                {% set slot = d.replace(hour=(6 if month == 9 else 5), minute=0,
                   second=0, microsecond=0) %}
              {% else %}
                {% set slot = d.replace(hour=4, minute=0, second=0, microsecond=0) %}
              {% endif %}
              {% if i == 0 and (now() >= slot or skip) %}
              {% else %}
                {% set ns.found = slot.isoformat() %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.found if ns.found else 'none' }}
      {% endif %}
