---
automation: !include_dir_list automations
template: !include_dir_list templates
script: !include_dir_merge_named scripts

input_select:
  garden_irrigation_mode:
    name: Garden Irrigation Mode
    options:
      - Manual
      - Eco
      - Standard
      - Intensive
      - Testing
      - Smart
      - Seasonal
    icon: mdi:sprinkler
  garden_oneoff_type:
    name: Garden One-off Type
    options:
      - Lawn
      - Drip
      - Full
    icon: mdi:sprinkler-variant

input_datetime:
  garden_oneoff_at:
    name: Garden One-off Run At
    has_date: true
    has_time: true

input_number:
  garden_ondemand_minutes:
    name: Garden On-demand Minutes
    min: 1
    max: 25
    step: 1
    unit_of_measurement: min
    icon: mdi:timer-outline
  garden_lawn_minutes_standard:
    name: Garden Lawn Minutes (standard)
    min: 5
    max: 30
    step: 1
    unit_of_measurement: min
    icon: mdi:timer-outline
  garden_lawn_minutes_july:
    name: Garden Lawn Minutes (July)
    min: 5
    max: 30
    step: 1
    unit_of_measurement: min
    icon: mdi:timer-outline
  garden_drip_min_days_between:
    name: Garden Drip Min Days Between
    min: 1
    max: 7
    step: 1
    unit_of_measurement: d
    icon: mdi:calendar-clock
  # Smart-drip soil thresholds (flowerbed). Indicative capacitive readings —
  # calibrate to the bed, don't trust a fixed number. START < STOP <= SAT.
  garden_drip_soil_start:
    name: Garden Drip Soil Start
    min: 20
    max: 50
    step: 1
    initial: 35
    unit_of_measurement: "%"
    icon: mdi:water-percent-alert
    # Fire drip when the DRIEST flowerbed drops below this.
  garden_drip_soil_stop:
    name: Garden Drip Soil Recover
    min: 45
    max: 75
    step: 1
    initial: 60
    unit_of_measurement: "%"
    icon: mdi:water-check
    # Re-arm only after the driest bed recovers above this (hysteresis).
  garden_drip_soil_sat:
    name: Garden Drip Soil Saturation
    min: 60
    max: 90
    step: 1
    initial: 70
    unit_of_measurement: "%"
    icon: mdi:water-alert
    # Veto a run when pergola L/R wettest is at/above this (waterlogged).

input_boolean:
  garden_oneoff_armed:
    name: Garden One-off Armed
    icon: mdi:timer-sand
  garden_ondemand_active:
    name: Garden On-demand Active
    icon: mdi:water-pump
  garden_valve_offline_alerted:
    name: Garden Valve Offline Alerted
    icon: mdi:bell-alert
    # Latch: set when the offline watchdog alerts, cleared on valve recovery or
    # at midnight. Gates the watchdog so it nags at most once per day per episode.
  garden_soil_probe_silent_alerted:
    name: Garden Soil Probe Silent Alerted
    icon: mdi:bell-alert
    # Latch: set when the soil-probe silence watchdog alerts, cleared when a
    # silent probe reports again or at midnight. Gates the watchdog so it nags
    # at most once per day per episode.
  garden_drip_armed:
    name: Garden Drip Armed
    icon: mdi:water-alert
    initial: true

rest:
  - resource: !secret garden_rain_url
    scan_interval: 1800
    sensor:
      - name: Garden Rain Accumulation
        unique_id: garden_rain_accumulation_mm
        unit_of_measurement: mm
        value_template: >
          {% set t = value_json.hourly.time %}
          {% set p = value_json.hourly.precipitation %}
          {% set lo = (now() - timedelta(hours=24)).strftime('%Y-%m-%dT%H') %}
          {% set hi = (now() + timedelta(hours=12)).strftime('%Y-%m-%dT%H') %}
          {% set ns = namespace(total=0.0) %}
          {% for i in range(t | count) %}
            {% if t[i][:13] >= lo and t[i][:13] <= hi %}
              {% set ns.total = ns.total + (p[i] | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}
        json_attributes_path: "$.hourly"
        json_attributes:
          - time
