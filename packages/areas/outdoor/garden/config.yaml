---
automation: !include_dir_list automations
template: !include_dir_list templates
script: !include_dir_merge_named scripts

input_select:
  garden_irrigation_mode:
    name: Garden Irrigation Mode
    options:
      - Manual
      - Eco
      - Standard
      - Intensive
      - Testing
      - Smart
    icon: mdi:sprinkler
  garden_oneoff_type:
    name: Garden One-off Type
    options:
      - Lawn
      - Drip
      - Full
    icon: mdi:sprinkler-variant

input_datetime:
  garden_oneoff_at:
    name: Garden One-off Run At
    has_date: true
    has_time: true

input_number:
  garden_ondemand_minutes:
    name: Garden On-demand Minutes
    min: 1
    max: 25
    step: 1
    unit_of_measurement: min
    icon: mdi:timer-outline

input_boolean:
  garden_oneoff_armed:
    name: Garden One-off Armed
    icon: mdi:timer-sand
  garden_ondemand_active:
    name: Garden On-demand Active
    icon: mdi:water-pump
