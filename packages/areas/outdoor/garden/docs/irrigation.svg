<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 700" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Garden scheduled irrigation</title>
  <desc>Top-down site plan. At 04:00 the lawn sprinkler zones open together — each head sprays a circle scaled to its real throw radius — then close, the drip bed soaks, and the garden returns to idle. Each valve auto-closes after its profile duration.</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- water spray gradient (cyan) -->
    <radialGradient id="spray" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fdcff" stop-opacity="0.0"/>
      <stop offset="55%" stop-color="#5bc6f5" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3aa6e0" stop-opacity="0.0"/>
    </radialGradient>
    <!-- drip wet-soil gradient -->
    <radialGradient id="wet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a6db0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a6db0" stop-opacity="0"/>
    </radialGradient>
    <!-- shared phase clock = 10s. idle 0-.10 · lawn spray .10-.55 · close .55-.62 ·
         drip soak .62-.90 · idle .90-1 -->
  </defs>

  <!-- scale: 1m = 30u, origin offset (40, 70). garden ~16m x 20.5m -->
  <rect width="560" height="700" rx="14" fill="#0f1420"/>
  <text x="22" y="34" fill="#cdd9e8" font-size="16" font-weight="700">Garden — scheduled irrigation</text>
  <text x="22" y="54" fill="#5a6b80" font-size="12.5">04:00 → lawn zones spray · drip soaks · valves auto-close</text>

  <!-- status word (one per phase), top-right -->
  <g text-anchor="end" font-size="15" font-weight="700">
    <text x="538" y="38" fill="#9fb3c8" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.09;0.11;1" dur="10s" repeatCount="indefinite"/>04:00</text>
    <text x="538" y="38" fill="#7fdcff" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.12;0.15;0.53;0.56;1" dur="10s" repeatCount="indefinite"/>💧 lawn spraying</text>
    <text x="538" y="38" fill="#5bc6f5" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.63;0.66;0.87;0.90;1" dur="10s" repeatCount="indefinite"/>drip soaking</text>
    <text x="538" y="38" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.92;0.94;0.99;1" dur="10s" repeatCount="indefinite"/>valves closed</text>
  </g>

  <!-- ===== lawn (inverted L): top block + left strip ===== -->
  <!-- lawn_top: x1.3..14.1 m, y0.4..8.2 -> (79,82) w384 h234 -->
  <rect x="79" y="82" width="384" height="234" rx="6" fill="#2f4a1f" stroke="#3c5e28" stroke-width="2"/>
  <!-- lawn_strip: x1.3..5.1, y8.2..19.8 -> (79,316) w114 h348 -->
  <rect x="79" y="316" width="114" height="348" rx="6" fill="#2f4a1f" stroke="#3c5e28" stroke-width="2"/>
  <text x="200" y="120" fill="#6f8f4e" font-size="12">lawn</text>

  <!-- terrace (paved) — not irrigated -->
  <rect x="202" y="328" width="276" height="180" rx="6" fill="#1a2230" stroke="#2b3850" stroke-width="2"/>
  <text x="340" y="420" fill="#46566e" font-size="12" text-anchor="middle">terrace</text>
  <!-- shed -->
  <rect x="190" y="520" width="90" height="150" rx="6" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>
  <text x="235" y="598" fill="#46566e" font-size="11" text-anchor="middle">shed</text>

  <!-- drip bed: left/lower edge, x1.3..5.1 y12.5..19.5 -> (79,445) w114 h210 -->
  <rect x="79" y="445" width="114" height="210" rx="6" fill="#33421f" stroke="#3c5e28" stroke-width="1.5" opacity="0.0">
    <!-- bed tint reused; soak handled by wet ellipse below -->
    <animate attributeName="opacity" values="0;0;0;0;0" keyTimes="0;0.25;0.5;0.75;1" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== lawn sprinkler heads: spray circle scaled to R (×30u), pulse during spray phase ===== -->
  <!-- group opacity gates the whole lawn-spray phase -->
  <g>
    <!-- spray rings (under heads). positions read off the site plan. -->
    <!-- z1_a R3.2 @ (241,100) r96 -->
    <circle cx="241" cy="100" r="96" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.12;0.16;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
    <!-- z1_b R3.9 @ (439,139) r117 -->
    <circle cx="439" cy="139" r="117" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.14;0.18;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
    <!-- z1_c R3.5 @ (289,310) r105 -->
    <circle cx="289" cy="310" r="105" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.16;0.20;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
    <!-- z2_a R2.8 @ (94,235) r84 -->
    <circle cx="94" cy="235" r="84" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.18;0.22;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
    <!-- z2_b R2.4 @ (178,379) r72 -->
    <circle cx="178" cy="379" r="72" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.20;0.24;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
    <!-- z2_c R2.0 @ (94,403) r60 -->
    <circle cx="94" cy="403" r="60" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.22;0.26;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
    <!-- z3_a R2.3 @ (160,520) r69 -->
    <circle cx="160" cy="520" r="69" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.24;0.28;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
    <!-- z3_b R2.1 @ (79,568) r63 -->
    <circle cx="79" cy="568" r="63" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.26;0.30;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
    <!-- z3_c R1.9 @ (142,643) r57 -->
    <circle cx="142" cy="643" r="57" fill="url(#spray)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.28;0.32;0.53;0.58;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
  </g>

  <!-- drip soak: wet patches over the drip bed during drip phase -->
  <g>
    <ellipse cx="120" cy="500" rx="70" ry="90" fill="url(#wet)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.63;0.67;0.87;0.91;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></ellipse>
    <ellipse cx="135" cy="610" rx="60" ry="55" fill="url(#wet)" opacity="0"><animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.65;0.69;0.87;0.91;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/></ellipse>
  </g>

  <!-- ===== sprinkler head dots (always visible) ===== -->
  <g filter="url(#glow)">
    <!-- zone 1 magenta -->
    <circle cx="241" cy="100" r="6" fill="#e066c0"/>
    <circle cx="439" cy="139" r="6" fill="#e066c0"/>
    <circle cx="289" cy="310" r="6" fill="#e066c0"/>
    <!-- zone 2/3 blue -->
    <circle cx="94" cy="235" r="6" fill="#5b8def"/>
    <circle cx="178" cy="379" r="6" fill="#5b8def"/>
    <circle cx="94" cy="403" r="6" fill="#5b8def"/>
    <circle cx="160" cy="520" r="6" fill="#5b8def"/>
    <circle cx="79" cy="568" r="6" fill="#5b8def"/>
    <circle cx="142" cy="643" r="6" fill="#5b8def"/>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#6f7f95">
    <circle cx="300" cy="556" r="5" fill="#e066c0"/><text x="312" y="560">Zone 1</text>
    <circle cx="300" cy="576" r="5" fill="#5b8def"/><text x="312" y="580">Zone 2 / 3</text>
    <rect x="296" y="592" width="9" height="9" rx="2" fill="#2a6db0"/><text x="312" y="600">drip bed</text>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
