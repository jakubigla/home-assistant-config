---
# Garden geometry — shared by all garden automation animations.
# Meters, origin top-left. Read off the site plan (docs/siteplan.png): an
# inverted-L lawn (big top block + left strip), terrace + house lower-right,
# tool shed bottom-centre. Sprinkler heads are labelled "Z R x,x" on the plan —
# Z = zone head, R = throw radius in metres. Positions are scaled from the plan
# assuming a ~16 m x 20.5 m garden envelope.
area: garden
rooms:
  # lawn — inverted L. Drawn as two rectangles (top block + left strip).
  - {id: lawn_top, x: 1.3, y: 0.4, w: 12.8, h: 7.8, label: lawn}
  - {id: lawn_strip, x: 1.3, y: 8.2, w: 3.8, h: 11.6}
  # terrace (paved) — centre/right, not irrigated
  - {id: terrace, x: 5.4, y: 8.6, w: 9.2, h: 6.0, label: terrace}
  # tool shed + robot dock — bottom centre
  - {id: shed, x: 5.0, y: 15.0, w: 3.0, h: 5.0, label: shed}
sensors: []
# Irrigation heads. type: sprinkler (lawn zones) | drip (bed line).
# r = throw radius (m). zone groups the valve each head belongs to.
lights:
  # Head positions read off the site plan (docs/siteplan.png). r = real throw radius.
  # Zone 1 — magenta heads (long-throw, big top lawn)
  - {id: z1_a, kind: sprinkler, zone: lawn_z1, x: 6.7, y: 1.0, r: 3.2}
  - {id: z1_b, kind: sprinkler, zone: lawn_z1, x: 13.3, y: 2.3, r: 3.9}
  - {id: z1_c, kind: sprinkler, zone: lawn_z1, x: 8.3, y: 8.0, r: 3.5}
  # Zone 2 — upper blue heads (left side + middle)
  - {id: z2_a, kind: sprinkler, zone: lawn_z2, x: 1.8, y: 5.5, r: 2.8}
  - {id: z2_b, kind: sprinkler, zone: lawn_z2, x: 4.6, y: 10.3, r: 2.4}
  - {id: z2_c, kind: sprinkler, zone: lawn_z2, x: 1.8, y: 11.1, r: 2.0}
  # Zone 3 — lower blue heads (bottom-left strip)
  - {id: z3_a, kind: sprinkler, zone: lawn_z3, x: 4.0, y: 15.0, r: 2.3}
  - {id: z3_b, kind: sprinkler, zone: lawn_z3, x: 1.1, y: 16.6, r: 2.1}
  - {id: z3_c, kind: sprinkler, zone: lawn_z3, x: 3.4, y: 19.1, r: 1.9}
  # Drip line — bed along the left/lower edge (single valve, low flow)
  - {id: drip, kind: drip, zone: drip, x: 1.3, y: 12.5, w: 3.8, h: 7.0}
door: {room: lawn_strip, x: 1.3, w: 1.5, side: bottom}
paths: {}
