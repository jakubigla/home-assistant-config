---
garden_lawn_irrigation:
  alias: Garden Lawn Irrigation
  description: >
    Cycle & soak: runs lawn zones 1→2→3 sequentially, repeated
    `cycle_count` times (from the profile) with a `soak_minutes` pause
    between cycles. Each zone is opened via
    script.garden_open_zone_until_real_close, which re-asserts the open if the
    controller emits a spurious early close. Each valve open is closed by the
    auto-off automation, which divides the per-zone duration by cycle_count so
    total water per zone equals the profile's lawn_durations.
  icon: mdi:sprinkler
  mode: single
  sequence:
    # Abort + notify if the sprinkler controller is offline. Without this the
    # valve.open_valve calls below are silent no-ops on unavailable entities,
    # so a dashboard tap appears to do nothing with zero feedback.
    - if:
        - >
          {{ expand('valve.lawn_sprinkler_zone_1',
                    'valve.lawn_sprinkler_zone_2',
                    'valve.lawn_sprinkler_zone_3')
             | selectattr('state', 'eq', 'unavailable')
             | list | count > 0 }}
      then:
        - action: persistent_notification.create
          data:
            notification_id: garden_lawn_irrigation_offline
            title: Lawn irrigation unavailable
            message: >
              Sprinkler controller offline — one or more lawn zone valves are
              unavailable. Run aborted. Check the Tuya "Sprinker" device.
        - stop: "Lawn irrigation aborted — sprinkler valves unavailable"
    # Abort if the profile resolves to no watering (Off/Manual/Nov–Apr Smart).
    # Without this, a manual call would fall back to the auto-off 900s default
    # and water anyway.
    - variables:
        lawn_total: >
          {% set d = state_attr('sensor.garden_irrigation_profile',
             'lawn_durations') or {} %}
          {{ d.values() | sum }}
    - if:
        - "{{ lawn_total | int(0) == 0 }}"
      then:
        - stop: "Lawn irrigation skipped — profile resolves to no watering"
    - variables:
        cycles: >
          {% set c = state_attr('sensor.garden_irrigation_profile',
             'cycle_count') | int(1) %}
          {{ c if c > 0 else 1 }}
        soak_minutes: >
          {{ state_attr('sensor.garden_irrigation_profile',
             'soak_minutes') | int(0) }}
    - repeat:
        count: "{{ cycles }}"
        sequence:
          - action: script.garden_open_zone_until_real_close
            data:
              zone: valve.lawn_sprinkler_zone_1
          - delay:
              seconds: 5
          - action: script.garden_open_zone_until_real_close
            data:
              zone: valve.lawn_sprinkler_zone_2
          - delay:
              seconds: 5
          - action: script.garden_open_zone_until_real_close
            data:
              zone: valve.lawn_sprinkler_zone_3
          # Soak pause between cycles, skipped after the final cycle.
          - if:
              - "{{ repeat.index < cycles }}"
            then:
              - delay:
                  minutes: "{{ soak_minutes }}"
