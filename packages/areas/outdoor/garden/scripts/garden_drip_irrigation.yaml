---
garden_drip_irrigation:
  alias: Garden Drip Irrigation
  description: >
    Opens drip irrigation valve and waits for auto-off to close it.
  icon: mdi:water-outline
  mode: single
  sequence:
    # Abort + notify if the controller is offline — see garden_lawn_irrigation.
    - if:
        - "{{ states('valve.drip_irrigation') == 'unavailable' }}"
      then:
        - action: persistent_notification.create
          data:
            notification_id: garden_drip_irrigation_offline
            title: Drip irrigation unavailable
            message: >
              Sprinkler controller offline — drip valve is unavailable. Run
              aborted. Check the Tuya "Sprinker" device.
        - stop: "Drip irrigation aborted — drip valve unavailable"
    - action: valve.open_valve
      target:
        entity_id: valve.drip_irrigation
    - wait_for_trigger:
        - platform: state
          entity_id: valve.drip_irrigation
          to: "closed"
      timeout:
        minutes: 90
    - action: valve.close_valve
      target:
        entity_id: valve.drip_irrigation
