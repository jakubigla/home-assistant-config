---
alias: Garden Valve Auto Off
description: >
  Automatically closes any irrigation valve after the profile-driven
  duration. This is the main duration controller — scripts just open
  valves and wait for this automation to close them. Also serves as
  a safety net for manually opened valves via HomeKit.
id: garden-valve-auto-off

mode: parallel
max: 4

trigger:
  - platform: state
    entity_id:
      - valve.lawn_sprinkler_zone_1
      - valve.lawn_sprinkler_zone_2
      - valve.lawn_sprinkler_zone_3
    to: "open"
    id: "lawn"
  - platform: state
    entity_id: valve.drip_irrigation
    to: "open"
    id: "drip"

action:
  - variables:
      duration: >
        {% if trigger.id == 'lawn' %}
          {% set durations = state_attr('sensor.garden_irrigation_profile',
             'lawn_durations') or {} %}
          {% set d = durations.get(trigger.entity_id, 0) | int %}
          {% set cycles = state_attr('sensor.garden_irrigation_profile',
             'cycle_count') | int(1) %}
          {% set cycles = cycles if cycles > 0 else 1 %}
          {{ (d / cycles) | int if d > 0 else (900 / cycles) | int }}
        {% else %}
          {% set d = state_attr('sensor.garden_irrigation_profile',
             'drip_duration') | int(0) %}
          {{ d if d > 0 else 2700 }}
        {% endif %}
  - delay:
      seconds: "{{ duration }}"
  - action: valve.close_valve
    target:
      entity_id: "{{ trigger.entity_id }}"
