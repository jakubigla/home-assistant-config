---
alias: Garden Scheduled Irrigation
description: >
  Daily 04:00 trigger — runs lawn + drip, lawn-only, or drip-only
  based on profile + per-type skip sensors. Drip runs once per day
  on the same days as lawn. Manual mode disables all automatic runs.
id: garden-scheduled-irrigation

mode: single

trigger:
  - platform: time
    at: "08:15:00"  # TEMP test 2026-06-24 — REVERT to 04:00:00

condition:
  - condition: not
    conditions:
      - condition: state
        entity_id: input_select.garden_irrigation_mode
        state: "Manual"
      - condition: state
        entity_id: input_select.garden_irrigation_mode
        state: "Seasonal"

action:
  - variables:
      lawn_today: >
        {{ state_attr('sensor.garden_irrigation_profile', 'lawn_today')
           | string | trim | lower == 'true' }}
      drip_today: >
        {{ state_attr('sensor.garden_irrigation_profile', 'drip_today')
           | string | trim | lower == 'true' }}
      lawn_skip: "{{ is_state('binary_sensor.garden_lawn_should_skip', 'on') }}"
      drip_skip: "{{ is_state('binary_sensor.garden_drip_should_skip', 'on') }}"
      # No min-gap guard: the schedule days ARE the spacing. Tier days are
      # >=48h apart by design (Standard Mon/Wed/Fri, etc.), so a gap guard
      # only ever fired after an OFF-schedule manual run desynced last_run
      # from the 04:00 grid — exactly when watering WAS wanted. Worse, since
      # the scheduler only fires at 04:00 on schedule days, a same-/next-day
      # manual run pushed the next valid 04:00 PAST a 44h gap, deferring the
      # next run to the following schedule day (~90h gap). Dropped entirely.
      run_lawn: "{{ lawn_today and not lawn_skip }}"
      run_drip: >
        {{ drip_today and not drip_skip
           and not is_state('input_select.garden_irrigation_mode', 'Smart') }}
  - choose:
      - conditions:
          - "{{ run_lawn and run_drip }}"
        sequence:
          - action: script.garden_full_irrigation
      - conditions:
          - "{{ run_lawn }}"
        sequence:
          - action: script.garden_lawn_irrigation
      - conditions:
          - "{{ run_drip }}"
        sequence:
          - action: script.garden_drip_irrigation
