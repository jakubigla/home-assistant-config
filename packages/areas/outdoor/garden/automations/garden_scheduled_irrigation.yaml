---
alias: Garden Scheduled Irrigation
description: >
  Daily 04:00 trigger — runs lawn + drip, lawn-only, or drip-only
  based on profile + per-type skip sensors. Drip runs once per day
  on the same days as lawn. Manual mode disables all automatic runs.
id: garden-scheduled-irrigation

mode: single

trigger:
  - platform: time
    at: "04:00:00"

condition:
  - condition: not
    conditions:
      - condition: state
        entity_id: input_select.garden_irrigation_mode
        state: "Manual"

action:
  - variables:
      lawn_today: >
        {{ state_attr('sensor.garden_irrigation_profile', 'lawn_today')
           | string | trim | lower == 'true' }}
      drip_today: >
        {{ state_attr('sensor.garden_irrigation_profile', 'drip_today')
           | string | trim | lower == 'true' }}
      lawn_skip: "{{ is_state('binary_sensor.garden_lawn_should_skip', 'on') }}"
      drip_skip: "{{ is_state('binary_sensor.garden_drip_should_skip', 'on') }}"
      run_lawn: "{{ lawn_today and not lawn_skip }}"
      run_drip: "{{ drip_today and not drip_skip }}"
  - choose:
      - conditions:
          - "{{ run_lawn and run_drip }}"
        sequence:
          - action: script.garden_full_irrigation
      - conditions:
          - "{{ run_lawn }}"
        sequence:
          - action: script.garden_lawn_irrigation
      - conditions:
          - "{{ run_drip }}"
        sequence:
          - action: script.garden_drip_irrigation
