---
automation: !include_dir_list automations
light: !include_dir_list lights
template: !include_dir_list templates

input_boolean:
  bedroom_movie_mode:
    name: Bedroom Movie Mode
    initial: false
    icon: mdi:movie-open
  bedroom_humidification_active:
    name: Bedroom Humidification Active
    initial: true
    icon: mdi:water-check
  ensuite_occupied:
    name: Ensuite Occupied
    initial: false
    icon: mdi:account
  ensuite_manual_override:
    name: Ensuite Manual Override
    initial: false
    icon: mdi:hand-back-right
  bedroom_occupied:
    name: Bedroom Occupied
    initial: false
    icon: mdi:bed

input_select:
  bedroom_leds_color:
    name: Bedroom LEDs Color
    icon: mdi:palette
    options:
      - Warm White
      - Soft Purple
      - Deep Blue
      - Amber
      - Coral
      - Lavender

  sona_dial_rotation_target:
    name: Sona Dial Rotation Target
    icon: mdi:rotate-3d-variant
    initial: light
    options:
      - light
      - reflectors
      - cover
