---
alias: Bedroom occupancy state machine
description: >
  Latch input_boolean.bedroom_occupied. Entry: entrance presence (FP2) OR
  in-room mmWave (bedroom_occupancy). Exit when BOTH are off for 60 s — the
  60 s debounce rides out mmWave still-gaps so lying still in bed never clears
  the latch. Watchdog clears a stuck latch after 30 min if mmWave is
  off/unavailable (HA restart, sensor drop missing the off-edge). Startup sync
  re-derives the latch from current sensor states on HA start / reload, since
  the entry/exit edges are missed while HA was down or reloading.
id: 2b7e4c10-9d33-4f5a-8c21-6a1f0e92d100

mode: restart
max_exceeded: silent

trigger:
  # Startup sync: HA start / automation reload happens with no off->on edge, so
  # re-derive the latch from current sensor states.
  - trigger: homeassistant
    event: start
    id: sync
  - trigger: event
    event_type: automation_reloaded
    id: sync
  - platform: state
    entity_id: binary_sensor.bedroom_entrance_presence
    from: "off"
    to: "on"
    id: entry
  - platform: state
    entity_id: binary_sensor.bedroom_occupancy
    from: "off"
    to: "on"
    id: entry
  - platform: state
    entity_id:
      - binary_sensor.bedroom_entrance_presence
      - binary_sensor.bedroom_occupancy
    to: "off"
    for:
      seconds: 60
    id: exit
  # Watchdog: latch stuck on (HA restart / mmWave unavailable missed the
  # off-edge). Edge-independent — fires on duration. mode: restart resets the
  # 30 min on every real re-entry.
  - platform: state
    entity_id: input_boolean.bedroom_occupied
    to: "on"
    for:
      minutes: 30
    id: watchdog

condition: []

action:
  - choose:
      # Startup sync: re-derive latch from current sensor states (no edge fired
      # while HA was down / reloading). Either sensor on => occupied.
      - conditions:
          - condition: trigger
            id: sync
        sequence:
          - if:
              - condition: or
                conditions:
                  - condition: state
                    entity_id: binary_sensor.bedroom_entrance_presence
                    state: "on"
                  - condition: state
                    entity_id: binary_sensor.bedroom_occupancy
                    state: "on"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.bedroom_occupied
            else:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.bedroom_occupied
      - conditions:
          - condition: trigger
            id: entry
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.bedroom_occupied
      # Exit: only clear when BOTH sensors are off (the for:60s trigger fires
      # per-entity, so re-check the other one before clearing).
      - conditions:
          - condition: trigger
            id: exit
          - condition: state
            entity_id: binary_sensor.bedroom_entrance_presence
            state: "off"
          - condition: state
            entity_id: binary_sensor.bedroom_occupancy
            state: "off"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.bedroom_occupied
      # Stuck-latch watchdog: clear if mmWave is off OR unavailable.
      - conditions:
          - condition: trigger
            id: watchdog
          - condition: not
            conditions:
              - condition: state
                entity_id: binary_sensor.bedroom_occupancy
                state: "on"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.bedroom_occupied
