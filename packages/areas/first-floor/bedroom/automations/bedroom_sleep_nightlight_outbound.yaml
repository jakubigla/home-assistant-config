---
alias: Bedroom sleep nightlight - outbound
description: >
  Outbound leg of the sleep-time bed-stripe nightlight. A bedside motion sensor
  fires while the room is dark and asleep -> bed stripe to 1% warm for one fixed
  5 s pulse so you can walk to the ensuite, then off. mode: single (NOT restart)
  so a re-trip mid-pulse — rolling in bed, the other sensor flapping — is
  ignored instead of aborting the pulse and re-commanding the light; restart
  mode was thrashing the stripe on/off every few seconds. A 2 s `for:` on each
  trigger drops sub-second motion flap. Gated on sleeping_time + all real
  bedroom lights + TV off + not movie mode. Return leg lives in
  bedroom_sleep_nightlight_return.
id: 7c2e9a14-3f8b-4d6e-9a05-1b7c4e2f8d31

mode: single
max_exceeded: silent

trigger:
  - platform: state
    entity_id: binary_sensor.bedroom_jakub_side_motion
    from: "off"
    to: "on"
    for: "00:00:02"
  - platform: state
    entity_id: binary_sensor.bedroom_sona_side_motion_occupancy
    from: "off"
    to: "on"
    for: "00:00:02"

conditions:
  - condition: state
    entity_id: binary_sensor.sleeping_time
    state: "on"
  - condition: state
    entity_id: light.bedroom_non_bed
    state: "off"
  - condition: state
    entity_id: light.bedroom_bed
    state: "off"
  - condition: state
    entity_id: light.bed_stripe
    state: "off"
  - condition: state
    entity_id: media_player.bedroom_tv
    state: "off"
  - condition: state
    entity_id: input_boolean.bedroom_movie_mode
    state: "off"

action:
  - alias: "Bed stripe to 1% warm"
    action: light.turn_on
    data:
      brightness_pct: 1
      color_temp_kelvin: 2700
      transition: 1
    target:
      entity_id: light.bed_stripe
  - delay: "00:00:05"
  - alias: "Bed stripe off"
    action: light.turn_off
    data:
      transition: 1
    target:
      entity_id: light.bed_stripe
