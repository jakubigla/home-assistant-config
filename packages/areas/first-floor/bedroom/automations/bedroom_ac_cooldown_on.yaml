---
alias: Bedroom AC evening cooldown - on
description: >-
  When the bedroom is over 25°C during the evening run-up to bedtime
  (21:00–23:00), set the AC to cool toward 22°C. Reads the overlay
  sensor.bedroom_temperature. Skips if the AC is unavailable or already
  cooling.
id: a1c3e5f7-1b2d-4a6c-8e0f-2a4c6e8b0d11

mode: single
max_exceeded: silent

trigger:
  - trigger: numeric_state
    entity_id: sensor.bedroom_temperature
    above: 25
    for:
      minutes: 5

condition:
  - condition: time
    after: "21:00:00"
    before: "23:00:00"
  - condition: not
    conditions:
      - condition: state
        entity_id: climate.bedroom
        state: "unavailable"
  - condition: not
    conditions:
      - condition: state
        entity_id: climate.bedroom
        state: "cool"

action:
  - action: climate.set_temperature
    target:
      entity_id: climate.bedroom
    data:
      temperature: 22
  - action: climate.set_hvac_mode
    target:
      entity_id: climate.bedroom
    data:
      hvac_mode: cool
