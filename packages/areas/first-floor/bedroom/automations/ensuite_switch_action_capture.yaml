---
alias: En suite switch action capture (DEBUG)
description: >
  Forensic capture for phantom wall-switch presses. Logs every raw `action`
  payload from the ensuite switch with timestamp, linkquality, battery, and
  entry-correlation (seconds since door-open / occupancy-on). A phantom press
  shows up as an action arriving right as you walk in, with no human at the
  wall. Temporary — remove once the phantom payload is identified.
id: 6d2f0b6a-2e1f-4c8a-9b77-2a4d1e3c9f01

mode: queued
max: 10
max_exceeded: silent

triggers:
  # z2m base-topic JSON (carries full action + linkquality + battery)
  - trigger: mqtt
    id: action_topic
    topic: "zigbee2mqtt/ensuite_bathroom"
  - trigger: mqtt
    id: action_topic
    topic: "zigbee2mqtt/ensuite_bathroom_switch"
  # bare /action sub-topic (string payload only), in case base JSON is silent
  - trigger: mqtt
    id: action_subtopic
    topic: "zigbee2mqtt/ensuite_bathroom/action"
  - trigger: mqtt
    id: action_subtopic
    topic: "zigbee2mqtt/ensuite_bathroom_switch/action"

variables:
  # base-topic JSON path vs bare /action string payload
  raw_action: >
    {% if trigger.id == 'action_subtopic' %}
      {{ trigger.payload }}
    {% else %}
      {{ trigger.payload_json.action | default('') }}
    {% endif %}
  lqi: "{{ trigger.payload_json.linkquality | default('n/a') }}"
  batt: "{{ trigger.payload_json.battery | default('n/a') }}"
  topic: "{{ trigger.topic }}"
  # entry correlation: how long ago did the door open / room become occupied
  since_occupied: >
    {{ (now() - states.binary_sensor.ensuite_bathroom_occupancy.last_changed)
       .total_seconds() | round(1) }}
  occupancy_state: "{{ states('binary_sensor.ensuite_bathroom_occupancy') }}"
  since_door: >
    {{ (now() - states.binary_sensor.ensuite_door.last_changed)
       .total_seconds() | round(1) }}
  door_state: "{{ states('binary_sensor.ensuite_door') }}"
  illum: "{{ states('sensor.ensuite_bathroom_illuminance') }}"
  # phantom signature: action within 5s of becoming occupied
  looks_phantom: >
    {{ occupancy_state == 'on' and (since_occupied | float(999)) < 5 }}

conditions:
  # ignore empty/heartbeat publishes that carry no action
  - condition: template
    value_template: "{{ raw_action not in ['', 'None', none] }}"

actions:
  - alias: Logbook entry for every action
    action: logbook.log
    data:
      name: "ENSUITE SWITCH CAPTURE"
      message: >
        action='{{ raw_action }}' topic='{{ topic }}' lqi={{ lqi }}
        batt={{ batt }} | occupancy={{ occupancy_state }}
        since_occupied={{ since_occupied }}s door={{ door_state }}
        since_door={{ since_door }}s illum={{ illum }}
        | PHANTOM_SUSPECT={{ looks_phantom }}
      entity_id: binary_sensor.ensuite_bathroom_occupancy

  - alias: Persistent notification only when it smells like a phantom
    if:
      - condition: template
        value_template: "{{ looks_phantom }}"
    then:
      - action: persistent_notification.create
        data:
          notification_id: "ensuite_phantom_{{ now().timestamp() | int }}"
          title: "Ensuite phantom switch?"
          message: >
            action='{{ raw_action }}' arrived {{ since_occupied }}s after
            occupancy ON (door {{ door_state }} {{ since_door }}s ago),
            illum={{ illum }}, lqi={{ lqi }}, batt={{ batt }}.
            Topic {{ topic }}.
