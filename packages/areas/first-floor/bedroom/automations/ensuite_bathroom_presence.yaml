---
alias: En suite Bathroom lights
description: >
  Drive ensuite bulbs from the occupancy latch. Never cuts the power relay
  (it feeds the Zigbee bulbs); relay is ensured on before any bulb command.
  Skips entirely while manual override is set.
id: 067898ef-0474-4733-b2c9-763d270d432b

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: binary_sensor.ensuite_bathroom_occupancy
    from: "off"
    to: "on"
    id: occupied
  - platform: state
    entity_id: binary_sensor.ensuite_bathroom_occupancy
    from: "on"
    to: "off"
    id: vacant
  # Already occupied and the room crosses into darkness -> light up now
  - platform: state
    entity_id: binary_sensor.ensuite_bathroom_is_dark
    from: "off"
    to: "on"
    id: got_dark

conditions:
  - condition: state
    entity_id: input_boolean.ensuite_manual_override
    state: "off"

action:
  - choose:
      # Turn on when (newly occupied) or (already occupied and just got dark),
      # gated on the room actually being dark and occupied right now.
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: occupied
              - condition: trigger
                id: got_dark
          - condition: state
            entity_id: binary_sensor.ensuite_bathroom_is_dark
            state: "on"
          - condition: state
            entity_id: binary_sensor.ensuite_bathroom_occupancy
            state: "on"
        sequence:
          # Ensure the relay is on (no-op if already on) so bulbs are powered.
          # No settle delay: relay normally stays on, so bulbs are available.
          - action: light.turn_on
            target:
              entity_id: light.ensuite_bathroom_main_power
          # Night-dim when the sun is down OR it's sleeping_time. Sun alone
          # is too coarse in summer: at a 04:40 toilet trip the sun is up
          # (~04:30 sunrise) but it's still the middle of the humans' night,
          # so the room must stay at the 1% middle bulb, not the bright main.
          - if:
              - condition: or
                conditions:
                  - condition: state
                    entity_id: sun.sun
                    state: below_horizon
                  - condition: state
                    entity_id: binary_sensor.sleeping_time
                    state: "on"
            then:
              - action: light.turn_on
                data:
                  entity_id: light.en_suite_bulb_top_middle
                  brightness_pct: 1
            else:
              # Use bedroom_non_bed (ceiling/wall lights), NOT the light.bedroom
              # group: the group includes bed_stripe, which the sleep nightlight
              # pulses to 1% on an ensuite-door trip — that would flip this to
              # 100% mid-trip. non_bed only reads true when the room is really lit.
              - action: light.turn_on
                data:
                  entity_id: light.ensuite_bathroom_main
                  brightness_pct: >
                    {{ 100 if is_state('light.bedroom_non_bed', 'on') else 20 }}
      - conditions:
          - condition: trigger
            id: vacant
        sequence:
          - alias: "Turn off bulbs (relay stays on so Zigbee bulbs stay reachable)"
            action: light.turn_off
            target:
              entity_id: light.ensuite_bathroom
