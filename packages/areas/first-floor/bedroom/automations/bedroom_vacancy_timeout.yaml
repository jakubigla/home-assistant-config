---
alias: Bedroom vacancy timeout
description: Turn off bedroom lights after 10 minutes of no presence
id: a8f3c9d2-7e41-4b2a-9c1e-5d8f2b4e6a3c

mode: single
max_exceeded: silent

# NOTE: binary_sensor.bedroom_presence is currently a phantom entity (not
# defined on the live instance) — tracked as separate bedroom-presence
# cleanup. Ensuite is intentionally NOT swept here; it self-manages its own
# lights via ensuite_bathroom_presence + the occupancy state machine.
trigger:
  - platform: state
    entity_id:
      - binary_sensor.bedroom_presence
    to: "off"
    for:
      minutes: 10

conditions:
  - condition: state
    entity_id: binary_sensor.bedroom_presence
    state: "off"

action:
  - alias: "Turn off bedroom lights (except bedside)"
    action: light.turn_off
    target:
      entity_id:
        - light.bedroom_leds
        - light.bedroom_main
        - light.bedroom_reflectors
        - light.bed_stripe
