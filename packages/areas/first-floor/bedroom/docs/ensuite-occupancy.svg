<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Ensuite occupancy state machine + lighting</title>
  <desc>Top-down floor plan: ensuite bottom-left, wardrobe top-left, bed against the right wall. The ensuite door opening, the entrance PIR, or the mmWave shower sensor latches an occupancy flag. While the ensuite is dark, the latch drives the ensuite bulbs on. When mmWave reports clear for 5 seconds the latch clears and the bulbs switch off (a 20-minute watchdog clears a stuck latch).</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="foot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7fd1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampcast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd17a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd17a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- scale: 1m = 100u, origin offset (40, 80). area 6.32m x 4.8m -->
  <rect width="720" height="600" rx="14" fill="#0f1420"/>
  <text x="22" y="36" fill="#cdd9e8" font-size="16" font-weight="700">Ensuite — occupancy latch + lighting</text>
  <text x="22" y="56" fill="#5a6b80" font-size="12.5">door / PIR / mmWave → latch on  ·  dark → bulbs on  ·  mmWave clear 5 s → off</text>

  <!-- status word (one visible per phase), top-right -->
  <g text-anchor="end" font-size="15" font-weight="700">
    <text x="698" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.02;0.12;0.16;0.9;1" dur="11s" repeatCount="indefinite"/>vacant · dark</text>
    <text x="698" y="40" fill="#7fd1ff" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.14;0.18;0.34;0.37;1" dur="11s" repeatCount="indefinite"/>● door / PIR / mmWave</text>
    <text x="698" y="40" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.36;0.40;0.70;0.73;1" dur="11s" repeatCount="indefinite"/>☀ latched · bulbs ON</text>
    <text x="698" y="40" fill="#9aa7bd" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.72;0.76;0.86;0.89;1" dur="11s" repeatCount="indefinite"/>mmWave clear 5 s</text>
    <text x="698" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.88;0.91;0.97;1" dur="11s" repeatCount="indefinite"/>latch off → bulbs off</text>
  </g>

  <!-- ===== room shells ===== -->
  <rect x="238" y="80" width="434" height="480" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>
  <rect x="40" y="80" width="198" height="170" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <text x="139" y="170" fill="#46566e" font-size="12" text-anchor="middle">wardrobe</text>
  <!-- ensuite box -->
  <rect x="40" y="281" width="198" height="279" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>

  <!-- bed (context) -->
  <rect x="534" y="320" width="120" height="200" rx="7" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <rect x="534" y="320" width="120" height="22" rx="7" fill="#26334d"/>
  <text x="594" y="430" fill="#54668a" font-size="12" text-anchor="middle">bed</text>

  <!-- ensuite door: right wall of ensuite, opens into bedroom (lower area) -->
  <rect x="234" y="470" width="9" height="70" rx="2" fill="#3a4a66"/>
  <text x="200" y="555" fill="#5a6b80" font-size="11" text-anchor="middle">ensuite door</text>

  <!-- ===== warm bulb cast over the ensuite (on while latched + dark) ===== -->
  <ellipse cx="139" cy="420" rx="120" ry="150" fill="url(#lampcast)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9;0;0"
      keyTimes="0;0.36;0.40;0.72;0.86;0.93;1" dur="11s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- ensuite ceiling bulb -->
  <g filter="url(#glow)">
    <circle cx="139" cy="360" r="9" fill="#3a2f15">
      <animate attributeName="fill"
        values="#3a2f15;#3a2f15;#ffd17a;#ffd17a;#ffd17a;#3a2f15;#3a2f15"
        keyTimes="0;0.36;0.40;0.72;0.86;0.93;1" dur="11s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </circle>
  </g>
  <text x="139" y="338" fill="#7a6a3a" font-size="10" text-anchor="middle">ensuite bulbs</text>

  <!-- mmWave shower sensor zone (bottom of ensuite), breathing pulse on entry + held while present -->
  <ellipse cx="139" cy="470" rx="78" ry="70" fill="#1769aa" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.32;0.16;0.32;0.30;0.30;0;0"
      keyTimes="0;0.14;0.18;0.22;0.26;0.40;0.74;0.80;1" dur="11s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <text x="139" y="500" fill="#3c6f9c" font-size="10" text-anchor="middle">mmWave (shower)</text>

  <!-- PIR cone near ensuite door, quick pulse on entry -->
  <polygon points="239,505 175,440 175,560" fill="#2e7d32" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.40;0.12;0.40;0;0"
      keyTimes="0;0.14;0.18;0.22;0.26;0.34;1" dur="11s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </polygon>
  <text x="190" y="425" fill="#46566e" font-size="10" text-anchor="middle">PIR</text>

  <!-- ===== person: enters through ensuite door into the ensuite ===== -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;1;0;0" keyTimes="0;0.12;0.18;0.74;0.80;0.84;1" dur="11s" repeatCount="indefinite"/>
    <circle r="20" fill="url(#foot)">
      <animateMotion dur="11s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.14;0.22;0.78;0.84;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M300,500 L300,500 L139,470 L139,470 L300,500 L300,500"/>
    </circle>
    <circle r="9" fill="#7fd1ff" stroke="#cdeeff" stroke-width="2">
      <animateMotion dur="11s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.14;0.22;0.78;0.84;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M300,500 L300,500 L139,470 L139,470 L300,500 L300,500"/>
    </circle>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
