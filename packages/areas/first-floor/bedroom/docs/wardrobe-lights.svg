<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Wardrobe occupancy lighting</title>
  <desc>Top-down floor plan: wardrobe top-left, ensuite bottom-left, bed against the right wall. Stepping into the wardrobe trips its occupancy sensor and switches the wardrobe light on. After the wardrobe is vacant for 30 seconds the light switches off (a 30-minute sweep clears it regardless).</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="foot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7fd1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampcast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd17a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd17a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- scale: 1m = 100u, origin offset (40, 80) -->
  <rect width="720" height="600" rx="14" fill="#0f1420"/>
  <text x="22" y="36" fill="#cdd9e8" font-size="16" font-weight="700">Wardrobe — occupancy lighting</text>
  <text x="22" y="56" fill="#5a6b80" font-size="12.5">step in → light on  ·  vacant 30 s → off  ·  30 min sweep clears</text>

  <!-- status word -->
  <g text-anchor="end" font-size="15" font-weight="700">
    <text x="698" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.02;0.14;0.18;0.9;1" dur="10s" repeatCount="indefinite"/>vacant</text>
    <text x="698" y="40" fill="#7fd1ff" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.16;0.20;0.34;0.37;1" dur="10s" repeatCount="indefinite"/>● occupied</text>
    <text x="698" y="40" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.30;0.34;0.66;0.69;1" dur="10s" repeatCount="indefinite"/>☀ light ON</text>
    <text x="698" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.74;0.78;0.96;1" dur="10s" repeatCount="indefinite"/>vacant 30 s → off</text>
  </g>

  <!-- ===== room shells ===== -->
  <rect x="238" y="80" width="434" height="480" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>
  <!-- wardrobe (active room) -->
  <rect x="40" y="80" width="198" height="170" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <rect x="40" y="281" width="198" height="279" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <text x="139" y="425" fill="#46566e" font-size="12" text-anchor="middle">ensuite</text>

  <!-- hanging rails along wardrobe walls -->
  <rect x="52" y="96" width="174" height="8" rx="3" fill="#1d2940"/>
  <rect x="52" y="96" width="8" height="60" rx="3" fill="#1d2940"/>
  <rect x="218" y="96" width="8" height="60" rx="3" fill="#1d2940"/>

  <!-- bed (context) -->
  <rect x="534" y="320" width="120" height="200" rx="7" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <rect x="534" y="320" width="120" height="22" rx="7" fill="#26334d"/>
  <text x="594" y="430" fill="#54668a" font-size="12" text-anchor="middle">bed</text>

  <!-- wardrobe opening: bottom wall of wardrobe, into bedroom -->
  <rect x="150" y="246" width="70" height="8" rx="2" fill="#3a4a66"/>

  <!-- warm cast over wardrobe (light on) -->
  <ellipse cx="139" cy="165" rx="120" ry="110" fill="url(#lampcast)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9;0;0"
      keyTimes="0;0.30;0.34;0.70;0.76;0.82;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- occupancy sensor zone, breathing pulse on entry, held while occupied -->
  <ellipse cx="139" cy="185" rx="74" ry="48" fill="#2e7d32" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.34;0.14;0.34;0.28;0.28;0;0"
      keyTimes="0;0.16;0.20;0.24;0.28;0.34;0.70;0.76;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <text x="139" y="234" fill="#46566e" font-size="10" text-anchor="middle">occupancy</text>

  <!-- wardrobe ceiling light -->
  <g filter="url(#glow)">
    <circle cx="139" cy="140" r="9" fill="#3a2f15">
      <animate attributeName="fill"
        values="#3a2f15;#3a2f15;#ffd17a;#ffd17a;#ffd17a;#3a2f15;#3a2f15"
        keyTimes="0;0.30;0.34;0.70;0.76;0.82;1" dur="10s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </circle>
  </g>
  <text x="139" y="120" fill="#7a6a3a" font-size="10" text-anchor="middle">wardrobe light</text>

  <!-- person: walks from bedroom into the wardrobe, then back out -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;1;0;0" keyTimes="0;0.12;0.18;0.70;0.76;0.80;1" dur="10s" repeatCount="indefinite"/>
    <circle r="20" fill="url(#foot)">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.16;0.24;0.72;0.78;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M185,300 L185,300 L139,180 L139,180 L185,300 L185,300"/>
    </circle>
    <circle r="9" fill="#7fd1ff" stroke="#cdeeff" stroke-width="2">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.16;0.24;0.72;0.78;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M185,300 L185,300 L139,180 L139,180 L185,300 L185,300"/>
    </circle>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
