<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 430" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Bedroom presence lighting</title>
  <desc>Top-down floor plan. A person walks in through the door, the PIR cone pulses, the bed stripe glows on while dark, then after a 10-minute vacancy the lights fade off.</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="foot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7fd1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampcast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd17a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd17a" stop-opacity="0"/>
    </radialGradient>
    <!-- cycle = 10s. phases: 0-3 walk in · 3 lights on · 3-7.8 dwell · 7.8-9 vacancy fade · 9-10 reset -->
  </defs>

  <!-- ===== frame & titles ===== -->
  <rect width="640" height="430" rx="14" fill="#0f1420"/>
  <text x="22" y="36" fill="#cdd9e8" font-size="16" font-weight="700">Bedroom — presence lighting</text>
  <text x="22" y="56" fill="#5a6b80" font-size="12.5">enter + dark → bed stripe on  ·  vacant 10 min → off</text>

  <!-- status word (one visible per phase), top-right -->
  <g text-anchor="end" font-size="15" font-weight="700">
    <text x="618" y="40" fill="#7fd1ff" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.06;0.30;0.33;0.9;1" dur="10s" repeatCount="indefinite"/>● motion</text>
    <text x="618" y="40" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.30;0.34;0.78;0.84;1" dur="10s" repeatCount="indefinite"/>☀ stripe ON</text>
    <text x="618" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.78;0.82;0.86;0.97;1" dur="10s" repeatCount="indefinite"/>vacant → off</text>
  </g>

  <!-- ===== room shells ===== -->
  <rect x="40" y="84" width="420" height="300" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>
  <rect x="460" y="84" width="140" height="170" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <text x="530" y="166" fill="#46566e" font-size="11" text-anchor="middle">ensuite</text>
  <text x="530" y="182" fill="#3c4a60" font-size="10" text-anchor="middle">mmWave</text>
  <rect x="460" y="262" width="140" height="122" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <text x="530" y="327" fill="#46566e" font-size="11" text-anchor="middle">wardrobe</text>

  <!-- door -->
  <rect x="200" y="378" width="70" height="9" rx="2" fill="#3a4a66"/>
  <text x="235" y="406" fill="#5a6b80" font-size="11" text-anchor="middle">door</text>

  <!-- bed -->
  <rect x="70" y="114" width="150" height="92" rx="7" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <rect x="70" y="114" width="150" height="22" rx="7" fill="#26334d"/>
  <text x="145" y="166" fill="#54668a" font-size="12" text-anchor="middle">bed</text>
  <circle cx="62" cy="122" r="6" fill="#2a3346"/>
  <circle cx="228" cy="122" r="6" fill="#2a3346"/>

  <!-- warm light cast from stripe (radial), fades with stripe -->
  <ellipse cx="145" cy="240" rx="130" ry="90" fill="url(#lampcast)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9;0;0"
      keyTimes="0;0.30;0.34;0.78;0.86;0.95;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- bed stripe -->
  <g filter="url(#glow)">
    <rect x="70" y="208" width="150" height="7" rx="3.5" fill="#3a2f15">
      <animate attributeName="fill"
        values="#3a2f15;#3a2f15;#ffd17a;#ffd17a;#ffd17a;#3a2f15;#3a2f15"
        keyTimes="0;0.30;0.34;0.78;0.86;0.95;1" dur="10s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </rect>
  </g>
  <text x="145" y="230" fill="#7a6a3a" font-size="10" text-anchor="middle">bed stripe</text>

  <!-- ===== PIR cone (entrance), breathing pulse on entry ===== -->
  <text x="330" y="356" fill="#46566e" font-size="11" text-anchor="middle">PIR (entrance)</text>
  <polygon points="235,378 152,262 318,262" fill="#2e7d32" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.40;0.12;0.40;0;0"
      keyTimes="0;0.14;0.20;0.25;0.30;0.36;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </polygon>

  <!-- ===== person: glow foot + dot, walks door -> bedside with easing ===== -->
  <g>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.86;0.9;1" dur="10s" repeatCount="indefinite"/>
    <!-- soft foot glow -->
    <circle r="20" fill="url(#foot)">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.05;0.30;0.80;0.90;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M235,360 L235,360 L150,212 L150,212 L235,360 L235,360"/>
    </circle>
    <!-- person dot -->
    <circle r="9" fill="#7fd1ff" stroke="#cdeeff" stroke-width="2">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.05;0.30;0.80;0.90;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M235,360 L235,360 L150,212 L150,212 L235,360 L235,360"/>
    </circle>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
