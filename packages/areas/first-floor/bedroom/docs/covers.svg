<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Bedroom window covers</title>
  <desc>Top-down floor plan from the architect drawing: wardrobe top-left, ensuite bottom-left, bed against the right wall, a balcony window along the bottom wall. At dusk (or one hour before sunrise) the bedroom roller cover slides down and closes the window. When sleeping time ends on a weekday, the cover slides back up and opens.</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="lampcast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd17a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd17a" stop-opacity="0"/>
    </radialGradient>
    <!-- daylight wash through the open window -->
    <linearGradient id="daylight" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#bfe3ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#bfe3ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="winclip"><rect x="370" y="470" width="270" height="90"/></clipPath>
  </defs>

  <!-- scale: 1m = 100u, origin offset (40, 80). area 6.32m x 4.8m -->
  <rect width="720" height="600" rx="14" fill="#0f1420"/>
  <text x="22" y="36" fill="#cdd9e8" font-size="16" font-weight="700">Bedroom — window covers</text>
  <text x="22" y="56" fill="#5a6b80" font-size="12.5">dusk / pre-sunrise → cover closes  ·  wake (weekday) → cover opens</text>

  <!-- status word (one visible per phase), top-right -->
  <g text-anchor="end" font-size="15" font-weight="700">
    <text x="698" y="40" fill="#bfe3ff" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.02;0.16;0.20;0.9;1" dur="11s" repeatCount="indefinite"/>open · daylight</text>
    <text x="698" y="40" fill="#9aa7bd" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.20;0.24;0.40;0.43;1" dur="11s" repeatCount="indefinite"/>↓ closing</text>
    <text x="698" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.43;0.46;0.66;0.69;1" dur="11s" repeatCount="indefinite"/>closed · night</text>
    <text x="698" y="40" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.69;0.72;0.92;0.96;1" dur="11s" repeatCount="indefinite"/>↑ opening (wake)</text>
  </g>

  <!-- ===== room shells (origin 40,80; 1m=100u) ===== -->
  <!-- bedroom: x1.98..6.32 m, y0..4.8 m  -> (238,80) w434 h480 -->
  <rect x="238" y="80" width="434" height="480" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>
  <!-- wardrobe: x0..1.98, y0..1.70 -> (40,80) w198 h170 -->
  <rect x="40" y="80" width="198" height="170" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <text x="139" y="170" fill="#46566e" font-size="12" text-anchor="middle">wardrobe</text>
  <!-- ensuite: x0..1.98, y2.01..4.8 -> (40,281) w198 h279 -->
  <rect x="40" y="281" width="198" height="279" rx="9" fill="#131a27" stroke="#2b3850" stroke-width="2"/>
  <text x="139" y="425" fill="#46566e" font-size="12" text-anchor="middle">ensuite</text>

  <!-- bed: against right wall, lower half -->
  <rect x="534" y="320" width="120" height="200" rx="7" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <rect x="534" y="320" width="120" height="22" rx="7" fill="#26334d"/>
  <text x="594" y="430" fill="#54668a" font-size="12" text-anchor="middle">bed</text>
  <circle cx="560" cy="356" r="7" fill="#2a3346"/>
  <circle cx="628" cy="356" r="7" fill="#2a3346"/>

  <!-- door: bottom wall of bedroom, x2.1..3.0 -> 250..340 at y=560 -->
  <rect x="250" y="552" width="90" height="9" rx="2" fill="#3a4a66"/>
  <text x="295" y="578" fill="#5a6b80" font-size="11" text-anchor="middle">door</text>

  <!-- ===== window on bottom wall, x3.3..6.0 -> 370..640 ===== -->
  <!-- daylight spilling in (visible only while cover is open) -->
  <rect x="370" y="470" width="270" height="90" fill="url(#daylight)" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0.9;0;0;0;0.9;0.9"
      keyTimes="0;0.02;0.18;0.30;0.70;0.86;0.93;1" dur="11s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>
  <!-- window frame -->
  <rect x="370" y="551" width="270" height="11" rx="2" fill="#3a4a66"/>
  <line x1="505" y1="551" x2="505" y2="562" stroke="#0f1420" stroke-width="2"/>
  <text x="505" y="540" fill="#46566e" font-size="11" text-anchor="middle">balcony window  ·  cover.bedroom</text>

  <!-- roller cover: slats slide DOWN over the window opening, then back up.
       opening is 90u tall (y470..560). Cover group translates from y=-90 (stowed
       above the window, hidden by clip) to y=0 (fully drawn). -->
  <g clip-path="url(#winclip)">
    <g transform="translate(0,-90)">
      <animateTransform attributeName="transform" type="translate"
        values="0,-90; 0,-90; 0,0; 0,0; 0,0; 0,-90; 0,-90"
        keyTimes="0;0.20;0.43;0.46;0.70;0.92;1" dur="11s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
      <rect x="370" y="470" width="270" height="90" fill="#243042"/>
      <line x1="370" y1="486" x2="640" y2="486" stroke="#1a232f" stroke-width="2"/>
      <line x1="370" y1="502" x2="640" y2="502" stroke="#1a232f" stroke-width="2"/>
      <line x1="370" y1="518" x2="640" y2="518" stroke="#1a232f" stroke-width="2"/>
      <line x1="370" y1="534" x2="640" y2="534" stroke="#1a232f" stroke-width="2"/>
      <line x1="370" y1="550" x2="640" y2="550" stroke="#1a232f" stroke-width="2"/>
    </g>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
