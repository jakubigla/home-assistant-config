---
binary_sensor:
  - name: bedroom_is_dark
    device_class: light
    delay_on: "00:00:05"
    delay_off: "00:00:30"
    # The bedroom illuminance sensor (sensor.bedroom_illuminance) was removed
    # from the live instance. With no in-room lux source, "dark" now mirrors
    # outdoor darkness (sun below civil twilight) via binary_sensor.outdoor_is_dark.
    state: >
      {{ is_state('binary_sensor.outdoor_is_dark', 'on') }}
    attributes:
      source: "binary_sensor.outdoor_is_dark"
      outdoor_dark: "{{ is_state('binary_sensor.outdoor_is_dark', 'on') }}"
