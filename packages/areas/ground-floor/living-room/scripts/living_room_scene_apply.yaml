---
alias: Living Room Scene Apply
description: >
  Apply the current living room scene. Called by the scene-apply automation
  and directly callable from UI, voice, or any other input device.
mode: restart

sequence:
  - variables:
      scene: "{{ states('input_select.living_room_scene') }}"

  - choose:
      # ── CINEMA ──────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ scene == 'cinema' }}"
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.ground_floor_non_living_room
          - if:
              - condition: state
                entity_id: binary_sensor.toilet_presence
                state: "off"
            then:
              - action: light.turn_off
                target:
                  entity_id: light.toilet
          - action: light.turn_off
            target:
              entity_id: light.living_room_leds
          - action: light.turn_on
            data:
              brightness_pct: 20
              rgb_color:
                - 255
                - 193
                - 132
            target:
              entity_id: light.living_room_tv_leds_with_power
          - action: light.turn_on
            data:
              brightness_pct: 1
            target:
              entity_id: light.living_room_corner_lamp

      # ── DINING ──────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ scene == 'dining' }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.living_room_leds
          - action: light.turn_on
            data:
              brightness_pct: 60
            target:
              entity_id: light.living_room_corner_lamp
          - action: light.turn_off
            target:
              entity_id: light.living_room_tv_leds

      # ── NONE ────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ scene == 'none' }}"
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.living_room_tv_leds
          - if:
              - condition: state
                entity_id: binary_sensor.living_room_is_dark
                state: "on"
            then:
              - action: light.turn_on
                target:
                  entity_id: light.living_room_corner_lamp
