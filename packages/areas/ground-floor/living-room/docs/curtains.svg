<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Living room curtains</title>
  <desc>Top-down floor plan of the living-room lounge: TV and media unit on the left wall, sofa centre-right, coffee tables and armchair in the middle, console on the right wall, and a glazed terrace wall across the bottom with two roller covers (main and left) side by side. When it gets dark both covers slide down and close; when daylight returns — or at 07:00, whichever comes first — they slide back up and open.</desc>

  <defs>
    <linearGradient id="daylight" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#bfe3ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#bfe3ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clipMain"><rect x="350" y="468" width="220" height="92"/></clipPath>
    <clipPath id="clipLeft"><rect x="150" y="468" width="180" height="92"/></clipPath>
  </defs>

  <!-- scale: 1m = 100u, origin offset (110, 110). lounge 5.0m x 4.5m -->
  <rect width="720" height="600" rx="14" fill="#0f1420"/>
  <text x="22" y="36" fill="#cdd9e8" font-size="16" font-weight="700">Living room — curtains</text>
  <text x="22" y="56" fill="#5a6b80" font-size="12.5">dark → both covers close  ·  daylight or 07:00 → open</text>

  <!-- status word (one visible per phase), top-right -->
  <g text-anchor="end" font-size="15" font-weight="700">
    <text x="698" y="40" fill="#bfe3ff" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.02;0.16;0.20;0.9;1" dur="11s" repeatCount="indefinite"/>open · daylight</text>
    <text x="698" y="40" fill="#9aa7bd" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.20;0.24;0.40;0.43;1" dur="11s" repeatCount="indefinite"/>↓ closing (dark)</text>
    <text x="698" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.43;0.46;0.66;0.69;1" dur="11s" repeatCount="indefinite"/>closed · night</text>
    <text x="698" y="40" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.69;0.72;0.92;0.96;1" dur="11s" repeatCount="indefinite"/>↑ opening (07:00)</text>
  </g>

  <!-- ===== room shell ===== -->
  <rect x="110" y="110" width="500" height="450" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>

  <!-- furniture -->
  <!-- TV / media unit (left wall) -->
  <rect x="110" y="230" width="35" height="200" rx="4" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <rect x="112" y="250" width="6" height="160" rx="3" fill="#33425e"/>
  <text x="155" y="335" fill="#54668a" font-size="10" text-anchor="start" transform="rotate(90 155 335)">TV / media</text>
  <!-- sofa (centre-right) -->
  <rect x="410" y="270" width="80" height="240" rx="8" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <rect x="490" y="270" width="14" height="240" rx="6" fill="#26334d"/>
  <text x="450" y="395" fill="#54668a" font-size="10" text-anchor="middle">sofa</text>
  <!-- coffee tables (two rounds) -->
  <circle cx="320" cy="395" r="34" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <circle cx="345" cy="440" r="22" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <!-- armchair lower-left -->
  <rect x="180" y="430" width="90" height="90" rx="12" fill="#1d2940" stroke="#33425e" stroke-width="1.5" transform="rotate(-12 225 475)"/>
  <text x="225" y="478" fill="#54668a" font-size="10" text-anchor="middle">chair</text>
  <!-- console + plant (right wall) -->
  <rect x="560" y="290" width="50" height="140" rx="4" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <text x="585" y="365" fill="#54668a" font-size="9" text-anchor="middle" transform="rotate(90 585 365)">console</text>

  <!-- ===== glazed terrace wall (bottom) with two covers ===== -->
  <!-- daylight spilling in (visible while covers open) -->
  <rect x="150" y="468" width="420" height="92" fill="url(#daylight)" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0.9;0;0;0;0.9;0.9"
      keyTimes="0;0.02;0.18;0.30;0.70;0.86;0.93;1" dur="11s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>
  <!-- window frames -->
  <rect x="150" y="551" width="180" height="11" rx="2" fill="#3a4a66"/>
  <rect x="350" y="551" width="220" height="11" rx="2" fill="#3a4a66"/>
  <text x="240" y="540" fill="#46566e" font-size="10" text-anchor="middle">left</text>
  <text x="460" y="540" fill="#46566e" font-size="10" text-anchor="middle">main</text>

  <!-- LEFT cover: slats slide down then up -->
  <g clip-path="url(#clipLeft)">
    <g transform="translate(0,-92)">
      <animateTransform attributeName="transform" type="translate"
        values="0,-92; 0,-92; 0,0; 0,0; 0,0; 0,-92; 0,-92"
        keyTimes="0;0.20;0.43;0.46;0.70;0.92;1" dur="11s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
      <rect x="150" y="468" width="180" height="92" fill="#243042"/>
      <line x1="150" y1="486" x2="330" y2="486" stroke="#1a232f" stroke-width="2"/>
      <line x1="150" y1="504" x2="330" y2="504" stroke="#1a232f" stroke-width="2"/>
      <line x1="150" y1="522" x2="330" y2="522" stroke="#1a232f" stroke-width="2"/>
      <line x1="150" y1="540" x2="330" y2="540" stroke="#1a232f" stroke-width="2"/>
    </g>
  </g>
  <!-- MAIN cover: slats slide down then up -->
  <g clip-path="url(#clipMain)">
    <g transform="translate(0,-92)">
      <animateTransform attributeName="transform" type="translate"
        values="0,-92; 0,-92; 0,0; 0,0; 0,0; 0,-92; 0,-92"
        keyTimes="0;0.22;0.45;0.48;0.70;0.90;1" dur="11s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
      <rect x="350" y="468" width="220" height="92" fill="#243042"/>
      <line x1="350" y1="486" x2="570" y2="486" stroke="#1a232f" stroke-width="2"/>
      <line x1="350" y1="504" x2="570" y2="504" stroke="#1a232f" stroke-width="2"/>
      <line x1="350" y1="522" x2="570" y2="522" stroke="#1a232f" stroke-width="2"/>
      <line x1="350" y1="540" x2="570" y2="540" stroke="#1a232f" stroke-width="2"/>
    </g>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
