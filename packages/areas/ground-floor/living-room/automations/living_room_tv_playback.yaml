---
alias: Living Room TV
description: Control TV LEDs based on playback state
id: 9e959848-5de4-4e82-8874-5250fbc72929

mode: restart
max_exceeded: silent

trigger:
  # TV starts playing
  - platform: state
    entity_id: media_player.living_room_tv
    to: "playing"
    from:
      - "off"
      - "idle"
      - "paused"
      - "standby"
      - "on"
    for:
      seconds: 1
    id: tv_playing

  # TV is paused
  - platform: state
    entity_id: media_player.living_room_tv
    to: "paused"
    from:
      - "off"
      - "idle"
      - "playing"
      - "standby"
      - "on"
    for:
      seconds: 2
    id: tv_paused

  # TV is on but idle
  - platform: state
    entity_id: media_player.living_room_tv
    to: "idle"
    from:
      - "off"
      - "playing"
      - "paused"
      - "standby"
      - "on"
    id: tv_idle
    for:
      seconds: 1

  # TV turns on (not yet playing/paused/idle)
  - platform: state
    entity_id: media_player.living_room_tv
    to: "on"
    from:
      - "off"
      - "idle"
      - "playing"
      - "paused"
      - "standby"
    id: tv_on

  # TV turns off
  - platform: state
    entity_id: media_player.living_room_tv
    to: "off"
    from:
      - "idle"
      - "playing"
      - "paused"
      - "standby"
      - "on"
    id: tv_off

conditions: []

action:
  - choose:
      # TV is playing - dim ambient lights for watching
      - alias: "TV playing - dim LEDs for watching"
        conditions:
          - condition: trigger
            id: tv_playing
          - condition: state
            entity_id: binary_sensor.living_room_is_dark
            state: "on"
          # Dining scene keeps lights bright — TV does not override
          - condition: template
            value_template: >
              {{ not is_state('input_select.living_room_scene', 'dining') }}
        sequence:
          - condition: state
            entity_id: media_player.living_room_tv
            state: "playing"
          # Turn off other ground floor lights if no one is in common areas
          - if:
              - condition: state
                entity_id: binary_sensor.common_area_presence
                state: "off"
            then:
              - action: light.turn_off
                target:
                  entity_id: light.ground_floor_non_living_room
              # Respect toilet occupancy
              - if:
                  - condition: state
                    entity_id: binary_sensor.toilet_presence
                    state: "off"
                then:
                  - action: light.turn_off
                    target:
                      entity_id: light.toilet
          - action: light.turn_off
            target:
              entity_id: light.living_room_leds
          - action: light.turn_on
            data:
              brightness_pct: 20
              rgb_color:
                - 255
                - 193
                - 132
            target:
              entity_id: light.living_room_tv_leds_with_power
          - action: light.turn_on
            data:
              brightness_pct: 1
            target:
              entity_id: light.living_room_corner_lamp

      # TV is paused - brighten ambient lights
      - alias: "TV paused - brighten LEDs"
        conditions:
          - condition: trigger
            id: tv_paused
          - condition: state
            entity_id: binary_sensor.living_room_is_dark
            state: "on"
          # Dining scene keeps lights bright — TV does not override
          - condition: template
            value_template: >
              {{ not is_state('input_select.living_room_scene', 'dining') }}
        sequence:
          - condition: state
            entity_id: media_player.living_room_tv
            state: "paused"
          - action: light.turn_on
            target:
              entity_id: light.living_room_leds
          - action: light.turn_on
            data:
              brightness_pct: 100
              rgb_color:
                - 255
                - 193
                - 132
            target:
              entity_id: light.living_room_tv_leds_with_power
          - action: light.turn_on
            data:
              brightness_pct: 30
            target:
              entity_id: light.living_room_corner_lamp

      # TV is idle or just turned on - medium ambient lights
      - alias: "TV idle/on - medium brightness LEDs"
        conditions:
          - condition: trigger
            id:
              - tv_idle
              - tv_on
          - condition: state
            entity_id: binary_sensor.living_room_is_dark
            state: "on"
          # Dining scene keeps lights bright — TV does not override
          - condition: template
            value_template: >
              {{ not is_state('input_select.living_room_scene', 'dining') }}
        sequence:
          - condition: state
            entity_id: media_player.living_room_tv
            state:
              - "idle"
              - "on"
          - action: light.turn_on
            target:
              entity_id: light.living_room_leds
          - action: light.turn_on
            data:
              brightness_pct: 50
              rgb_color:
                - 255
                - 193
                - 132
            target:
              entity_id: light.living_room_tv_leds_with_power
          - action: light.turn_on
            data:
              brightness_pct: 30
            target:
              entity_id: light.living_room_corner_lamp

      # TV turns off - turn off TV LEDs, restore corner lamp
      - alias: "TV off - turn off LEDs"
        conditions:
          - condition: trigger
            id: tv_off
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.living_room_tv_leds
          - condition: state
            entity_id: binary_sensor.living_room_is_dark
            state: "on"
          - condition: state
            entity_id: binary_sensor.ground_floor_presence
            state: "on"
          - condition: state
            entity_id: light.ground_floor_powerful
            state: "off"
          - action: light.turn_on
            target:
              entity_id: light.living_room_corner_lamp
