---
alias: Living Room TV
description: >
  Control living room lights based on TV playback state and active scene.
  Scene (input_select.living_room_scene) is a mode flag set by the Aqara Cube;
  this automation reads it to decide lighting. Shake reapply also re-evaluates.
  Re-evaluates on HA restart and automation reload to prevent stale light states.

  ## Scenes (Aqara Cube sides)

  ### None (side 1) — Default / no control
  TV playback automation does nothing. Normal presence-based automations
  handle all lights. Use this to opt out of TV-driven lighting.

  ### Cinema (side 2) — Immersive watching
  TV playing:
    - Turn off ground floor non-living-room lights (if common area vacant)
    - Turn off toilet lights (if toilet vacant)
    - Turn off living room LEDs
    - TV LEDs: 20% warm orange (dark only)
    - Corner lamp: 1% (dark only)
  TV paused:
    - Living room LEDs: on
    - TV LEDs: 100% warm orange (dark only)
    - Corner lamp: 30% (dark only)
  TV idle/on:
    - Living room LEDs: on
    - TV LEDs: 50% warm orange (dark only)
    - Corner lamp: 30% (dark only)
  TV off:
    - TV LEDs: off
    - Corner lamp restored if dark + presence + no powerful lights on

  ### Dining (side 3) — Bright ambient for eating
  Same TV LED behavior as cinema, but:
    - Living room LEDs stay at 100% even when TV is playing
    - Corner lamp: 60% instead of 1%/30%
    - Does NOT turn off other ground floor lights

  ## Kitchen LED interaction
  Kitchen presence automation is blocked from turning on kitchen LED
  when TV is playing in cinema scene, preventing it from overriding
  the turn-off action. Dining and none scenes allow normal kitchen behavior.

  ## Darkness gate
  Turn-off actions (living room LEDs, ground floor lights) run regardless
  of darkness. Mood lighting (TV LEDs, corner lamp brightness) only
  applies when binary_sensor.living_room_is_dark is on.
id: 9e959848-5de4-4e82-8874-5250fbc72929

mode: restart
max_exceeded: silent

trigger:
  # ── Re-evaluate on restart/reload ─────────────────────────────────
  - trigger: homeassistant
    event: start
    id: re_evaluate
  - trigger: event
    event_type: automation_reloaded
    id: re_evaluate

  # ── TV state changes ───────────────────────────────────────────────
  - platform: state
    entity_id: media_player.living_room_tv
    to: "playing"
    from:
      - "off"
      - "idle"
      - "paused"
      - "standby"
      - "on"
    for:
      seconds: 1
    id: tv_playing

  - platform: state
    entity_id: media_player.living_room_tv
    to: "paused"
    from:
      - "off"
      - "idle"
      - "playing"
      - "standby"
      - "on"
    for:
      seconds: 2
    id: tv_paused

  - platform: state
    entity_id: media_player.living_room_tv
    to: "idle"
    from:
      - "off"
      - "playing"
      - "paused"
      - "standby"
      - "on"
    id: tv_idle
    for:
      seconds: 1

  - platform: state
    entity_id: media_player.living_room_tv
    to: "on"
    from:
      - "off"
      - "idle"
      - "playing"
      - "paused"
      - "standby"
    id: tv_on

  - platform: state
    entity_id: media_player.living_room_tv
    to: "off"
    from:
      - "idle"
      - "playing"
      - "paused"
      - "standby"
      - "on"
    id: tv_off

  # ── Scene changes (cube flip while TV is active) ───────────────────
  - platform: state
    entity_id: input_select.living_room_scene
    to:
      - none
      - cinema
      - dining
    id: scene_changed

  # ── Shake reapply ──────────────────────────────────────────────────
  - platform: state
    entity_id: input_button.living_room_scene_reapply
    id: scene_reapply

conditions: []

action:
  # Resolve the effective TV state once for all branches
  - variables:
      tv: "{{ states('media_player.living_room_tv') }}"
      scene: "{{ states('input_select.living_room_scene') }}"
      is_dark: "{{ is_state('binary_sensor.living_room_is_dark', 'on') }}"
      tv_active: "{{ tv in ['playing', 'paused', 'idle', 'on'] }}"

  - choose:
      # ── TV OFF ─────────────────────────────────────────────────────
      - alias: "TV off - turn off TV LEDs, restore corner lamp"
        conditions:
          - condition: template
            value_template: "{{ tv == 'off' }}"
          - condition: trigger
            id: tv_off
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.living_room_tv_leds
          - condition: template
            value_template: "{{ is_dark }}"
          - condition: state
            entity_id: binary_sensor.ground_floor_presence
            state: "on"
          - condition: state
            entity_id: light.ground_floor_powerful
            state: "off"
          - action: light.turn_on
            target:
              entity_id: light.living_room_corner_lamp

      # ── Scene/reapply while TV is off — do nothing ─────────────────
      - alias: "Scene change while TV off - no action"
        conditions:
          - condition: trigger
            id:
              - scene_changed
              - scene_reapply
          - condition: template
            value_template: "{{ not tv_active }}"
        sequence: []

      # ── NONE scene — no light control, let presence automations handle it
      - alias: "None scene - no action"
        conditions:
          - condition: template
            value_template: "{{ scene == 'none' }}"
        sequence: []

      # ── TV PLAYING ───────────────────────────────────────────────
      - alias: "TV playing - dim for watching"
        conditions:
          - condition: template
            value_template: "{{ tv == 'playing' }}"
        sequence:
          # Turn off other ground floor lights (not during dining)
          - if:
              - condition: template
                value_template: "{{ scene != 'dining' }}"
              - condition: state
                entity_id: binary_sensor.common_area_presence
                state: "off"
            then:
              - action: light.turn_off
                target:
                  entity_id: light.ground_floor_non_living_room
              - if:
                  - condition: state
                    entity_id: binary_sensor.toilet_presence
                    state: "off"
                then:
                  - action: light.turn_off
                    target:
                      entity_id: light.toilet
          # Living room LEDs: dining keeps 100%, otherwise off
          - if:
              - condition: template
                value_template: "{{ scene == 'dining' }}"
            then:
              - action: light.turn_on
                target:
                  entity_id: light.living_room_leds
            else:
              - action: light.turn_off
                target:
                  entity_id: light.living_room_leds
          # Mood lighting only when dark
          - condition: template
            value_template: "{{ is_dark }}"
          - action: light.turn_on
            data:
              brightness_pct: 20
              rgb_color:
                - 255
                - 193
                - 132
            target:
              entity_id: light.living_room_tv_leds_with_power
          - action: light.turn_on
            data:
              brightness_pct: "{{ 60 if scene == 'dining' else 1 }}"
            target:
              entity_id: light.living_room_corner_lamp

      # ── TV PAUSED ──────────────────────────────────────────────────
      - alias: "TV paused - brighten LEDs"
        conditions:
          - condition: template
            value_template: "{{ tv == 'paused' }}"
          - condition: template
            value_template: "{{ is_dark }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.living_room_leds
          - action: light.turn_on
            data:
              brightness_pct: 100
              rgb_color:
                - 255
                - 193
                - 132
            target:
              entity_id: light.living_room_tv_leds_with_power
          - action: light.turn_on
            data:
              brightness_pct: "{{ 60 if scene == 'dining' else 30 }}"
            target:
              entity_id: light.living_room_corner_lamp

      # ── TV IDLE/ON ─────────────────────────────────────────────────
      - alias: "TV idle/on - medium brightness LEDs"
        conditions:
          - condition: template
            value_template: "{{ tv in ['idle', 'on'] }}"
          - condition: template
            value_template: "{{ is_dark }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: light.living_room_leds
          - action: light.turn_on
            data:
              brightness_pct: 50
              rgb_color:
                - 255
                - 193
                - 132
            target:
              entity_id: light.living_room_tv_leds_with_power
          - action: light.turn_on
            data:
              brightness_pct: "{{ 60 if scene == 'dining' else 30 }}"
            target:
              entity_id: light.living_room_corner_lamp
