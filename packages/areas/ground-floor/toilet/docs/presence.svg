<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 560" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Toilet presence lighting</title>
  <desc>Top-down floor plan of the WC: vanity sink along the top wall, the toilet pan bottom-centre, door on the left wall. Opening the door or the presence sensor firing switches the light on — the dim ambient light when it is dark outside, the main light when it is bright. The light switches off as soon as the room reads vacant (and a 2-minute safety sweep follows a door-open that no one walks through).</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="foot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7fd1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampcast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd17a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd17a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- scale: 1m = 180u, origin offset (95, 120). toilet 1.5m x 2.2m -->
  <rect width="380" height="560" rx="14" fill="#0f1420"/>
  <text x="22" y="34" fill="#cdd9e8" font-size="15" font-weight="700">Toilet — presence lighting</text>
  <text x="22" y="53" fill="#5a6b80" font-size="11.5">door / presence → on (dark: ambient · bright: main)</text>

  <!-- status word (below the title row) -->
  <g text-anchor="end" font-size="13" font-weight="700">
    <text x="360" y="80" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.02;0.14;0.18;0.9;1" dur="10s" repeatCount="indefinite"/>vacant · dark</text>
    <text x="360" y="80" fill="#7fd1ff" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.14;0.18;0.32;0.35;1" dur="10s" repeatCount="indefinite"/>● door / presence</text>
    <text x="360" y="80" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.32;0.36;0.66;0.69;1" dur="10s" repeatCount="indefinite"/>☀ ambient ON</text>
    <text x="360" y="80" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.74;0.78;0.96;1" dur="10s" repeatCount="indefinite"/>vacant → off</text>
  </g>

  <!-- ===== room shell ===== -->
  <rect x="95" y="120" width="270" height="396" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>

  <!-- warm cast (light on) -->
  <ellipse cx="230" cy="300" rx="150" ry="190" fill="url(#lampcast)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9;0;0"
      keyTimes="0;0.32;0.36;0.70;0.76;0.82;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- vanity / sink (top wall) -->
  <rect x="149" y="120" width="162" height="64" rx="5" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <circle cx="230" cy="152" r="13" fill="#26334d"/>
  <text x="230" y="200" fill="#54668a" font-size="10" text-anchor="middle">sink</text>

  <!-- WC pan (bottom-centre) -->
  <rect x="185" y="372" width="90" height="100" rx="14" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <ellipse cx="230" cy="412" rx="28" ry="34" fill="#222c40" stroke="#33425e" stroke-width="1"/>
  <text x="230" y="492" fill="#54668a" font-size="10" text-anchor="middle">WC</text>

  <!-- door (left wall) -->
  <rect x="91" y="300" width="9" height="120" rx="2" fill="#3a4a66">
    <animate attributeName="fill" values="#3a4a66;#3a4a66;#5fa9d6;#3a4a66;#3a4a66;#3a4a66"
      keyTimes="0;0.12;0.18;0.30;0.9;1" dur="10s" repeatCount="indefinite"/>
  </rect>
  <text x="70" y="364" fill="#5a6b80" font-size="10" text-anchor="middle" transform="rotate(-90 70 364)">door</text>

  <!-- toilet light -->
  <g filter="url(#glow)">
    <circle cx="230" cy="282" r="10" fill="#3a2f15">
      <animate attributeName="fill"
        values="#3a2f15;#3a2f15;#ffd17a;#ffd17a;#ffd17a;#3a2f15;#3a2f15"
        keyTimes="0;0.32;0.36;0.70;0.76;0.82;1" dur="10s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </circle>
  </g>
  <text x="230" y="262" fill="#7a6a3a" font-size="9" text-anchor="middle">toilet light</text>

  <!-- presence sensor zone, breathing pulse on entry, held while occupied -->
  <ellipse cx="230" cy="320" rx="100" ry="120" fill="#2e7d32" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.26;0.12;0.26;0.22;0.22;0;0"
      keyTimes="0;0.14;0.18;0.22;0.26;0.34;0.72;0.78;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- person: enters via left door, steps in -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;1;0;0" keyTimes="0;0.10;0.18;0.72;0.78;0.82;1" dur="10s" repeatCount="indefinite"/>
    <circle r="18" fill="url(#foot)">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.14;0.24;0.74;0.80;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M108,360 L108,360 L230,330 L230,330 L108,360 L108,360"/>
    </circle>
    <circle r="9" fill="#7fd1ff" stroke="#cdeeff" stroke-width="2">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.14;0.24;0.74;0.80;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M108,360 L108,360 L230,330 L230,330 L108,360 L108,360"/>
    </circle>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
