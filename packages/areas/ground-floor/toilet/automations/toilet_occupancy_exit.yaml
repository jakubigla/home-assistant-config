---
alias: toilet_occupancy_exit
description: Detect exit from toilet (door closes and no motion)
id: toilet-occupancy-exit

mode: restart

trigger:
  - platform: state
    entity_id: binary_sensor.toilet_doors
    from: "on"
    to: "off"
    id: "door_closed"
  - platform: state
    entity_id: binary_sensor.toilet_presence
    to: "off"
    for: "00:03:00"
    id: "motion_timeout"

condition:
  - condition: state
    entity_id: input_boolean.toilet_occupied
    state: "on"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "door_closed"
        sequence:
          # Wait 4 seconds after door closes
          - delay: "00:00:04"
          # If motion is off, person has left
          - condition: state
            entity_id: binary_sensor.toilet_presence
            state: "off"
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.toilet_occupied

      - conditions:
          - condition: trigger
            id: "motion_timeout"
        sequence:
          # Only clear if door is open or unavailable
          # (person left without closing, or sensor dead)
          - condition: or
            conditions:
              - condition: state
                entity_id: binary_sensor.toilet_doors
                state: "on"
              - condition: state
                entity_id: binary_sensor.toilet_doors
                state: "unavailable"
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.toilet_occupied
