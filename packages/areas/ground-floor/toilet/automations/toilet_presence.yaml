---
alias: toilet_presence
description: Turn on toilet lights when someone is in
id: 0d36e3a9-0067-4460-b9c8-e86fe86b8b29

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: binary_sensor.toilet_presence
    to: "on"
    id: "present"
  - platform: state
    entity_id: binary_sensor.toilet_doors
    from: "off"
    to: "on"
    id: "door_opened"
  - platform: state
    entity_id: binary_sensor.toilet_presence
    to: "off"
    id: "vacant"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "present"
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.outdoor_is_dark
                    state: "on"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.toilet_ambient
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.outdoor_is_dark
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.toilet_main

      - conditions:
          - condition: trigger
            id: "door_opened"
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.outdoor_is_dark
                    state: "on"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.toilet_ambient
              - conditions:
                  - condition: state
                    entity_id: binary_sensor.outdoor_is_dark
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: light.toilet_main
          - delay: "00:02:00"
          - condition: state
            entity_id: binary_sensor.toilet_presence
            state: "off"
          - service: light.turn_off
            target:
              entity_id:
                - light.toilet_ambient
                - light.toilet_main

      - conditions:
          - condition: trigger
            id: "vacant"
        sequence:
          - service: light.turn_off
            target:
              entity_id:
                - light.toilet_ambient
                - light.toilet_main
