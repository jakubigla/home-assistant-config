<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 600" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Kitchen cooking-mode hold</title>
  <desc>Top-down floor plan of the galley kitchen. While the cooking-mode flag is on it holds the under-cabinet LED strip on even after presence drops, so the light never cuts out while you stand still at the hob. When cooking mode is switched off and no one is present, the strip turns off after a 3-second delay.</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ledcast" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd17a" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffd17a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="heat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a3a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff7a3a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- scale: 1m = 100u, origin offset (90, 90). kitchen 2.56m x 4.29m -->
  <rect width="440" height="600" rx="14" fill="#0f1420"/>
  <text x="22" y="36" fill="#cdd9e8" font-size="16" font-weight="700">Kitchen — cooking-mode hold</text>
  <text x="22" y="56" fill="#5a6b80" font-size="12.5">mode holds the LED through vacancy  ·  off + vacant → 3 s → off</text>

  <!-- status word (one visible per phase), top-right, below the title row -->
  <g text-anchor="end" font-size="13.5" font-weight="700">
    <text x="418" y="84" fill="#ff8a4a" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.02;0.30;0.34;0.9;1" dur="10s" repeatCount="indefinite"/>cooking · LED held</text>
    <text x="418" y="84" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.34;0.38;0.60;0.63;1" dur="10s" repeatCount="indefinite"/>vacant · LED held on</text>
    <text x="418" y="84" fill="#9aa7bd" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.62;0.66;0.80;0.83;1" dur="10s" repeatCount="indefinite"/>mode OFF · 3 s…</text>
    <text x="418" y="84" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.82;0.86;0.96;1" dur="10s" repeatCount="indefinite"/>LED off</text>
  </g>

  <!-- cooking-mode flag badge (pill), top-left. Dot + label colour = the flag state. -->
  <g>
    <rect x="22" y="70" width="172" height="22" rx="11" fill="#241a12" stroke="#5a3d22" stroke-width="1.5">
      <animate attributeName="fill" values="#3a2412;#3a2412;#3a2412;#1a2030;#1a2030"
        keyTimes="0;0.30;0.62;0.66;1" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#e0732a;#e0732a;#e0732a;#33425e;#33425e"
        keyTimes="0;0.30;0.62;0.66;1" dur="10s" repeatCount="indefinite"/>
    </rect>
    <circle cx="36" cy="81" r="5" fill="#ff8a4a">
      <animate attributeName="fill" values="#ff8a4a;#ff8a4a;#ff8a4a;#3a4a66;#3a4a66"
        keyTimes="0;0.30;0.62;0.66;1" dur="10s" repeatCount="indefinite"/>
    </circle>
    <text x="48" y="85" font-size="11" font-weight="700" fill="#f0a060" opacity="1"><animate attributeName="opacity" values="1;1;1;0;0" keyTimes="0;0.30;0.62;0.66;1" dur="10s" repeatCount="indefinite"/><tspan>cooking mode</tspan><tspan dx="6" font-weight="800">ON</tspan></text>
    <text x="48" y="85" font-size="11" font-weight="700" fill="#5a6b80" opacity="0"><animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.30;0.62;0.66;1" dur="10s" repeatCount="indefinite"/><tspan>cooking mode</tspan><tspan dx="6" font-weight="800">OFF</tspan></text>
  </g>

  <!-- ===== room shell ===== -->
  <rect x="90" y="100" width="256" height="419" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>

  <!-- LED cast (held on through cooking + vacancy, off after the 3 s delay) -->
  <rect x="152" y="145" width="150" height="290" fill="url(#ledcast)" opacity="0">
    <animate attributeName="opacity" values="0.9;0.9;0.9;0.9;0.9;0;0"
      keyTimes="0;0.30;0.62;0.66;0.82;0.88;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- furniture -->
  <rect x="90" y="145" width="60" height="90" rx="5" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <circle cx="120" cy="175" r="11" fill="#26334d"/>
  <text x="120" y="260" fill="#54668a" font-size="10" text-anchor="middle">sink</text>

  <!-- hob with heat shimmer while cooking -->
  <ellipse cx="120" cy="400" rx="46" ry="40" fill="url(#heat)" opacity="0">
    <animate attributeName="opacity" values="0.85;0.85;0.55;0.85;0.55;0.85;0;0"
      keyTimes="0;0.12;0.18;0.24;0.30;0.36;0.66;1" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <rect x="90" y="370" width="60" height="80" rx="5" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <circle cx="108" cy="395" r="7" fill="#3a2a18"/><circle cx="132" cy="395" r="7" fill="#3a2a18"/>
  <circle cx="108" cy="425" r="7" fill="#3a2a18"/><circle cx="132" cy="425" r="7" fill="#3a2a18"/>
  <text x="120" y="465" fill="#54668a" font-size="10" text-anchor="middle">hob</text>

  <rect x="290" y="130" width="56" height="220" rx="5" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <line x1="290" y1="203" x2="346" y2="203" stroke="#33425e" stroke-width="1"/>
  <line x1="290" y1="276" x2="346" y2="276" stroke="#33425e" stroke-width="1"/>
  <text x="318" y="245" fill="#54668a" font-size="9" text-anchor="middle" transform="rotate(90 318 245)">oven · fridge</text>

  <rect x="140" y="440" width="170" height="60" rx="6" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <text x="225" y="475" fill="#54668a" font-size="10" text-anchor="middle">peninsula</text>
  <circle cx="180" cy="514" r="9" fill="#222c40"/>
  <circle cx="225" cy="514" r="9" fill="#222c40"/>
  <circle cx="270" cy="514" r="9" fill="#222c40"/>

  <rect x="280" y="511" width="66" height="9" rx="2" fill="#3a4a66"/>
  <text x="313" y="540" fill="#5a6b80" font-size="10" text-anchor="middle">entry</text>

  <!-- under-cabinet LED strip: ON through cooking + vacancy, off after delay -->
  <g filter="url(#glow)">
    <rect x="150" y="145" width="7" height="290" rx="3.5" fill="#ffd17a">
      <animate attributeName="fill"
        values="#ffd17a;#ffd17a;#ffd17a;#ffd17a;#ffd17a;#3a2f15;#3a2f15"
        keyTimes="0;0.30;0.62;0.66;0.82;0.88;1" dur="10s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </rect>
  </g>
  <text x="170" y="138" fill="#7a6a3a" font-size="10" text-anchor="start">under-cabinet LED</text>

  <!-- presence sensor: present early (cooking), then clears at vacancy -->
  <ellipse cx="120" cy="400" rx="58" ry="60" fill="#2e7d32" opacity="0">
    <animate attributeName="opacity" values="0.26;0.26;0.26;0;0;0;0"
      keyTimes="0;0.20;0.34;0.40;0.62;0.8;1" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- 3-second countdown ring, appears only when mode turns off + vacant -->
  <g transform="translate(228,300)">
    <circle r="20" fill="none" stroke="#33425e" stroke-width="3" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.30;0.62;0.66;0.82;0.86;1" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle r="20" fill="none" stroke="#9aa7bd" stroke-width="3"
      stroke-dasharray="126" stroke-dashoffset="0" transform="rotate(-90)" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.30;0.62;0.66;0.82;0.86;1" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="0;0;0;0;126;126;126"
        keyTimes="0;0.30;0.62;0.66;0.82;0.86;1" dur="10s" repeatCount="indefinite"/>
    </circle>
    <text y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#9aa7bd" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;0;0" keyTimes="0;0.30;0.62;0.66;0.82;0.86;1" dur="10s" repeatCount="indefinite"/>3s</text>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
