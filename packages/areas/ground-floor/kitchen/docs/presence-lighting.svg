<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 600" role="img"
     font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
  <title>Kitchen presence lighting</title>
  <desc>Top-down floor plan of the galley kitchen from the developer drawing: sink and dishwasher upper-left, hob lower-left, tall oven/fridge units along the right wall, a peninsula across the bottom. Someone entering (kitchen presence sensor or the wall tablet) while the room is dark switches on the under-cabinet LED strip; after both sensors read clear for 15 seconds the kitchen lights switch off.</desc>

  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="foot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fd1ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7fd1ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ledcast" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd17a" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffd17a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- scale: 1m = 100u, origin offset (90, 90). kitchen 2.56m x 4.29m -->
  <rect width="440" height="600" rx="14" fill="#0f1420"/>
  <text x="22" y="36" fill="#cdd9e8" font-size="16" font-weight="700">Kitchen — presence lighting</text>
  <text x="22" y="56" fill="#5a6b80" font-size="12.5">enter + dark → LED strip on  ·  vacant 15 s → off</text>

  <!-- status word (one visible per phase), top-right -->
  <g text-anchor="end" font-size="14" font-weight="700">
    <text x="418" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.02;0.14;0.18;0.9;1" dur="10s" repeatCount="indefinite"/>vacant · dark</text>
    <text x="418" y="40" fill="#7fd1ff" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.16;0.20;0.34;0.37;1" dur="10s" repeatCount="indefinite"/>● presence</text>
    <text x="418" y="40" fill="#ffd17a" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.32;0.36;0.66;0.69;1" dur="10s" repeatCount="indefinite"/>☀ LED ON</text>
    <text x="418" y="40" fill="#6f7f95" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.74;0.78;0.96;1" dur="10s" repeatCount="indefinite"/>vacant 15 s → off</text>
  </g>

  <!-- ===== room shell ===== -->
  <rect x="90" y="90" width="256" height="429" rx="9" fill="#161d2c" stroke="#2b3850" stroke-width="2"/>

  <!-- LED cast spilling right off the left-wall strip (light on) -->
  <rect x="152" y="135" width="150" height="300" fill="url(#ledcast)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0.9;0;0"
      keyTimes="0;0.32;0.36;0.70;0.76;0.82;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- ===== furniture ===== -->
  <!-- sink + dishwasher (upper-left) -->
  <rect x="90" y="135" width="60" height="90" rx="5" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <circle cx="120" cy="165" r="11" fill="#26334d"/>
  <text x="120" y="250" fill="#54668a" font-size="10" text-anchor="middle">sink</text>
  <!-- hob (lower-left) -->
  <rect x="90" y="360" width="60" height="80" rx="5" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <circle cx="108" cy="385" r="7" fill="#2a3346"/><circle cx="132" cy="385" r="7" fill="#2a3346"/>
  <circle cx="108" cy="415" r="7" fill="#2a3346"/><circle cx="132" cy="415" r="7" fill="#2a3346"/>
  <text x="120" y="455" fill="#54668a" font-size="10" text-anchor="middle">hob</text>
  <!-- right-wall tall units -->
  <rect x="290" y="120" width="56" height="220" rx="5" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <line x1="290" y1="193" x2="346" y2="193" stroke="#33425e" stroke-width="1"/>
  <line x1="290" y1="266" x2="346" y2="266" stroke="#33425e" stroke-width="1"/>
  <text x="318" y="235" fill="#54668a" font-size="9" text-anchor="middle" transform="rotate(90 318 235)">oven · fridge</text>
  <!-- peninsula (bottom) + stools -->
  <rect x="140" y="440" width="170" height="60" rx="6" fill="#1d2940" stroke="#33425e" stroke-width="1.5"/>
  <text x="225" y="475" fill="#54668a" font-size="10" text-anchor="middle">peninsula</text>
  <circle cx="180" cy="514" r="9" fill="#222c40"/>
  <circle cx="225" cy="514" r="9" fill="#222c40"/>
  <circle cx="270" cy="514" r="9" fill="#222c40"/>

  <!-- door: bottom-right -->
  <rect x="280" y="511" width="66" height="9" rx="2" fill="#3a4a66"/>
  <text x="313" y="540" fill="#5a6b80" font-size="10" text-anchor="middle">entry</text>

  <!-- ===== under-cabinet LED strip (left wall) ===== -->
  <g filter="url(#glow)">
    <rect x="150" y="135" width="7" height="300" rx="3.5" fill="#3a2f15">
      <animate attributeName="fill"
        values="#3a2f15;#3a2f15;#ffd17a;#ffd17a;#ffd17a;#3a2f15;#3a2f15"
        keyTimes="0;0.32;0.36;0.70;0.76;0.82;1" dur="10s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </rect>
  </g>
  <text x="170" y="128" fill="#7a6a3a" font-size="10" text-anchor="start">under-cabinet LED</text>

  <!-- tablet (dashboard_presence) on the wall near the entry -->
  <rect x="322" y="386" width="20" height="30" rx="3" fill="#222c40" stroke="#33425e" stroke-width="1.5"/>
  <text x="332" y="430" fill="#46566e" font-size="9" text-anchor="middle">tablet</text>

  <!-- presence sensor zone (bottom-right), breathing pulse on entry, held while present -->
  <ellipse cx="290" cy="450" rx="56" ry="74" fill="#2e7d32" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0.30;0.13;0.30;0.26;0.26;0;0"
      keyTimes="0;0.16;0.20;0.24;0.28;0.36;0.72;0.78;1" dur="10s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <text x="290" y="452" fill="#3c6f54" font-size="9" text-anchor="middle">presence</text>

  <!-- ===== person: enters bottom-right, moves up to the work zone ===== -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;1;0;0" keyTimes="0;0.12;0.18;0.72;0.78;0.82;1" dur="10s" repeatCount="indefinite"/>
    <circle r="18" fill="url(#foot)">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.16;0.24;0.74;0.80;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M313,505 L313,505 L185,350 L185,350 L313,505 L313,505"/>
    </circle>
    <circle r="9" fill="#7fd1ff" stroke="#cdeeff" stroke-width="2">
      <animateMotion dur="10s" repeatCount="indefinite"
        keyPoints="0;0;0.5;0.5;1;1" keyTimes="0;0.16;0.24;0.74;0.80;1"
        calcMode="spline" keySplines="0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1;0 0 1 1;0.3 0 0.4 1"
        path="M313,505 L313,505 L185,350 L185,350 L313,505 L313,505"/>
    </circle>
  </g>

  <style>
    @media (prefers-reduced-motion: reduce){ svg * { animation:none !important; } }
  </style>
</svg>
