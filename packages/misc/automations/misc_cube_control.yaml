---
# Cross-Area Automation: Cube Controller
# This automation handles cube gestures that don't belong to a specific scene:
#   - Throw: toggle TV
#   - Rotate: reserved for future use
# Scene-related cube events (side flips, shake) are handled by
# living_room_scene_cube.yaml in the living room package.

alias: Misc - Cube Control
description: Jakub's Cube - cross-area controls (TV toggle via throw)
id: 541daa21-c60d-4de8-ab38-c5a3d055832a
mode: restart

triggers:
  - domain: mqtt
    device_id: ea560cc765aa1b16e94168fed6a14041
    type: action
    subtype: throw
    trigger: device
    id: throw

  - domain: mqtt
    device_id: ea560cc765aa1b16e94168fed6a14041
    type: action
    subtype: rotate_right
    trigger: device
    id: rotate_right

  - domain: mqtt
    device_id: ea560cc765aa1b16e94168fed6a14041
    type: action
    subtype: rotate_left
    trigger: device
    id: rotate_left

actions:
  - choose:
      - conditions:
          - condition: trigger
            id: throw
        sequence:
          - action: media_player.toggle
            target:
              entity_id: media_player.living_room_tv
          - action: media_player.volume_set
            data:
              volume_level: 0.22
            target:
              entity_id: media_player.living_room_tv
