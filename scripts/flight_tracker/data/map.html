<!DOCTYPE html>
<html>
<head>
    <title>Flight Tracker Bounding Box</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const homeLat = 52.2474;
        const homeLon = 20.8363;
        const radiusKm = 1;

        // Compute bounding box (same math as flight_tracker.py)
        const latDelta = radiusKm / 111.0;
        const lonDelta = radiusKm / 70.0;
        const bounds = [
            [homeLat - latDelta, homeLon - lonDelta],  // SW
            [homeLat + latDelta, homeLon + lonDelta]   // NE
        ];

        const map = L.map('map').setView([homeLat, homeLon], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Bounding box
        L.rectangle(bounds, {
            color: '#ff3333',
            weight: 2,
            fillOpacity: 0.1,
            dashArray: '8, 4'
        }).addTo(map).bindPopup('10 km bounding box');

        // Home marker
        L.marker([homeLat, homeLon]).addTo(map)
            .bindPopup('<b>Home</b><br>Wieruchowska 7A/1<br>Garden Park, Babice Nowe')
            .openPopup();

        // 10km radius circle for reference
        L.circle([homeLat, homeLon], {
            radius: 10000,
            color: '#3388ff',
            weight: 1,
            fillOpacity: 0.05,
            dashArray: '4, 4'
        }).addTo(map).bindPopup('10 km radius');

        map.fitBounds(bounds, { padding: [20, 20] });
    </script>
</body>
</html>
